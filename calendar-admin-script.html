<script>
let currentAdminUser = null;
const adminAuthConfig = {
  validateLoginInput: true,
  clearMessageBeforeLoadUsers: false,
  clearMessageBeforeLogin: false,
  showEmptyAdminOption: false,
  emptyAdminMessage: "有効な管理者がいません",
  loginMissingInputMessage: "管理者とPINを入力してください。",
  loginFailureMessage: "ログインに失敗しました。",
  normalizeLoginUser: true,
  clearPinOnLogout: false,
  reloadUsersOnLogout: false
};
let fifoEmployeeCandidates = [];
let selectedFifoEmployee = null;
let companyRolloverDryRunResult = null;
let companyRolloverExecuted = false;
let companyRolloverExecuting = false;

const PAGE_SIZE = 20;
const pageOffsets = {
  fifo: 0,
  expiry: 0,
  yearEnd: 0
};

window.addEventListener("DOMContentLoaded", () => {
  initAdminLogin();
});

function initAdminLogin() {
  const saved = localStorage.getItem(ADMIN_LOGIN_KEY);

  if (saved) {
    try {
      currentAdminUser = JSON.parse(saved);

      if (currentAdminUser && currentAdminUser.admin_id) {
        showAdminApp();
        return;
      }
    } catch (e) {
      localStorage.removeItem(ADMIN_LOGIN_KEY);
    }
  }

  showLoginScreen();
  loadAdminUsersForLogin();
}

function showAdminApp() {
  showAuthenticatedShell();
}

function onAdminAuthenticated() {
  setDefaultCalendarAdminValues();
  bindCompanyCalendarAdminEvents();
  loadFifoEmployeeCandidates();
}

function setDefaultCalendarAdminValues() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const fiscalYear = month >= 4 ? year : year - 1;
  const fiscalYearEl = document.getElementById("companyCalendarFiscalYear");
  const fiscalStartMonthEl = document.getElementById("companyCalendarFiscalStartMonth");
  const fifoFiscalYear = document.getElementById("fifoFiscalYear");
  const fifoAsOfDate = document.getElementById("fifoAsOfDate");
  const expiryAsOfDate = document.getElementById("expiryAsOfDate");
  const yearEndFiscalYear = document.getElementById("yearEndFiscalYear");
  const companyRolloverFiscalYear = document.getElementById("companyRolloverFiscalYear");
  const companyRolloverCompanyCode = document.getElementById("companyRolloverCompanyCode");

  if (fiscalYearEl) fiscalYearEl.value = fiscalYear;
  if (fiscalStartMonthEl) fiscalStartMonthEl.value = "4";
  if (fifoFiscalYear) fifoFiscalYear.value = fiscalYear;
  if (fifoAsOfDate) fifoAsOfDate.value = toInputDate(now);
  if (expiryAsOfDate) expiryAsOfDate.value = toInputDate(now);
  if (yearEndFiscalYear) yearEndFiscalYear.value = fiscalYear;
  if (companyRolloverFiscalYear) {
    companyRolloverFiscalYear.value = getDefaultCompanyRolloverFiscalYear_(
      now,
      companyRolloverCompanyCode ? companyRolloverCompanyCode.value : "MAIN"
    );
  }
  renderCompanyLeaveYearRolloverTarget();
  updateCompanyCalendarPeriodText();
}

function toInputDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function formatDays(value) {
  const num = Number(value || 0);
  return `${num}日`;
}

function renderPager(type, response) {
  if (!response || response.total_count == null) return "";

  const total = Number(response.total_count || 0);
  const offset = Math.max(0, Number(response.offset || 0));
  const limit = Math.max(1, Number(response.limit || PAGE_SIZE));
  const rowCount = Number(
    response.scanned_count != null
      ? response.scanned_count
      : response.row_count != null ? response.row_count : getPagedRows(response).length
  );
  const start = total === 0 ? 0 : offset + 1;
  const end = total === 0 ? 0 : Math.min(offset + Math.max(rowCount, 0), total);
  const hasPrev = response.has_prev === true || offset > 0;
  const hasNext = response.has_next === true || offset + limit < total;

  return `
    <div class="pager-bar">
      <div class="pager-range">${escapeHtml(start)}〜${escapeHtml(end)}件 / 全${escapeHtml(total)}件</div>
      <div class="pager-actions">
        <button class="btn btn-reset" type="button" onclick="changePagedView('${type}', -1)" ${hasPrev ? "" : "disabled"}>前の20件</button>
        <button class="btn btn-reset" type="button" onclick="changePagedView('${type}', 1)" ${hasNext ? "" : "disabled"}>次の20件</button>
      </div>
    </div>
  `;
}

function changePagedView(type, direction) {
  const nextOffset = Math.max(0, Number(pageOffsets[type] || 0) + direction * PAGE_SIZE);
  pageOffsets[type] = nextOffset;

  if (type === "fifo") {
    loadFifoTrialDifferences(true);
  } else if (type === "yearEnd") {
    loadYearEndCarryOverCandidates(true);
  } else if (type === "expiry") {
    loadExpiryLots(true);
  }
}

/* =========================
   FIFO残日数 試算
========================= */
function loadFifoTrialDifferences(keepPage) {
  pageOffsets.fifo = keepPage === true
    ? Math.max(0, Number(pageOffsets.fifo || 0))
    : 0;
  const fiscalYear = document.getElementById("fifoFiscalYear").value;
  const asOfDate = document.getElementById("fifoAsOfDate").value;
  const employeeId = selectedFifoEmployee
    ? selectedFifoEmployee.employee_id
    : document.getElementById("fifoEmployeeId").value.trim();
  const results = document.getElementById("fifoTrialResults");
  const summary = document.getElementById("fifoTrialSummary");

  if (!fiscalYear) {
    if (summary) summary.innerHTML = `<div class="message error">対象年度を入力してください。</div>`;
    return;
  }

  if (!asOfDate) {
    if (summary) summary.innerHTML = `<div class="message error">試算基準日を入力してください。</div>`;
    return;
  }

  if (summary) summary.innerHTML = "";
  if (results) {
    results.innerHTML = `<div class="message">FIFO残日数を試算しています...</div>`;
  }

  google.script.run
    .withSuccessHandler(renderFifoTrialDifferences)
    .withFailureHandler(err => {
      console.error("FIFO試算エラー:", err);
      if (results) {
        const message = err && err.message
          ? err.message
          : "FIFO残日数の試算でエラーが発生しました。";
        results.innerHTML = `<div class="message error">${escapeHtml(message)}</div>`;
      }
    })
    .compareFifoBalanceDifferencesForAdmin(
      Number(fiscalYear),
      asOfDate,
      employeeId,
      PAGE_SIZE,
      pageOffsets.fifo
    );
}

function renderFifoTrialDifferences(response) {
  const results = document.getElementById("fifoTrialResults");
  const summary = document.getElementById("fifoTrialSummary");

  if (!results) return;

  const data = Array.isArray(response)
    ? response
    : Array.isArray(response && response.rows) ? response.rows : [];
  const scannedCount = response && response.scanned_count != null
    ? response.scanned_count
    : data.length;
  const limit = response && response.limit ? response.limit : 20;
  const totalCount = response && response.total_count != null
    ? Number(response.total_count || 0)
    : scannedCount;
  const targetEmployeeId = response && response.employee_id ? response.employee_id : "";
  const warningCount = response && response.warning_count != null
    ? Number(response.warning_count || 0)
    : data.filter(row => row.has_validity_warning).length;
  const targetText = targetEmployeeId
    ? `対象社員：${escapeHtml(targetEmployeeId)}`
    : `ページ単位：${escapeHtml(limit)}名ずつ試算`;

  if (summary) {
    summary.innerHTML = `
      <div class="fifo-trial-count">
        表示：<strong>${escapeHtml(data.length)}</strong>件
        ／ 表示中の期限要確認：<strong>${escapeHtml(warningCount)}</strong>件
        ／ このページの試算対象：<strong>${escapeHtml(scannedCount)}</strong>件
        ／ 全対象：<strong>${escapeHtml(totalCount)}</strong>件
        ／ ${targetText}
      </div>
    `;
  }

  if (data.length === 0) {
    results.innerHTML = `
      ${renderPager("fifo", response)}
      <div class="empty-message">
        このページでは旧計算との差分・期限要確認はありません。
      </div>
      ${renderPager("fifo", response)}
    `;
    return;
  }

  results.innerHTML = `
    ${renderPager("fifo", response)}
    ${data.map(row => {
    const difference = Number(row.remaining_difference || 0);
    const differenceClass = difference > 0 ? "plus" : difference < 0 ? "minus" : "zero";

    return `
      <div class="fifo-trial-row">
        <div class="fifo-trial-main">
          <div class="fifo-trial-name-line">
            <span class="fifo-trial-name">${escapeHtml(row.display_name || row.name || row.employee_id)}</span>
            <span class="fifo-trial-id">${escapeHtml(row.employee_id || "")}</span>
            ${renderFifoDifferenceReasonBadge(row.difference_reason)}
            ${row.has_validity_warning ? `<span class="fifo-reason-badge needs-check">期限要確認</span>` : ""}
          </div>

          <div class="fifo-trial-meta">
            会社：${escapeHtml(row.company_code || "-")}
            ／ 部署：${escapeHtml(row.department || "-")}
          </div>
          ${row.validity_warning ? `
            <div class="fifo-trial-meta">${escapeHtml(row.validity_warning)}</div>
          ` : ""}
        </div>

        <div class="fifo-trial-numbers">
          <div class="fifo-number-item">
            <span>旧残日数</span>
            <strong>${escapeHtml(formatDays(row.legacy_current_remaining_days))}</strong>
          </div>
          <div class="fifo-number-item">
            <span>FIFO残日数</span>
            <strong>${escapeHtml(formatDays(row.fifo_current_remaining_days))}</strong>
          </div>
          <div class="fifo-number-item difference ${differenceClass}">
            <span>差分</span>
            <strong>${escapeHtml(formatSignedDays(difference))}</strong>
          </div>
        </div>
      </div>
    `;
  }).join("")}
    ${renderPager("fifo", response)}
  `;
}

function renderFifoDifferenceReasonBadge(reason) {
  const text = reason || "要確認";
  let cls = "needs-check";

  if (text.includes("未来")) cls = "future";
  if (text.includes("期限切れ")) cls = "expired";
  if (text.includes("fiscal_start_month")) cls = "fiscal";

  return `<span class="fifo-reason-badge ${cls}">${escapeHtml(text)}</span>`;
}

function formatSignedDays(value) {
  const num = Number(value || 0);
  const sign = num > 0 ? "+" : "";
  return `${sign}${num}日`;
}

function clearFifoTrialResults() {
  const results = document.getElementById("fifoTrialResults");
  const summary = document.getElementById("fifoTrialSummary");

  if (summary) summary.innerHTML = "";
  pageOffsets.fifo = 0;
  clearSelectedFifoEmployee();
  if (results) {
    results.innerHTML = `
      <div class="empty-message">
        社員IDを指定するか、最大20名の制限で「試算する」を押してください
      </div>
    `;
  }
}

function loadFifoEmployeeCandidates() {
  google.script.run
    .withSuccessHandler(data => {
      fifoEmployeeCandidates = Array.isArray(data) ? data : [];
    })
    .withFailureHandler(err => {
      console.error("FIFO社員候補取得エラー:", err);
      fifoEmployeeCandidates = [];
    })
    .getEmployeesForAdmin();
}

function handleFifoEmployeeSearchInput() {
  const input = document.getElementById("fifoEmployeeSearch");
  const list = document.getElementById("fifoEmployeeCandidates");
  if (!input || !list) return;

  const keyword = normalizeFifoSearchText(input.value);

  selectedFifoEmployee = null;
  updateSelectedFifoEmployee();

  if (!keyword) {
    list.innerHTML = "";
    list.style.display = "none";
    return;
  }

  const matches = fifoEmployeeCandidates
    .filter(emp => {
      const target = normalizeFifoSearchText([
        emp.name,
        emp.display_name,
        emp.name_kana,
        emp.display_employee_id,
        emp.employee_id
      ].join(" "));
      return target.includes(keyword);
    })
    .slice(0, 8);

  if (matches.length === 0) {
    list.innerHTML = `<div class="fifo-employee-empty">該当する社員はいません</div>`;
    list.style.display = "block";
    return;
  }

  list.innerHTML = matches.map(emp => `
    <button
      class="fifo-employee-option"
      type="button"
      data-employee-id="${escapeHtml(emp.employee_id || "")}"
      onclick="selectFifoEmployeeCandidate(this.dataset.employeeId)"
    >
      <span class="fifo-employee-option-name">${escapeHtml(emp.display_name || emp.name || emp.employee_id)}</span>
      <span class="fifo-employee-option-meta">
        ${escapeHtml(emp.name_kana || "")}
        ／ ${escapeHtml(emp.display_employee_id || emp.employee_id || "")}
        ／ ${escapeHtml(emp.company_code || "")}
      </span>
    </button>
  `).join("");
  list.style.display = "block";
}

function selectFifoEmployeeCandidate(employeeId) {
  const emp = fifoEmployeeCandidates.find(item => {
    return String(item.employee_id || "") === String(employeeId || "");
  });

  if (!emp) return;

  selectedFifoEmployee = emp;

  const search = document.getElementById("fifoEmployeeSearch");
  const idInput = document.getElementById("fifoEmployeeId");
  const list = document.getElementById("fifoEmployeeCandidates");

  if (search) search.value = emp.display_name || emp.name || emp.employee_id;
  if (idInput) idInput.value = emp.employee_id || "";
  if (list) {
    list.innerHTML = "";
    list.style.display = "none";
  }

  updateSelectedFifoEmployee();
}

function handleFifoEmployeeIdInput() {
  if (!selectedFifoEmployee) return;

  const idInput = document.getElementById("fifoEmployeeId");
  const currentId = idInput ? String(idInput.value || "").trim() : "";

  if (currentId === String(selectedFifoEmployee.employee_id || "")) return;

  selectedFifoEmployee = null;
  updateSelectedFifoEmployee();
}

function updateSelectedFifoEmployee() {
  const area = document.getElementById("fifoSelectedEmployee");
  if (!area) return;

  if (!selectedFifoEmployee) {
    area.style.display = "none";
    area.innerHTML = "";
    return;
  }

  area.style.display = "flex";
  area.innerHTML = `
    <div>
      選択中：<strong>${escapeHtml(selectedFifoEmployee.display_name || selectedFifoEmployee.name || "")}</strong>
      <span>${escapeHtml(selectedFifoEmployee.employee_id || "")}</span>
    </div>
    <button class="fifo-selected-clear" type="button" onclick="clearSelectedFifoEmployee()">解除</button>
  `;
}

function clearSelectedFifoEmployee() {
  selectedFifoEmployee = null;

  const search = document.getElementById("fifoEmployeeSearch");
  const idInput = document.getElementById("fifoEmployeeId");
  const list = document.getElementById("fifoEmployeeCandidates");

  if (search) search.value = "";
  if (idInput) idInput.value = "";
  if (list) {
    list.innerHTML = "";
    list.style.display = "none";
  }

  updateSelectedFifoEmployee();
}

function normalizeFifoSearchText(value) {
  return String(value || "")
    .replace(/\s/g, "")
    .toLowerCase();
}

/* =========================
   期限切れ確認
========================= */
function loadExpiryLots(keepPage) {
  pageOffsets.expiry = keepPage === true
    ? Math.max(0, Number(pageOffsets.expiry || 0))
    : 0;
  const asOfDate = document.getElementById("expiryAsOfDate").value;
  const employeeKeyword = document.getElementById("expiryEmployeeKeyword").value.trim();
  const companyCode = document.getElementById("expiryCompany").value;
  const expiredOnly = document.getElementById("expiryExpiredOnly").checked;
  const expiringSoonOnly = document.getElementById("expirySoonOnly").checked;
  const validityUnconfirmedOnly = document.getElementById("expiryUnconfirmedOnly").checked;
  const summary = document.getElementById("expirySummary");
  const container = document.getElementById("expiryLots");

  if (!asOfDate) {
    if (summary) summary.innerHTML = `<div class="message error">確認日を入力してください。</div>`;
    return;
  }
  if (summary) summary.innerHTML = "";
  if (container) {
    container.innerHTML = `<div class="message">有給まとまりの期限を確認しています...</div>`;
  }

  google.script.run
    .withSuccessHandler(renderExpiryLots)
    .withFailureHandler(err => {
      console.error("期限切れ確認エラー:", err);
      const message = err && err.message
        ? err.message
        : "期限切れ確認でエラーが発生しました。";
      if (container) {
        container.innerHTML = `<div class="message error">${escapeHtml(message)}</div>`;
      }
    })
    .getPaidLeaveExpiryLotsForAdmin({
      as_of_date: asOfDate,
      employee_keyword: employeeKeyword,
      company_code: companyCode,
      expired_only: expiredOnly,
      expiring_soon_only: expiringSoonOnly,
      validity_unconfirmed_only: validityUnconfirmedOnly,
      offset: pageOffsets.expiry,
      limit: PAGE_SIZE
    });
}

function renderExpiryLots(response) {
  const summary = document.getElementById("expirySummary");
  const container = document.getElementById("expiryLots");
  if (!container) return;

  const rows = Array.isArray(response && response.rows) ? response.rows : [];
  const totalCount = Number(response && response.total_count || 0);

  if (totalCount > 0 && rows.length === 0 && pageOffsets.expiry > 0) {
    pageOffsets.expiry = Math.max(0, pageOffsets.expiry - PAGE_SIZE);
    loadExpiryLots(true);
    return;
  }

  if (summary) {
    summary.innerHTML = `
      <div class="expiry-count">
        残っている有給まとまり：<strong>${escapeHtml(totalCount)}</strong>件
        ／ 期限切れ：<strong>${escapeHtml(response.expired_count || 0)}</strong>件
        ／ 期限が近い（30日以内）：<strong>${escapeHtml(response.within_30_count || 0)}</strong>件
        ／ 期限が近い（90日以内）：<strong>${escapeHtml(response.within_90_count || 0)}</strong>件
        ／ 有効期限確認が必要：<strong>${escapeHtml(response.needs_review_count || 0)}</strong>件
      </div>
    `;
  }

  if (rows.length === 0) {
    container.innerHTML = `<div class="empty-message">該当する有給まとまりはありません。</div>`;
    return;
  }

  container.innerHTML = `
    ${renderPager("expiry", response)}
    ${rows.map(row => `
      <div class="expiry-lot-row ${escapeHtml(row.expiry_status || "active")}">
        <div class="expiry-lot-heading">
          <div>
            <span class="expiry-name">${escapeHtml(row.display_name || row.name || row.employee_id)}</span>
            <span class="expiry-id">${escapeHtml(row.employee_id || "")}</span>
          </div>
          <div class="expiry-badges">
            <span class="expiry-badge lot-${escapeHtml(row.lot_type)}">${escapeHtml(row.lot_type_label || "")}</span>
            <span class="expiry-badge status-${escapeHtml(row.expiry_status)}">${escapeHtml(row.expiry_status_label || "")}</span>
            ${row.validity_needs_review ? `<span class="expiry-badge status-validity_review">有効期限確認が必要</span>` : ""}
          </div>
        </div>
        <div class="expiry-meta">
          ${escapeHtml(row.company_name || row.company_code || "-")}
          ／ 氏名: ${escapeHtml(row.name || "-")}
          ${row.display_name ? ` ／ 表示名: ${escapeHtml(row.display_name)}` : ""}
        </div>
        ${row.validity_needs_review ? `
          <div class="expiry-deadline validity_review">
            有効期限確認が必要
            <span>期限日を確認してください</span>
          </div>
        ` : `
          <div class="expiry-deadline ${escapeHtml(row.expiry_status || "active")}">
            ${escapeHtml(row.valid_to || "-")}で期限切れ
            <span>${escapeHtml(formatExpiryRemainingDays(row.days_until_expiry))}</span>
          </div>
        `}
        <div class="expiry-values">
          <div><span>付与日</span><strong>${escapeHtml(row.grant_date || "-")}</strong></div>
          <div><span>有効期限</span><strong>${escapeHtml(row.valid_to || "-")}</strong></div>
          <div><span>付与日数</span><strong>${escapeHtml(formatDays(row.granted_days))}</strong></div>
          <div><span>使用済み</span><strong>${escapeHtml(formatDays(row.used_days))}</strong></div>
          <div><span>残日数</span><strong>${escapeHtml(formatDays(row.remaining_days))}</strong></div>
          <div><span>期限まで</span><strong>${escapeHtml(formatExpiryRemainingDays(row.days_until_expiry))}</strong></div>
        </div>
        ${row.validity_needs_review ? `
          <div class="expiry-warning">有効期限確認が必要 ／ ${escapeHtml(row.validity_basis || "")}</div>
        ` : ""}
      </div>
    `).join("")}
    ${renderPager("expiry", response)}
  `;
}

function formatExpiryRemainingDays(value) {
  const days = Number(value || 0);
  if (days < 0) return `${Math.abs(days)}日経過`;
  if (days === 0) return "本日";
  return `あと${days}日`;
}

function clearExpiryLots() {
  const summary = document.getElementById("expirySummary");
  const container = document.getElementById("expiryLots");
  pageOffsets.expiry = 0;
  document.getElementById("expiryEmployeeKeyword").value = "";
  document.getElementById("expiryCompany").value = "";
  document.getElementById("expiryExpiredOnly").checked = false;
  document.getElementById("expirySoonOnly").checked = false;
  document.getElementById("expiryUnconfirmedOnly").checked = false;
  if (summary) summary.innerHTML = "";
  if (container) {
    container.innerHTML = `<div class="empty-message">条件を設定して「確認する」を押してください</div>`;
  }
}

/* =========================
   会社別年度切替 dry-run
========================= */
function runCompanyLeaveYearRolloverDryRun() {
  const button = document.getElementById("companyRolloverDryRunButton");
  const summary = document.getElementById("companyRolloverSummary");
  const container = document.getElementById("companyRolloverResults");
  const companyCode = document.getElementById("companyRolloverCompanyCode").value;
  const fiscalYear = Number(document.getElementById("companyRolloverFiscalYear").value || 0);

  resetCompanyLeaveYearRolloverDryRun({ keepResults: true });

  if (!companyCode || !fiscalYear) {
    if (container) {
      container.innerHTML = `<div class="message error">対象会社と年度を選択してください。</div>`;
    }
    return;
  }

  if (button) button.disabled = true;
  if (summary) summary.innerHTML = "";
  if (container) {
    container.innerHTML = `<div class="message">${escapeHtml(companyCode)} / ${escapeHtml(fiscalYear)}年度の切替内容を確認しています...</div>`;
  }

  google.script.run
    .withSuccessHandler(result => {
      companyRolloverDryRunResult = result || null;
      renderCompanyLeaveYearRolloverDryRun(result);
      if (button) button.disabled = false;
      updateCompanyRolloverExecuteButtonState();
    })
    .withFailureHandler(err => {
      console.error("会社別 年度切替事前確認エラー:", err);
      const message = err && err.message
        ? err.message
        : "切替内容の確認中にエラーが発生しました。";
      if (container) {
        container.innerHTML = `<div class="message error">${escapeHtml(message)}</div>`;
      }
      if (button) button.disabled = false;
      updateCompanyRolloverExecuteButtonState();
    })
    .dryRunCompanyLeaveYearRollover(companyCode, fiscalYear);
}

function resetCompanyLeaveYearRolloverDryRun(options) {
  const opts = options || {};
  const summary = document.getElementById("companyRolloverSummary");
  const container = document.getElementById("companyRolloverResults");
  const executionResult = document.getElementById("companyRolloverExecutionResult");
  const backupChecked = document.getElementById("companyRolloverBackupChecked");
  const confirmText = document.getElementById("companyRolloverConfirmText");

  companyRolloverDryRunResult = null;
  companyRolloverExecuted = false;
  if (backupChecked) backupChecked.checked = false;
  if (confirmText) confirmText.value = "";
  if (summary) summary.innerHTML = "";
  if (executionResult) executionResult.innerHTML = "";
  if (!opts.keepResults && container) {
    container.innerHTML = `<div class="empty-message">会社と年度を選んで「切替内容を確認する」を押してください。</div>`;
  }

  renderCompanyLeaveYearRolloverTarget();
  updateCompanyRolloverExecuteButtonState();
}

function handleCompanyRolloverCompanyChange() {
  const fiscalYearInput = document.getElementById("companyRolloverFiscalYear");
  const companyCode = document.getElementById("companyRolloverCompanyCode").value;
  if (fiscalYearInput) {
    fiscalYearInput.value = getDefaultCompanyRolloverFiscalYear_(new Date(), companyCode);
  }
  resetCompanyLeaveYearRolloverDryRun();
}

function renderCompanyLeaveYearRolloverTarget() {
  const companyCode = document.getElementById("companyRolloverCompanyCode").value;
  const fiscalYear = Number(document.getElementById("companyRolloverFiscalYear").value || 0);
  const target = document.getElementById("companyRolloverTarget");
  const confirmTextGuide = document.getElementById("companyRolloverConfirmTextGuide");
  if (!target) return;

  const isPartner = companyCode === "PARTNER";
  const companyName = isPartner ? "（有）友尚建設" : "正社員";
  const startMonth = getCompanyRolloverFiscalStartMonth_(companyCode);
  const yearText = fiscalYear
    ? `${escapeHtml(fiscalYear - 1)}年度末 → ${escapeHtml(fiscalYear)}年度`
    : "年度を選択してください";

  target.innerHTML = `
    <strong>対象会社: ${escapeHtml(companyName)}</strong>
    <span>company_code: ${escapeHtml(companyCode)}</span>
    <span>年度開始: ${escapeHtml(startMonth)}月1日</span>
    <span>${yearText}</span>
  `;

  if (confirmTextGuide) {
    confirmTextGuide.textContent = getCompanyRolloverConfirmText_(companyCode, fiscalYear);
  }
}

function renderCompanyLeaveYearRolloverDryRun(result) {
  const summary = document.getElementById("companyRolloverSummary");
  const container = document.getElementById("companyRolloverResults");
  if (!container) return;

  const data = result || {};
  const rows = Array.isArray(data.rows) ? data.rows : [];

  const nextFiscalYear = Number(data.next_fiscal_year || 0);
  const targetCountBasis = data.target_count_basis || "社員マスターから自動判定";
  const targetConditionLabel = data.target_condition_label || getCompanyRolloverTargetConditionText_(data.company_code);
  const globalMessages = []
    .concat(Array.isArray(data.global_errors) ? data.global_errors : [])
    .concat(Array.isArray(data.global_warnings) ? data.global_warnings : []);

  if (summary) {
    summary.innerHTML = `
      <div class="partner-rollover-status ${data.can_execute ? "ready" : "blocked"}">
        <div class="company-rollover-result-heading">
          <strong>${data.can_execute ? "確認結果に問題はありません" : "確認が必要な項目があります"}</strong>
          <span>${data.can_execute ? "この内容で年度切替できる状態です。" : "注意・エラーの内容を確認してください。"}</span>
        </div>
        <div class="company-rollover-summary-grid">
          <div class="company-rollover-summary-card">
            <span>対象会社・年度</span>
            <strong>${escapeHtml(data.company_code || "")} / ${escapeHtml(nextFiscalYear)}年度</strong>
          </div>
          <div class="company-rollover-summary-card">
            <span>対象人数</span>
            <strong>${escapeHtml(data.target_employee_count || 0)}名</strong>
            <small>${escapeHtml(targetCountBasis)}</small>
          </div>
          <div class="company-rollover-summary-card ${Number(data.error_count || 0) > 0 ? "needs-check" : ""}">
            <span>エラー</span>
            <strong>${escapeHtml(data.error_count || 0)}件</strong>
          </div>

            <span>注意</span>
            <strong>${escapeHtml(data.warning_count || 0)}件</strong>
          </div>
          <div class="company-rollover-summary-card">
            <span>確定可否</span>
            <strong>${data.can_execute ? "確定できる状態" : "要確認"}</strong>
          </div>
        </div>
      </div>
      <div class="partner-rollover-global-messages">
        <div>対象人数は社員マスターから自動判定しています</div>
        <div>対象条件: ${escapeHtml(targetConditionLabel)}</div>
      </div>
      ${globalMessages.length > 0 ? `
        <div class="partner-rollover-global-messages">
          ${globalMessages.map(message => `<div>${escapeHtml(message)}</div>`).join("")}
        </div>
      ` : ""}

  }

  if (rows.length === 0) {
    container.innerHTML = `<div class="message error">対象となる社員を確認できませんでした。会社と年度を確認してください。</div>`;
    return;
  }

  container.innerHTML = `

      <table class="partner-rollover-table">
        <thead>
          <tr>

            <th>${escapeHtml(previousFiscalYear)}年度残</th>
            <th>繰越予定</th>
            <th>${escapeHtml(nextFiscalYear)}年度新規付与</th>
            <th>開始後予定残</th>
            <th>基準日付与回数</th>
            <th>${escapeHtml(nextFiscalYear)}年度レコード</th>
            <th>注意・エラー</th>

function updateCompanyRolloverExecuteButtonState() {
  const button = document.getElementById("companyRolloverExecuteButton");
  if (!button) return;
  button.disabled = !canExecuteCompanyLeaveYearRolloverFromAdmin();
  button.textContent = "年度切替を確定する";
}

function canExecuteCompanyLeaveYearRolloverFromAdmin() {
  const data = companyRolloverDryRunResult;
  const rows = data && Array.isArray(data.rows) ? data.rows : [];
  const companyCode = String(
    document.getElementById("companyRolloverCompanyCode").value || ""
  ).trim().toUpperCase();
  const fiscalYear = Number(
    document.getElementById("companyRolloverFiscalYear").value || 0
  );
  const backupChecked = document.getElementById("companyRolloverBackupChecked");
  const confirmText = document.getElementById("companyRolloverConfirmText");

  return (
    !companyRolloverExecuted &&
    !companyRolloverExecuting &&
    !!data &&
    data.dry_run === true &&
    data.can_execute === true &&
    String(data.company_code || "").trim().toUpperCase() === companyCode &&
    Number(data.next_fiscal_year || 0) === fiscalYear &&
    Number(data.error_count || 0) === 0 &&
    Number(data.warning_count || 0) === 0 &&
    rows.length > 0 &&
    rows.every(row => row.can_execute === true) &&
    !!(backupChecked && backupChecked.checked) &&
    String(confirmText && confirmText.value || "").trim() ===
      getCompanyRolloverConfirmText_(companyCode, fiscalYear)
  );
}

function getCompanyRolloverTargetConditionText_(companyCode) {
  const code = String(companyCode || "").trim().toUpperCase();
  if (code === "PARTNER") {
    return "友尚建設 / 6月開始 / 有給管理対象 / 在職";
  }
  return "MAIN / 4月開始 / 有給管理対象 / 在職";
}

function getCompanyRolloverConfirmText_(companyCode, fiscalYear) {
  const code = String(companyCode || "").trim().toUpperCase();
  const year = Number(fiscalYear || 0);
  if (!year) return "年度を選択してください";
  const companyLabel = code === "PARTNER" ? "友尚建設" : "MAIN";
  return companyLabel + year + "年度切替";
}

function getCompanyRolloverFiscalStartMonth_(companyCode) {
  const code = String(companyCode || "").trim().toUpperCase();
  return code === "PARTNER" ? 6 : 4;
}

function getDefaultCompanyRolloverFiscalYear_(dateValue, companyCode) {
  const date = dateValue instanceof Date ? dateValue : new Date();
  const startMonth = getCompanyRolloverFiscalStartMonth_(companyCode);
  const year = date.getFullYear();
  const month = date.getMonth() + 1;
  return month >= startMonth ? year : year - 1;
}

function executeCompanyLeaveYearRolloverFromAdmin() {
  const button = document.getElementById("companyRolloverExecuteButton");
  const executionResult = document.getElementById("companyRolloverExecutionResult");
  const companyCode = String(
    document.getElementById("companyRolloverCompanyCode").value || ""
  ).trim().toUpperCase();
  const fiscalYear = Number(
    document.getElementById("companyRolloverFiscalYear").value || 0
  );
  const data = companyRolloverDryRunResult || {};
  const companyName = companyCode === "PARTNER" ? "（有）友尚建設" : "正社員";
  const backupChecked = document.getElementById("companyRolloverBackupChecked");
  const confirmText = document.getElementById("companyRolloverConfirmText");

  if (!canExecuteCompanyLeaveYearRolloverFromAdmin()) {
    alert("年度切替を確定する条件を満たしていません。事前確認、バックアップ、確認入力を見直してください。");
    updateCompanyRolloverExecuteButtonState();
    return;
  }

  if (!confirm(
    companyName +
    "の" +
    fiscalYear +
    "年度切替を確定します。\n" +
    "対象社員: " +
    Number(data.target_employee_count || 0) +
    "名\n\n" +
    "バックアップを取得済みであることを確認しましたか？"
  )) return;

  if (!confirm(
    "最終確認です。\n" +
    "paid_leave_grants に" +
    fiscalYear +
    "年度の付与レコードを追加します。\n" +
    "実行後は元に戻せません。本当に実行しますか？"
  )) return;

  if (button) button.disabled = true;
  setCompanyRolloverExecutingState_(true);
  if (executionResult) {
    executionResult.innerHTML = `<div class="message">${escapeHtml(companyName)}の${escapeHtml(fiscalYear)}年度切替を確定しています...</div>`;
  }

  google.script.run
    .withSuccessHandler(result => {
      companyRolloverExecuted = true;
      setCompanyRolloverExecutingState_(false);
      const response = result || {};
      if (executionResult) {
        executionResult.innerHTML = `
          <div class="partner-rollover-complete">
            <strong>${escapeHtml(companyName)}の${escapeHtml(fiscalYear)}年度切替が完了しました。</strong>
            <div>追加件数: ${escapeHtml(response.created_count || 0)}件</div>
            <div>社員ID: ${escapeHtml((response.employee_ids || []).join(", "))}</div>
            <div>grant_id: ${escapeHtml((response.grant_ids || []).join(", "))}</div>
          </div>
        `;
      }
      updateCompanyRolloverExecuteButtonState();
    })
    .withFailureHandler(err => {
      setCompanyRolloverExecutingState_(false);
      console.error("会社別 年度切替確定エラー:", err);
      const message = err && err.message
        ? err.message
        : "年度切替の確定中にエラーが発生しました。";
      if (executionResult) {
        executionResult.innerHTML = `<div class="message error">${escapeHtml(message)}</div>`;
      }
      updateCompanyRolloverExecuteButtonState();
    })
    .executeCompanyLeaveYearRollover(companyCode, fiscalYear, {
      backup_confirmed: !!(backupChecked && backupChecked.checked),
      confirm_text: String(confirmText && confirmText.value || "").trim()
    });
}

function setCompanyRolloverExecutingState_(executing) {
  companyRolloverExecuting = executing === true;
  [
    "companyRolloverCompanyCode",
    "companyRolloverFiscalYear",
    "companyRolloverDryRunButton",
    "companyRolloverBackupChecked",
    "companyRolloverConfirmText"
  ].forEach(id => {
    const element = document.getElementById(id);
    if (element) element.disabled = companyRolloverExecuting;
  });
}

function loadYearEndCarryOverCandidates(keepPage) {
  pageOffsets.yearEnd = keepPage === true
    ? Math.max(0, Number(pageOffsets.yearEnd || 0))
    : 0;
  const fiscalYear = document.getElementById("yearEndFiscalYear").value;
  const summary = document.getElementById("yearEndSummary");
  const container = document.getElementById("yearEndCandidates");

  if (!fiscalYear) {
    if (summary) summary.innerHTML = `<div class="message error">対象年度を入力してください。</div>`;
    return;
  }

  if (summary) summary.innerHTML = "";
  if (container) {
    container.innerHTML = `<div class="message">年跨ぎ・繰越候補を生成しています...</div>`;
  }

  google.script.run
    .withSuccessHandler(renderYearEndCarryOverCandidates)
    .withFailureHandler(err => {
      console.error("年跨ぎ・繰越候補取得エラー:", err);
      const message = err && err.message
        ? err.message
        : "年跨ぎ・繰越候補の取得でエラーが発生しました。";
      if (container) {
        container.innerHTML = `<div class="message error">${escapeHtml(message)}</div>`;
      }
    })
    .getYearEndCarryOverCandidates(Number(fiscalYear), {
      offset: pageOffsets.yearEnd,
      limit: PAGE_SIZE
    });
}

function renderYearEndCarryOverCandidates(response) {
  const summary = document.getElementById("yearEndSummary");
  const container = document.getElementById("yearEndCandidates");
  if (!container) return;

  const rows = Array.isArray(response && response.rows) ? response.rows : [];
  const totalCount = response && response.total_count != null
    ? Number(response.total_count || 0)
    : rows.length;
  const warningCount = response && response.warning_count != null
    ? Number(response.warning_count || 0)
    : rows.filter(row => row.validity_warning).length;

  if (totalCount > 0 && rows.length === 0 && pageOffsets.yearEnd > 0) {
    pageOffsets.yearEnd = Math.max(0, pageOffsets.yearEnd - PAGE_SIZE);
    loadYearEndCarryOverCandidates(true);
    return;
  }

  if (summary) {
    summary.innerHTML = `
      <div class="year-end-count">
        対象年度：<strong>${escapeHtml(response && response.fiscal_year ? response.fiscal_year : "")}</strong>
        ／ 候補：<strong>${escapeHtml(totalCount)}</strong>件
        ／ 表示中の期限要確認：<strong>${escapeHtml(warningCount)}</strong>件
      </div>
    `;
  }

  if (rows.length === 0) {
    container.innerHTML = `<div class="empty-message">年跨ぎ・繰越候補はありません。</div>`;
    return;
  }

  container.innerHTML = `
    ${renderYearEndBulkActionBar(totalCount)}
    ${renderPager("yearEnd", response)}
    ${rows.map(row => `
    <div class="year-end-row ${row.is_finalized ? "finalized" : ""} audit-only">
      <div class="year-end-main">
        <div class="year-end-name-line">
          <label class="grant-candidate-check year-end-check">
            <input
              type="checkbox"
              class="year-end-finalize-checkbox"
              value="${escapeHtml(row.employee_id || "")}"
              data-employee-id="${escapeHtml(row.employee_id || "")}"
              data-name="${escapeHtml(row.display_name || row.name || row.employee_id)}"
              data-previous-remaining-days="${escapeHtml(row.previous_remaining_days)}"
              data-carry-over-candidate-days="${escapeHtml(row.carry_over_candidate_days)}"
              data-expired-days="${escapeHtml(row.expired_days)}"
              data-new-grant-days="${escapeHtml(row.new_grant_days)}"
              data-estimated-after-grant-days="${escapeHtml(row.estimated_after_grant_days)}"
              data-validity-warning="${escapeHtml(row.validity_warning || "")}"
              onchange="updateYearEndFinalizeSelectionCount()"
              disabled
            >
            <span>選択</span>
          </label>
          <span class="year-end-name">${escapeHtml(row.display_name || row.name || row.employee_id)}</span>
          <span class="year-end-id">${escapeHtml(row.employee_id || "")}</span>
          ${renderYearEndFinalizedBadge(row.is_finalized)}
          <span class="year-end-status-badge partner">監査用一覧: 確定は会社別パネルで処理</span>
          ${row.validity_warning ? `<span class="fifo-reason-badge needs-check">期限要確認</span>` : ""}

        <div class="year-end-meta">
          会社：${escapeHtml(row.company_name || row.company_code || "-")}
          ／ 部署：${escapeHtml(row.department || "-")}
          ／ ${escapeHtml(row.fiscal_start_month || 4)}月開始
        </div>
        ${row.validity_warning ? `
          <div class="year-end-meta">${escapeHtml(row.validity_warning)}</div>
        ` : ""}

        <div class="year-end-detail-grid">
          <div class="year-end-detail-item">

            <strong>${escapeHtml(row.fiscal_year_end_date || "")}</strong>

    <div class="year-end-bulk-action-bar">
      <div class="year-end-bulk-info">
        <div>繰越候補 ${escapeHtml(count)}件</div>

function getYearEndFinalizeCheckboxes() {
  return Array.from(document.querySelectorAll(".year-end-finalize-checkbox"));
}

function toggleYearEndFinalizeSelection(checked) {
  getYearEndFinalizeCheckboxes().forEach(checkbox => {
    if (!checkbox.disabled) checkbox.checked = checked;
  });
  updateYearEndFinalizeSelectionCount();
}

function updateYearEndFinalizeSelectionCount() {
  const countEl = document.getElementById("yearEndFinalizeSelectedCount");
  if (!countEl) return;

  const selectedCount = getYearEndFinalizeCheckboxes()
    .filter(checkbox => checkbox.checked && !checkbox.disabled)
    .length;

  countEl.textContent = String(selectedCount);
}

function getYearEndFinalizeItemFromElement(element) {
  return {
    employee_id: element.dataset.employeeId || element.value || "",
    name: element.dataset.name || "",
    previous_remaining_days: Number(element.dataset.previousRemainingDays || 0),
    carry_over_candidate_days: Number(element.dataset.carryOverCandidateDays || 0),
    expired_days: Number(element.dataset.expiredDays || 0),
    new_grant_days: Number(element.dataset.newGrantDays || 0),
    estimated_after_grant_days: Number(element.dataset.estimatedAfterGrantDays || 0),
    validity_warning: element.dataset.validityWarning || ""
  };
}

function getSelectedYearEndFinalizeItems() {
  return getYearEndFinalizeCheckboxes()
    .filter(checkbox => checkbox.checked && !checkbox.disabled)
    .map(getYearEndFinalizeItemFromElement);
}

function buildYearEndFinalizeConfirmMessage(item) {
  return [
    item.name || "",
    `社員ID: ${item.employee_id || ""}`,
    "",
    `前年度残: ${formatDays(item.previous_remaining_days)}`,
    `繰越: ${formatDays(item.carry_over_candidate_days)}`,
    `消滅見込み: ${formatDays(item.expired_days)}`,
    `新規付与: ${formatDays(item.new_grant_days)}`,
    `付与後見込み: ${formatDays(item.estimated_after_grant_days)}`,
    item.validity_warning ? `注意: ${item.validity_warning}` : "",
    "",
    "この内容で年跨ぎ・繰越を確定しますか？"
  ].join("\n");
}

function buildBulkYearEndFinalizeConfirmMessage(items) {
  const rows = Array.isArray(items) ? items : [];
  const detailRows = rows.slice(0, 10).map((item, index) => [
    `${index + 1}. ${item.name || ""} / ${item.employee_id || ""}`,
    `   繰越: ${formatDays(item.carry_over_candidate_days)} / 消滅: ${formatDays(item.expired_days)} / 新規付与: ${formatDays(item.new_grant_days)}`,
    item.validity_warning ? `   注意: ${item.validity_warning}` : ""
  ].join("\n"));

  if (rows.length > 10) {
    detailRows.push(`ほか${rows.length - 10}名`);
  }

  return [
    `${rows.length}名の年跨ぎ・繰越を確定します。`,
    "",
    detailRows.join("\n\n"),
    "",
    "この内容で paid_leave_grants に次年度付与として登録します。",
    "よろしいですか？"
  ].join("\n");
}

function buildYearEndFinalizeBatchResultMessage(res) {
  const data = res || {};
  const errors = Array.isArray(data.results)
    ? data.results.filter(item => item.status === "error")
    : [];
  const skipped = Array.isArray(data.results)
    ? data.results.filter(item => item.status === "skipped")
    : [];
  let message =
    `年跨ぎ・繰越の一括確定が完了しました。\n` +
    `成功: ${data.success_count || 0}名\n` +
    `スキップ: ${data.skipped_count || 0}名\n` +
    `失敗: ${data.error_count || 0}名`;

  if (skipped.length > 0) {
    message += "\n\nスキップ:\n" + skipped
      .slice(0, 5)
      .map(item => `${item.employee_id}: ${item.message}`)
      .join("\n");
  }

  if (errors.length > 0) {
    message += "\n\nエラー:\n" + errors
      .slice(0, 5)
      .map(item => `${item.employee_id}: ${item.message}`)
      .join("\n");
  }

  return message;
}

function renderYearEndFinalizedBadge(isFinalized) {
  return isFinalized
    ? `<span class="year-end-status-badge finalized">確定済み</span>`
    : `<span class="year-end-status-badge pending">未確定</span>`;
}

function clearYearEndCarryOverCandidates() {
  const summary = document.getElementById("yearEndSummary");
  const container = document.getElementById("yearEndCandidates");

  pageOffsets.yearEnd = 0;
  if (summary) summary.innerHTML = "";
  if (container) {
    container.innerHTML = `<div class="empty-message">対象年度を入力して「候補生成」を押してください</div>`;
  }
}

function bindCompanyCalendarAdminEvents() {
  const fiscalYear = document.getElementById("companyCalendarFiscalYear");
  const fiscalStartMonth = document.getElementById("companyCalendarFiscalStartMonth");

  if (fiscalYear) fiscalYear.oninput = updateCompanyCalendarPeriodText;
  if (fiscalStartMonth) fiscalStartMonth.onchange = updateCompanyCalendarPeriodText;
}

function getCompanyCalendarAdminParams() {
  const fiscalYear = Number(document.getElementById("companyCalendarFiscalYear").value || 0);
  const fiscalStartMonth = Number(document.getElementById("companyCalendarFiscalStartMonth").value || 4);

  if (!fiscalYear) {
    throw new Error("年度を入力してください。");
  }

  if (fiscalStartMonth < 1 || fiscalStartMonth > 12) {
    throw new Error("年度開始月を選択してください。");
  }

  return { fiscalYear, fiscalStartMonth };
}

function getCompanyCalendarPeriodLabel(fiscalYear, fiscalStartMonth) {
  if (!fiscalYear || !fiscalStartMonth) return "";

  const start = new Date(Number(fiscalYear), Number(fiscalStartMonth) - 1, 1);
  const end = new Date(Number(fiscalYear) + 1, Number(fiscalStartMonth) - 1, 0);

  return `${formatDisplayDate(toInputDate(start))}〜${formatDisplayDate(toInputDate(end))}`;
}

function updateCompanyCalendarPeriodText() {
  const period = document.getElementById("companyCalendarPeriod");
  if (!period) return;

  const fiscalYear = Number(document.getElementById("companyCalendarFiscalYear").value || 0);
  const fiscalStartMonth = Number(document.getElementById("companyCalendarFiscalStartMonth").value || 4);
  period.value = getCompanyCalendarPeriodLabel(fiscalYear, fiscalStartMonth);
}

function showCompanyCalendarMessage(message, type) {
  const el = document.getElementById("companyCalendarMessage");
  if (!el) return;

  if (!message) {
    el.innerHTML = "";
    return;
  }

  const cls = type === "error" ? "message error" : "message success";
  el.innerHTML = `<div class="${cls}">${escapeHtml(message)}</div>`;
}

function setCompanyCalendarSaveButtonVisible(visible) {
  const button = document.getElementById("companyCalendarSaveButton");
  if (!button) return;
  button.style.display = visible ? "inline-flex" : "none";
}

function loadCompanyCalendarAdminRows() {
  let params;

  try {
    params = getCompanyCalendarAdminParams();
  } catch (err) {
    showCompanyCalendarMessage(err.message, "error");
    return;
  }

  showCompanyCalendarMessage("", "");
  setCompanyCalendarSaveButtonVisible(false);
  showLoading("companyCalendarTable", "会社カレンダーを読み込んでいます...");

  google.script.run
    .withSuccessHandler(data => {
      renderCompanyCalendarAdminRows(data);
    })
    .withFailureHandler(err => {
      console.error("会社カレンダー取得エラー:", err);
      setCompanyCalendarSaveButtonVisible(false);
      showError(
        "companyCalendarTable",
        err && err.message ? err.message : "会社カレンダーの取得でエラーが発生しました。"
      );
    })
    .getCompanyCalendarRowsForAdmin(params.fiscalYear, params.fiscalStartMonth);
}

function generateCompanyCalendarForAdmin() {
  let params;

  try {
    params = getCompanyCalendarAdminParams();
  } catch (err) {
    showCompanyCalendarMessage(err.message, "error");
    return;
  }

  const period = getCompanyCalendarPeriodLabel(params.fiscalYear, params.fiscalStartMonth);
  const ok = confirm(
    `${params.fiscalYear}年度（${params.fiscalStartMonth}月開始）の会社カレンダーを生成します。\n` +
    `期間: ${period}\n\n` +
    "既に登録済みの日付は上書きせず、未登録の日付だけ追加します。"
  );

  if (!ok) return;

  showCompanyCalendarMessage("会社カレンダーを生成しています...", "");

  google.script.run
    .withSuccessHandler(res => {
      showCompanyCalendarMessage(
        `生成しました。追加件数: ${res.added_count || 0}件 / 既存のためスキップ: ${res.skipped_count || 0}件`,
        "success"
      );
      loadCompanyCalendarAdminRows();
    })
    .withFailureHandler(err => {
      console.error("会社カレンダー生成エラー:", err);
      showCompanyCalendarMessage(
        err && err.message ? err.message : "会社カレンダーの生成でエラーが発生しました。",
        "error"
      );
    })
    .generateCompanyCalendarFiscalYear(params.fiscalYear, params.fiscalStartMonth);
}

function renderCompanyCalendarAdminRows(data) {
  const container = document.getElementById("companyCalendarTable");
  if (!container) return;

  const rows = data && Array.isArray(data.rows) ? data.rows : [];

  if (rows.length === 0) {
    setCompanyCalendarSaveButtonVisible(false);
    container.innerHTML = `<div class="empty-message">表示できる日付がありません。</div>`;
    return;
  }

  container.innerHTML = `
    <table class="company-calendar-table">
      <thead>
        <tr>
          <th>日付</th>
          <th>曜日</th>
          <th>区分</th>
          <th>備考</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(renderCompanyCalendarAdminRow).join("")}
      </tbody>
    </table>
  `;
  setCompanyCalendarSaveButtonVisible(true);
}

function renderCompanyCalendarAdminRow(row) {
  const date = escapeHtml(row.date || "");
  const day = escapeHtml(row.day_of_week || "");
  const type = String(row.type || "workday");
  const notes = escapeHtml(row.notes || "");
  const isSunday = row.day_of_week === "日";
  const sundayClass = isSunday ? " sunday-row" : "";
  const disabled = isSunday ? " disabled" : "";

  return `
    <tr class="company-calendar-row${sundayClass}" data-date="${date}" data-day="${day}">
      <td class="calendar-date-cell">${formatDisplayDate(date)}</td>
      <td>${day}</td>
      <td>
        <select class="company-calendar-type"${disabled}>
          <option value="workday"${type === "workday" ? " selected" : ""}>出勤日</option>
          <option value="holiday"${type === "holiday" ? " selected" : ""}>会社休日</option>
          <option value="no_leave"${type === "no_leave" ? " selected" : ""}>有給取得不可日</option>
        </select>
      </td>
      <td>
        <input class="company-calendar-notes" type="text" value="${notes}" placeholder="備考">
      </td>
    </tr>
  `;
}

function saveCompanyCalendarAdminRows() {
  const rowEls = Array.from(document.querySelectorAll(".company-calendar-row"));

  if (rowEls.length === 0) {
    showCompanyCalendarMessage("保存するカレンダー行がありません。", "error");
    return;
  }

  const ok = confirm("表示中の会社カレンダーをまとめて保存します。よろしいですか。");
  if (!ok) return;

  const rows = rowEls.map(rowEl => {
    const day = rowEl.getAttribute("data-day");
    const typeEl = rowEl.querySelector(".company-calendar-type");
    const notesEl = rowEl.querySelector(".company-calendar-notes");

    return {
      date: rowEl.getAttribute("data-date"),
      type: day === "日" ? "holiday" : typeEl.value,
      notes: notesEl.value
    };
  });

  showCompanyCalendarMessage("会社カレンダーを保存しています...", "");

  google.script.run
    .withSuccessHandler(res => {
      showCompanyCalendarMessage(
        `保存しました。更新: ${res.updated_count || 0}件 / 追加: ${res.added_count || 0}件`,
        "success"
      );
      loadCompanyCalendarAdminRows();
    })
    .withFailureHandler(err => {
      console.error("会社カレンダー保存エラー:", err);
      showCompanyCalendarMessage(
        err && err.message ? err.message : "会社カレンダーの保存でエラーが発生しました。",
        "error"
      );
    })
    .updateCompanyCalendarRowsForAdmin(rows);
}
</script>
