<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include('style'); ?>
</head>
<body>
  <?!= include('nav'); ?>

  <div class="app-shell">
    <header class="app-header">
      <h1 class="app-title">社員マスター管理</h1>
      <p class="app-subtitle">社員情報の検索・追加・編集・退職処理を行います</p>
    </header>

    <section class="screen active">
      <div class="screen-card">

        <div class="group-header">
          <div>
            <div class="section-title">社員検索</div>
            <div class="section-subtitle">氏名・ふりがな・社員番号・会社名で検索できます</div>
          </div>
        </div>

        <div class="employee-form-grid">
          <div class="field full-width">
            <label for="employeeSearchKeyword">検索キーワード</label>
            <input
              type="text"
              id="employeeSearchKeyword"
              placeholder="例：山田 / やまだ / W0001 / 友尚"
              oninput="handleEmployeeSearchInput()"
            >
          </div>

          <div class="field">
            <label for="filterEmploymentStatus">在職状況</label>
            <select id="filterEmploymentStatus" onchange="handleEmployeeSearchInput()">
              <option value="">すべて</option>
              <option value="active">在職</option>
              <option value="leave">休職</option>
              <option value="retired">退職</option>
            </select>
          </div>

          <div class="field">
            <label for="filterEmploymentType">雇用区分</label>
            <select id="filterEmploymentType" onchange="handleEmployeeSearchInput()">
              <option value="">すべて</option>
              <option value="regular">正社員</option>
              <option value="partner">協力企業</option>
              <option value="part_time">パート</option>
              <option value="trainee">研修生</option>
              <option value="executive">役員</option>
              <option value="other">その他</option>
            </select>
          </div>
        </div>

        <div id="employeeAdminStatus" class="status-box">
          検索条件を入力すると、ここに結果が表示されます。
        </div>

        <div id="employeeList" class="history-list"></div>

        <div class="submit-area" style="margin-top:24px;">
          <button
            id="toggleAddEmployeeBtn"
            class="submit-btn"
            type="button"
            onclick="toggleAddEmployeeForm()"
          >
            ＋ 新しい社員を追加する
          </button>
        </div>

        <div id="addEmployeeFormArea" style="display:none; margin-top:24px;">
          <div class="group-header">
            <div>
              <div class="section-title">社員追加</div>
              <div class="section-subtitle">
                employee_id・display_employee_id・display_order は自動で設定されます
              </div>
            </div>
          </div>

          <div class="employee-form-grid">
            <div class="field">
              <label for="name">氏名 *</label>
              <input type="text" id="name" placeholder="例：山田 太郎">
            </div>

            <div class="field">
              <label for="nameKana">ふりがな *</label>
              <input type="text" id="nameKana" placeholder="例：やまだ たろう">
            </div>

            <div class="field">
              <label for="companyCode">会社区分 *</label>
              <select id="companyCode" onchange="handleCompanyCodeChange()">
                <option value="MAIN">MAIN（正社員・自社）</option>
                <option value="PARTNER">PARTNER（協力企業）</option>
              </select>
            </div>

            <div class="field">
              <label for="companyName">会社名</label>
              <input type="text" id="companyName" placeholder="例：株式会社〇〇">
            </div>

            <div class="field">
              <label for="department">部署</label>
              <input type="text" id="department" placeholder="例：工事部">
            </div>

            <div class="field">
              <label for="employmentType">雇用区分</label>
              <select id="employmentType">
                <option value="">選択してください</option>
                <option value="regular">正社員</option>
                <option value="partner">協力企業</option>
                <option value="part_time">パート</option>
                <option value="trainee">研修生</option>
                <option value="executive">役員</option>
                <option value="other">その他</option>
              </select>
            </div>

            <div class="field">
              <label for="employmentStatus">在職状況</label>
              <select id="employmentStatus">
                <option value="active">在職</option>
                <option value="leave">休職</option>
                <option value="retired">退職</option>
              </select>
            </div>

            <div class="field">
              <label for="hireDate">入社日</label>
              <input type="date" id="hireDate">
            </div>

            <div class="field">
              <label for="leaveDate">退職日</label>
              <input type="date" id="leaveDate">
            </div>

            <div class="field">
              <label for="workDaysPerWeek">週所定労働日数</label>
              <input type="number" id="workDaysPerWeek" min="0" max="7" step="0.5" placeholder="例：5">
            </div>

            <div class="field">
              <label for="fiscalStartMonth">有給年度開始月</label>
              <select id="fiscalStartMonth">
                <option value="4">4月開始</option>
                <option value="7">7月開始</option>
              </select>
            </div>

            <div class="field">
              <label for="leaveManagementTarget">有給管理対象</label>
              <select id="leaveManagementTarget">
                <option value="TRUE">対象</option>
                <option value="FALSE">対象外</option>
              </select>
            </div>

            <div class="field full-width">
              <label for="notes">備考</label>
              <textarea id="notes" rows="3" placeholder="メモがあれば入力してください"></textarea>
            </div>
          </div>

          <div class="submit-area">
            <button id="addEmployeeBtn" class="submit-btn" type="button" onclick="submitEmployee()">
              社員を追加する
            </button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- 社員編集モーダル -->
<div id="editEmployeeModal" class="modal-overlay" style="display:none;">
  <div class="modal-card">
    <div class="modal-header">
      <div>
        <div class="modal-title">社員情報を編集</div>
        <div id="editEmployeeSubTitle" class="modal-subtitle"></div>
      </div>

      <button type="button" class="modal-close-btn" onclick="closeEditEmployeeModal()">×</button>
    </div>

    <div class="employee-form-grid">
      <div class="field">
        <label for="editName">氏名 *</label>
        <input type="text" id="editName">
      </div>

      <div class="field">
        <label for="editNameKana">ふりがな *</label>
        <input type="text" id="editNameKana">
      </div>

      <div class="field">
        <label for="editCompanyCode">会社区分 *</label>
        <select id="editCompanyCode">
          <option value="MAIN">MAIN（正社員・自社）</option>
          <option value="PARTNER">PARTNER（協力企業）</option>
        </select>
      </div>

      <div class="field">
        <label for="editCompanyName">会社名</label>
        <input type="text" id="editCompanyName">
      </div>

      <div class="field">
        <label for="editDepartment">部署</label>
        <input type="text" id="editDepartment">
      </div>

      <div class="field">
        <label for="editEmploymentType">雇用区分</label>
        <select id="editEmploymentType">
          <option value="">選択してください</option>
          <option value="regular">正社員</option>
          <option value="partner">協力企業</option>
          <option value="part_time">パート</option>
          <option value="trainee">研修生</option>
          <option value="executive">役員</option>
          <option value="other">その他</option>
        </select>
      </div>

      <div class="field">
        <label for="editEmploymentStatus">在職状況</label>
        <select id="editEmploymentStatus">
          <option value="active">在職</option>
          <option value="leave">休職</option>
          <option value="retired">退職</option>
        </select>
      </div>

      <div class="field">
        <label for="editHireDate">入社日</label>
        <input type="date" id="editHireDate">
      </div>

      <div class="field">
        <label for="editLeaveDate">退職日</label>
        <input type="date" id="editLeaveDate">
      </div>

      <div class="field">
        <label for="editWorkDaysPerWeek">週所定労働日数</label>
        <input type="number" id="editWorkDaysPerWeek" min="0" max="7" step="0.5">
      </div>

      <div class="field">
        <label for="editFiscalStartMonth">有給年度開始月</label>
        <select id="editFiscalStartMonth">
          <option value="4">4月開始</option>
          <option value="7">7月開始</option>
        </select>
      </div>

      <div class="field">
        <label for="editLeaveManagementTarget">有給管理対象</label>
        <select id="editLeaveManagementTarget">
          <option value="TRUE">対象</option>
          <option value="FALSE">対象外</option>
        </select>
      </div>

      <div class="field full-width">
        <label for="editNotes">備考</label>
        <textarea id="editNotes" rows="3"></textarea>
      </div>
    </div>

    <div id="editEmployeeStatus" class="status-box">
      内容を確認して保存してください。
    </div>

    <div class="modal-actions">
      <button type="button" class="admin-action-btn" onclick="submitEditEmployee()">保存する</button>
      <button type="button" class="admin-action-btn modal-cancel-btn" onclick="closeEditEmployeeModal()">キャンセル</button>
    </div>
  </div>
</div>

  <?!= include('employee-admin-script'); ?>
</body>
</html>
