<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include('admin-style'); ?>
  <?!= include('style'); ?>
</head>

<body>
  <?!= includeTemplate('nav'); ?>

  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1 class="login-title">社員の有給状況</h1>
      <p class="login-subtitle">管理者を選択してPINを入力してください</p>

      <div class="field">
        <label for="adminUserSelect">管理者</label>
        <select id="adminUserSelect">
          <option value="">読み込み中...</option>
        </select>
      </div>

      <div class="field">
        <label for="adminPinInput">PIN</label>
        <input type="password" id="adminPinInput" inputmode="numeric" placeholder="PINを入力">
      </div>

      <button class="btn btn-search login-btn" type="button" onclick="loginAdmin()">
        ログイン
      </button>

      <div id="loginMessage" class="login-message"></div>
    </div>
  </div>

  <div id="adminApp" class="page admin-app-hidden">
    <div id="loginUserBar" class="login-user-bar"></div>

    <div class="header">
      <h1 class="title">社員の有給状況</h1>
      <p class="subtitle">全社員の有給残数、期限、5日取得状況を確認できます。</p>
    </div>

    <section class="admin-section paid-leave-dashboard-section">
      <div class="section-heading-row">
        <div>
          <div class="section-kicker">有給状況</div>
          <h2 class="section-heading">社員の有給状況</h2>
          <p class="section-description">有給管理対象者の残日数、年度取得日数、期限、5日取得状況を一覧で確認します。</p>
        </div>
      </div>

      <div class="paid-leave-dashboard-card">
        <div class="paid-leave-summary-grid">
          <div class="paid-leave-summary-card clickable"
               role="button"
               tabindex="0"
               data-filter="all"
               onclick="setPaidLeaveDashboardQuickFilter('all')"
               onkeydown="handlePaidLeaveDashboardSummaryKey(event, 'all')">
            <span>有給管理対象者数</span>
            <strong id="pldTargetCount">-</strong>
          </div>
          <div class="paid-leave-summary-card warning clickable"
               role="button"
               tabindex="0"
               data-filter="five_day"
               onclick="setPaidLeaveDashboardQuickFilter('five_day')"
               onkeydown="handlePaidLeaveDashboardSummaryKey(event, 'five_day')">
            <span>5日取得が足りない可能性</span>
            <strong id="pldFiveDayIncompleteCount">-</strong>
          </div>
          <div class="paid-leave-summary-card within-90 clickable"
               role="button"
               tabindex="0"
               data-filter="expiry_soon"
               onclick="setPaidLeaveDashboardQuickFilter('expiry_soon')"
               onkeydown="handlePaidLeaveDashboardSummaryKey(event, 'expiry_soon')">
            <span>90日以内期限切れ人数</span>
            <strong id="pldWithin90Count">-</strong>
          </div>
          <div class="paid-leave-summary-card within-30 clickable"
               role="button"
               tabindex="0"
               data-filter="expiry_soon"
               onclick="setPaidLeaveDashboardQuickFilter('expiry_soon')"
               onkeydown="handlePaidLeaveDashboardSummaryKey(event, 'expiry_soon')">
            <span>30日以内期限切れ人数</span>
            <strong id="pldWithin30Count">-</strong>
          </div>
          <div class="paid-leave-summary-card expired clickable"
               role="button"
               tabindex="0"
               data-filter="needs_now"
               onclick="setPaidLeaveDashboardQuickFilter('needs_now')"
               onkeydown="handlePaidLeaveDashboardSummaryKey(event, 'needs_now')">
            <span>期限切れ残あり人数</span>
            <strong id="pldExpiredCount">-</strong>
          </div>
        </div>

        <div class="paid-leave-dashboard-filters">
          <div class="field">
            <label for="pldFiscalYear">年度</label>
            <input type="number" id="pldFiscalYear" min="2020" step="1">
          </div>

          <div class="field">
            <label for="pldCompany">会社</label>
            <select id="pldCompany">
              <option value="ALL">ALL</option>
              <option value="MAIN">MAIN</option>
              <option value="PARTNER">PARTNER</option>
            </select>
          </div>

          <div class="field">
            <label for="pldKeyword">氏名検索</label>
            <input type="text" id="pldKeyword" placeholder="氏名・社員ID・会社名">
          </div>

          <label class="paid-leave-filter-check">
            <input type="checkbox" id="pldFiveDayOnly">
            <span>5日未達のみ</span>
          </label>

          <label class="paid-leave-filter-check">
            <input type="checkbox" id="pldExpiredOnly">
            <span>期限切れ・期限間近のみ</span>
          </label>

          <button class="btn btn-search" type="button" onclick="loadPaidLeaveDashboard()">
            表示する
          </button>
        </div>

        <div class="paid-leave-quick-filters" aria-label="有給状況のクイックフィルタ">
          <button class="paid-leave-quick-filter active"
                  type="button"
                  data-filter="all"
                  onclick="setPaidLeaveDashboardQuickFilter('all')">
            すべて
          </button>
          <button class="paid-leave-quick-filter"
                  type="button"
                  data-filter="needs_now"
                  onclick="setPaidLeaveDashboardQuickFilter('needs_now')">
            今すぐ確認
          </button>
          <button class="paid-leave-quick-filter"
                  type="button"
                  data-filter="expiry_soon"
                  onclick="setPaidLeaveDashboardQuickFilter('expiry_soon')">
            期限が近い
          </button>
          <button class="paid-leave-quick-filter"
                  type="button"
                  data-filter="five_day"
                  onclick="setPaidLeaveDashboardQuickFilter('five_day')">
            5日取得が足りない可能性
          </button>
        </div>

        <div class="paid-leave-dashboard-sort-note">
          確認が必要な社員から順に表示しています。
        </div>

        <div id="paidLeaveDashboardMessage" class="message-area"></div>
        <div id="paidLeaveDashboardCaption" class="paid-leave-dashboard-caption"></div>

        <div class="paid-leave-dashboard-table-wrap">
          <table class="paid-leave-dashboard-table">
            <thead>
              <tr>
                <th>氏名</th>
                <th>会社</th>
                <th>現在残日数</th>
                <th>年度取得日数</th>
                <th>5日取得状況</th>
                <th>期限切れ日数</th>
                <th>最短期限日</th>
              </tr>
            </thead>
            <tbody id="paidLeaveDashboardTable">
              <tr>
                <td colspan="7">読み込み中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <?!= include('admin-common-script'); ?>
  <?!= include('admin-auth-script'); ?>
  <?!= include('leave-dashboard-script'); ?>
</body>
</html>
