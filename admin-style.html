<style>
  :root {
  --bg-main:#f3f9fb;
  --bg-sub:#dceff5;
  --card-bg:#ffffff;

  --primary:#4f9fba;
  --primary-dark:#2f6f86;
  --primary-light:#d9f0f5;

  --accent-blue:#3f8fc5;
  --accent-red:#d94f78;
  --accent-orange:#e59a45;
  --accent-brown:#7a8fa0;

  --text-main:#263238;
  --text-sub:#60727a;
  --border:#d2e4ea;

  --shadow:0 3px 10px rgba(47,111,134,.10);
  --radius:12px;
}

  * { box-sizing:border-box; }
  body { margin:0; font-family:sans-serif; background:var(--bg-main); color:var(--text-main); }
  .page { max-width:1200px; margin:0 auto; padding:20px 16px 40px; }

  .header,.search-card,.tool-card,.current-range-box,.compact-card {
    background:#fff; border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow);
  }

  .header { background:linear-gradient(135deg,var(--primary-light),var(--bg-sub)); padding:18px; margin-bottom:14px; }
  .title { margin:0 0 6px; font-size:26px; color:var(--primary-dark); }
  .subtitle { margin:0; color:var(--text-sub); font-size:14px; }

  .current-range-box {
    padding:12px 16px; margin-bottom:14px; font-weight:bold;
    color:var(--primary-dark); background:#f8fbf7; border-left:7px solid var(--primary);
  }

  .search-card,.tool-card { padding:14px; }
  .search-card { margin-bottom:18px; }
  .search-title,.tool-title { font-size:16px; font-weight:bold; color:var(--primary-dark); margin-bottom:10px; }

  .search-grid { display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:10px; }
  .search-actions { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }

  .toolbar { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:18px; }

  .field { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
  .field label { font-size:13px; color:var(--text-sub); font-weight:bold; }
  .field input,.field select {
    width:100%; border:1px solid var(--border); border-radius:10px;
    padding:9px 11px; background:#fff; font-size:14px;
  }

  .tabs { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .tab-btn {
    border-radius:999px; padding:10px 18px; cursor:pointer; font-size:14px; font-weight:bold;
    background:#fff; color:var(--primary-dark); border:1px solid var(--border);
  }
  .tab-btn.active { background:var(--primary-dark); color:#fff; border-color:var(--primary-dark); }

  .message {
    background:#fff; border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; color:var(--text-sub); box-shadow:var(--shadow);
  }
  .message.error { border-left:6px solid var(--accent-red); color:var(--accent-red); font-weight:bold; }
  .message.success { border-left:6px solid var(--primary); color:var(--primary-dark); font-weight:bold; }

  .card-container { display:flex; flex-direction:column; gap:10px; }

  /* compact request card */
  .compact-card {
    padding:12px 14px;
    display:grid;
    grid-template-columns: 1fr auto;
    gap:12px;
    align-items:center;
  }
  .compact-card.pending { border-left:7px solid var(--accent-blue); }
  .compact-card.approved { border-left:7px solid var(--primary); }
  .compact-card.rejected { border-left:7px solid var(--accent-red); }

  .compact-main { min-width:0; }
  .compact-top {
    display:flex; flex-wrap:wrap; align-items:center; gap:8px 12px; margin-bottom:6px;
  }
  .compact-name { font-size:18px; font-weight:bold; color:var(--text-main); }
  .compact-id { font-size:12px; color:var(--text-sub); }
  .compact-date { font-size:15px; font-weight:bold; color:var(--primary-dark); }
  .compact-meta {
    display:flex; flex-wrap:wrap; gap:6px;
    color:var(--text-sub); font-size:13px; line-height:1.5;
  }
  .mini-chip {
    display:inline-flex; align-items:center; gap:4px;
    border:1px solid #eee8dc; background:#faf9f6; border-radius:999px;
    padding:4px 9px;
  }
  .mini-chip strong { color:var(--text-main); }

  .compact-detail {
    margin-top:6px;
    font-size:12px;
    color:var(--text-sub);
    word-break:break-all;
  }

  .status-badge {
    display:inline-block; padding:4px 9px; border-radius:999px;
    font-size:12px; font-weight:bold; color:#fff;
  }
  .status-badge.pending { background:var(--accent-blue); }
  .status-badge.approved { background:var(--primary); }
  .status-badge.rejected { background:var(--accent-red); }

  .compact-actions {
    display:flex;
    gap:8px;
    align-items:center;
    justify-content:flex-end;
    min-width:190px;
  }

  .btn {
    border:none; border-radius:10px; padding:10px 12px;
    font-size:13px; font-weight:bold; cursor:pointer; color:#fff;
  }
  .btn-approve { background:var(--primary); }
  .btn-reject { background:var(--accent-red); }
  .btn-refresh,.btn-reset { background:var(--accent-orange); }
  .btn-search,.btn-export-monthly { background:var(--accent-blue); }
  .btn-export-yearly { background:var(--accent-brown); width:100%; }
  .btn-export-monthly { width:100%; }

  .log-list { display:flex; flex-direction:column; gap:10px; }
  .log-card {
    background:#fff; border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:12px 14px;
  }
  .log-title { font-weight:bold; margin-bottom:6px; color:var(--primary-dark); }
  .log-meta { color:var(--text-sub); font-size:13px; line-height:1.6; }

 /* =========================
   仕上げ調整：爽やか・押しやすい・ミス防止
========================= */

/* カードに軽い操作感を出す */
.compact-card {
  transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
}

.compact-card:hover {
  background: #f7fcfe;
  transform: translateY(-1px);
  box-shadow: 0 5px 14px rgba(47, 111, 134, 0.12);
}

/* 承認ボタン：明るく押しやすく */
.btn-approve {
  background: #4f9fba;
}

.btn-approve:hover {
  background: #5fb3cf;
}

/* 否認ボタン：ミス防止のため注意色を少し強める */
.btn-reject {
  background: #d94f78;
}

.btn-reject:hover {
  background: #e23f75;
}

/* 検索・出力ボタンも少し反応を出す */
.btn-search:hover,
.btn-export-monthly:hover {
  background: #4aa1d1;
}

.btn-reset:hover,
.btn-refresh:hover {
  background: #f0a64f;
}

.btn-export-yearly:hover {
  background: #8da1b2;
}

/* カード内の情報チップを軽くする */
.mini-chip {
  background: #f5fbfd;
  border: 1px solid #e3f1f6;
}

/* ステータスバッジを少し柔らかく */
.status-badge {
  opacity: 0.9;
}

/* ミス防止：否認ボタンだけ少し目立つ枠をつける */
.btn-reject {
  border: 2px solid rgba(217, 79, 120, 0.2);
}

/* ミス防止：承認・否認ボタンの押せる感を強める */
.btn:hover {
  transform: translateY(-1px);
  transition: 0.15s ease;
}

.btn:active {
  transform: translateY(0);
  opacity: 0.85;
}

  @media (max-width:900px) {
    .toolbar,.search-grid { grid-template-columns:1fr; }
  }

  @media (max-width:760px) {
    .compact-card { grid-template-columns:1fr; }
    .compact-actions { min-width:0; justify-content:flex-start; flex-wrap:wrap; }
    .btn { width:auto; }
  }
</style>
