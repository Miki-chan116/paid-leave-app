<style>
  :root {
  --bg-main:#f3f9fb;
  --bg-sub:#dceff5;
  --card-bg:#ffffff;

  --primary:#4f9fba;
  --primary-dark:#2f6f86;
  --primary-light:#d9f0f5;

  --accent-blue:#3f8fc5;
  --accent-red:#d94f78;
  --accent-orange:#e59a45;
  --accent-brown:#7a8fa0;

  --text-main:#263238;
  --text-sub:#60727a;
  --border:#d2e4ea;

  --shadow:0 3px 10px rgba(47,111,134,.10);
  --radius:12px;
}

  * { box-sizing:border-box; }
  body { margin:0; font-family:sans-serif; background:var(--bg-main); color:var(--text-main); }
  .page { max-width:1200px; margin:0 auto; padding:20px 16px 48px; }

  .header,.search-card,.tool-card,.current-range-box,.compact-card {
    background:#fff; border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow);
  }

  .header { background:linear-gradient(135deg,var(--primary-light),var(--bg-sub)); padding:18px; margin-bottom:14px; }
  .title { margin:0 0 6px; font-size:26px; color:var(--primary-dark); }
  .subtitle { margin:0; color:var(--text-sub); font-size:14px; }

  .current-range-box {
    padding:12px 16px; margin-bottom:14px; font-weight:bold;
    color:var(--primary-dark); background:#f8fbf7; border-left:7px solid var(--primary);
  }

  .admin-section {
    margin-top: 18px;
  }

  .section-heading-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 12px;
  }

  .section-kicker {
    display: inline-block;
    margin-bottom: 5px;
    padding: 4px 9px;
    border-radius: 999px;
    background: #eef8fb;
    border: 1px solid #d8edf4;
    color: var(--accent-blue);
    font-size: 12px;
    font-weight: 900;
  }

  .section-heading {
    margin: 0;
    font-size: 22px;
    color: var(--primary-dark);
  }

  .section-description {
    margin: 4px 0 0;
    color: var(--text-sub);
    font-size: 14px;
  }

  .search-card,.tool-card { padding:14px; }
  .search-card { margin-bottom:18px; }
  .search-title,.tool-title { font-size:16px; font-weight:bold; color:var(--primary-dark); margin-bottom:10px; }

  .search-grid { display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:10px; }
  .search-actions { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
  .search-actions-spread { justify-content:flex-end; }
  .request-search-card { margin-bottom:14px; }
  .search-card-header {
    display:flex;
    justify-content:space-between;
    gap:12px;
    align-items:flex-start;
    margin-bottom:10px;
  }
  .search-card-header .search-title { margin-bottom:4px; }
  .search-hint {
    flex-shrink:0;
    border-radius:999px;
    padding:7px 11px;
    background:#f5fbfd;
    border:1px solid #e3f1f6;
    color:var(--primary-dark);
    font-size:12px;
    font-weight:900;
  }

  .toolbar { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:18px; }

  .field { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
  .field label { font-size:13px; color:var(--text-sub); font-weight:bold; }
  .field input,.field select {
    width:100%; border:1px solid var(--border); border-radius:10px;
    padding:9px 11px; background:#fff; font-size:14px;
  }

  .tabs { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .tab-btn {
    border-radius:999px; padding:10px 18px; cursor:pointer; font-size:14px; font-weight:bold;
    background:#fff; color:var(--primary-dark); border:1px solid var(--border);
  }
  .tab-btn.active { background:var(--primary-dark); color:#fff; border-color:var(--primary-dark); }

  .message {
    background:#fff; border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; color:var(--text-sub); box-shadow:var(--shadow);
  }
  .message.error { border-left:6px solid var(--accent-red); color:var(--accent-red); font-weight:bold; }
  .message.success { border-left:6px solid var(--primary); color:var(--primary-dark); font-weight:bold; }

  .state-message {
    width:100%;
    padding:22px 18px;
    border:1px solid var(--border);
    border-radius:16px;
    background:#ffffff;
    box-shadow:var(--shadow);
    text-align:center;
  }
  .state-title {
    font-size:16px;
    font-weight:900;
    color:var(--primary-dark);
  }
  .state-sub {
    margin-top:6px;
    font-size:13px;
    color:var(--text-sub);
  }
  .loading-state {
    background:#f8fcfe;
    border-color:#dceff5;
  }
  .error-state {
    background:#fff7f8;
    border-color:#f1c6d2;
  }
  .error-state .state-title {
    color:var(--accent-red);
  }

  .card-container { display:flex; flex-direction:column; gap:10px; }

  /* compact request card */
  .compact-card {
    padding:14px 16px;
    display:grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap:14px;
    align-items:center;
  }
  .compact-card.pending { border-left:7px solid var(--accent-blue); }
  .compact-card.approved { border-left:7px solid var(--primary); }
  .compact-card.rejected { border-left:7px solid var(--accent-red); }

  .compact-main { min-width:0; }
  .compact-top {
    display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:8px 12px; margin-bottom:8px;
  }
  .compact-name { font-size:19px; font-weight:900; color:var(--text-main); }
  .compact-id { margin-left:8px; font-size:12px; color:var(--text-sub); font-weight:700; }
  .compact-date { font-size:15px; font-weight:bold; color:var(--primary-dark); }
  .compact-meta {
    display:flex; flex-wrap:wrap; gap:6px;
    color:var(--text-sub); font-size:13px; line-height:1.5;
  }
  .mini-chip {
    display:inline-flex; align-items:center; gap:4px;
    border:1px solid #eee8dc; background:#faf9f6; border-radius:999px;
    padding:4px 9px;
  }
  .important-chip {
    border-color:#d7e8ff;
    background:#f8fbff;
  }
  .mini-chip strong { color:var(--text-main); }

  .compact-detail {
    display:flex;
    gap:7px;
    margin-top:9px;
    font-size:13px;
    color:var(--text-sub);
    word-break:break-all;
  }
  .detail-label {
    flex-shrink:0;
    color:var(--primary-dark);
    font-weight:900;
  }
  .compact-sub-detail {
    margin-top:4px;
    font-size:12px;
    color:var(--text-sub);
  }

  .status-badge {
    display:inline-block; padding:4px 9px; border-radius:999px;
    font-size:12px; font-weight:bold; color:#fff;
  }
  .status-badge.pending { background:var(--accent-blue); }
  .status-badge.approved { background:var(--primary); }
  .status-badge.rejected { background:var(--accent-red); }

  .compact-actions {
    display:flex;
    gap:8px;
    align-items:center;
    justify-content:flex-end;
    min-width:168px;
  }

  .btn {
    border:none; border-radius:10px; padding:10px 12px;
    font-size:13px; font-weight:bold; cursor:pointer; color:#fff;
  }
  .btn-card-action {
    min-width:76px;
    min-height:44px;
    font-size:15px;
  }
  .btn-approve { background:var(--primary); }
  .btn-reject { background:var(--accent-red); }
  .btn-refresh,.btn-reset { background:var(--accent-orange); }
  .btn-search,.btn-export-monthly { background:var(--accent-blue); }
  .btn-export-yearly { background:var(--accent-brown); width:100%; }
  .btn-export-monthly { width:100%; }

  .log-list { display:flex; flex-direction:column; gap:10px; }
  .log-card {
    background:#fff; border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:12px 14px;
  }
  .log-title { font-weight:bold; margin-bottom:6px; color:var(--primary-dark); }
  .log-meta { color:var(--text-sub); font-size:13px; line-height:1.6; }

 /* =========================
   仕上げ調整：爽やか・押しやすい・ミス防止
========================= */

/* カードに軽い操作感を出す */
.compact-card {
  transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
}

.compact-card:hover {
  background: #f7fcfe;
  transform: translateY(-1px);
  box-shadow: 0 5px 14px rgba(47, 111, 134, 0.12);
}

/* 承認ボタン：明るく押しやすく */
.btn-approve {
  background: #4f9fba;
}

.btn-approve:hover {
  background: #5fb3cf;
}

/* 否認ボタン：ミス防止のため注意色を少し強める */
.btn-reject {
  background: #d94f78;
}

.btn-reject:hover {
  background: #e23f75;
}

/* 検索・出力ボタンも少し反応を出す */
.btn-search:hover,
.btn-export-monthly:hover {
  background: #4aa1d1;
}

.btn-reset:hover,
.btn-refresh:hover {
  background: #f0a64f;
}

.btn-export-yearly:hover {
  background: #8da1b2;
}

/* カード内の情報チップを軽くする */
.mini-chip {
  background: #f5fbfd;
  border: 1px solid #e3f1f6;
}

/* ステータスバッジを少し柔らかく */
.status-badge {
  opacity: 0.9;
}

/* ミス防止：否認ボタンだけ少し目立つ枠をつける */
.btn-reject {
  border: 2px solid rgba(217, 79, 120, 0.2);
}

/* ミス防止：承認・否認ボタンの押せる感を強める */
.btn:hover {
  transform: translateY(-1px);
  transition: 0.15s ease;
}

.btn:active {
  transform: translateY(0);
  opacity: 0.85;
}

  @media (max-width:900px) {
    .toolbar,.search-grid { grid-template-columns:1fr; }
  }

  @media (max-width:760px) {
    .compact-card { grid-template-columns:1fr; }
    .compact-actions { min-width:0; justify-content:flex-start; flex-wrap:wrap; }
    .btn { width:auto; }
  }

  /* =========================
   管理画面トップ：状況カード
========================= */
.admin-dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 18px;
}

.dashboard-card {
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 16px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  min-height: 140px;
}

.dashboard-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(47, 111, 134, 0.16);
  background: #f8fcfe;
}

.dashboard-label {
  display: inline-block;
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 900;
  color: #ffffff;
  background: var(--accent-blue);
  margin-bottom: 10px;
}

.dashboard-title {
  font-size: 18px;
  font-weight: 900;
  color: var(--primary-dark);
}

.dashboard-count {
  margin-top: 8px;
  font-size: 34px;
  font-weight: 900;
  color: var(--text-main);
  line-height: 1;
}

.dashboard-sub {
  margin-top: 8px;
  font-size: 13px;
  color: var(--text-sub);
  font-weight: 700;
}

.pending-card {
  border-left: 8px solid var(--accent-blue);
}

.approved-card {
  border-left: 8px solid var(--primary);
}

.rejected-card {
  border-left: 8px solid var(--accent-red);
}

.log-card-mini {
  border-left: 8px solid var(--accent-orange);
}

.approved-card .dashboard-label {
  background: var(--primary);
}

.rejected-card .dashboard-label {
  background: var(--accent-red);
}

.log-card-mini .dashboard-label {
  background: var(--accent-orange);
}

@media (max-width: 900px) {
  .admin-dashboard {
    grid-template-columns: 1fr 1fr;
  }
}

@media (max-width: 560px) {
  .admin-dashboard {
    grid-template-columns: 1fr;
  }
}

/* =========================
   簡易ログイン画面
========================= */
.login-screen {
  min-height: calc(100vh - 70px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-card {
  width: min(440px, 100%);
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: 0 12px 34px rgba(47, 111, 134, 0.18);
  padding: 28px;
}

.login-title {
  margin: 0 0 8px;
  font-size: 28px;
  color: var(--primary-dark);
  text-align: center;
}

.login-subtitle {
  margin: 0 0 22px;
  font-size: 14px;
  color: var(--text-sub);
  text-align: center;
}

.login-btn {
  width: 100%;
  font-size: 16px;
  padding: 13px;
  margin-top: 8px;
}

.login-message {
  margin-top: 14px;
  font-size: 14px;
  font-weight: bold;
  color: var(--accent-red);
  text-align: center;
  white-space: pre-line;
}

.admin-app-hidden {
  display: none;
}

.login-user-bar {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  color: var(--text-sub);
  font-size: 13px;
  font-weight: bold;
}

.logout-btn {
  border: none;
  border-radius: 999px;
  padding: 7px 12px;
  background: var(--accent-red);
  color: #ffffff;
  font-weight: bold;
  cursor: pointer;
}

/* =========================
   6か月有給付与チェック
   年次付与カードと同じデザイン
========================= */

.six-month-card {
  margin-top: 0;
}

.six-month-grant-area {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 18px;
}

.six-month-row {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 16px 18px;
  border-radius: 16px;

  background: #f8fbff;
  border: 1px solid #d7e8ff;
}

.six-month-main {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.six-month-name {
  font-size: 18px;
  font-weight: 700;
  color: #24435f;
}

.six-month-id {
  margin-left: 8px;
  font-size: 12px;
  color: #5d7488;
  font-weight: 700;
}

.six-month-meta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;

  font-size: 13px;
  color: #5d7488;
}

.grant-detail-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(120px, 1fr));
  gap: 8px;
  margin-top: 4px;
}

.grant-detail-item {
  min-width: 0;
  padding: 8px 10px;
  border: 1px solid #dceff5;
  border-radius: 12px;
  background: #ffffff;
}

.grant-detail-item span {
  display: block;
  margin-bottom: 3px;
  color: #7a8d9d;
  font-size: 11px;
  font-weight: 700;
}

.grant-detail-item strong {
  display: block;
  color: #24435f;
  font-size: 13px;
  font-weight: 800;
  overflow-wrap: anywhere;
}

.grant-detail-item.highlight {
  border-color: #b9e4ef;
  background: #eef8fb;
}

@media (max-width: 760px) {
  .six-month-row {
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
  }

  .grant-detail-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

/* =========================
   年次付与
========================= */

.yearly-grant-card {
  margin-top: 0;
}

.yearly-grant-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 18px;
}

.yearly-grant-item {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 16px 18px;

  border-radius: 16px;

  background: #f8fbff;
  border: 1px solid #d7e8ff;
}

.yearly-grant-main {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.yearly-grant-name {
  font-size: 18px;
  font-weight: 700;
  color: #24435f;
}

.yearly-grant-meta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;

  font-size: 13px;
  color: #5d7488;
}

.loading-message,
.empty-message {
  padding: 24px;
  text-align: center;
  color: #7a8d9d;
}

.grant-check-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 0;
}

.grant-work-section,
.report-section {
  padding-top: 8px;
  border-top: 1px solid #dceff5;
}

.fifo-trial-section {
  padding-top: 8px;
  border-top: 1px solid #dceff5;
}

.fifo-trial-card {
  margin-bottom: 18px;
}

.fifo-trial-controls {
  display: grid;
  grid-template-columns: minmax(180px, 240px) minmax(180px, 240px);
  gap: 12px;
  align-items: end;
}

.fifo-trial-summary {
  margin-top: 12px;
}

.fifo-trial-count {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid #dceff5;
  background: #f5fbfd;
  color: var(--primary-dark);
  font-size: 13px;
  font-weight: 800;
}

.fifo-trial-results {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 14px;
}

.fifo-trial-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 14px;
  align-items: center;
  padding: 14px 16px;
  border: 1px solid #d7e8ff;
  border-radius: 16px;
  background: #f8fbff;
}

.fifo-trial-main {
  min-width: 0;
}

.fifo-trial-name-line {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.fifo-trial-name {
  color: #24435f;
  font-size: 18px;
  font-weight: 900;
}

.fifo-trial-id {
  color: #5d7488;
  font-size: 12px;
  font-weight: 800;
}

.fifo-trial-meta {
  margin-top: 6px;
  color: #5d7488;
  font-size: 13px;
  line-height: 1.5;
}

.fifo-trial-numbers {
  display: grid;
  grid-template-columns: repeat(3, minmax(86px, 1fr));
  gap: 8px;
}

.fifo-number-item {
  min-width: 86px;
  padding: 8px 10px;
  border-radius: 12px;
  border: 1px solid #dceff5;
  background: #ffffff;
}

.fifo-number-item span {
  display: block;
  margin-bottom: 3px;
  color: #7a8d9d;
  font-size: 11px;
  font-weight: 800;
}

.fifo-number-item strong {
  color: #24435f;
  font-size: 15px;
  font-weight: 900;
}

.fifo-number-item.difference.plus {
  background: #eef8fb;
  border-color: #b9e4ef;
}

.fifo-number-item.difference.minus {
  background: #fff6f8;
  border-color: #f2c8d4;
}

.fifo-reason-badge {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 4px 9px;
  border-radius: 999px;
  border: 1px solid #dceff5;
  background: #ffffff;
  color: #5d7488;
  font-size: 12px;
  font-weight: 900;
}

.fifo-reason-badge.future {
  background: #eef8fb;
  border-color: #b9e4ef;
  color: var(--primary-dark);
}

.fifo-reason-badge.expired {
  background: #fff8ec;
  border-color: #f2ddb8;
  color: #9a651c;
}

.fifo-reason-badge.fiscal {
  background: #f1f7ff;
  border-color: #d6e8ff;
  color: #1f4f7a;
}

.fifo-reason-badge.needs-check {
  background: #fff6f8;
  border-color: #f2c8d4;
  color: #9f2a2a;
}

@media (max-width: 900px) {
  .yearly-grant-item {
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
  }

  .grant-check-grid {
    grid-template-columns: 1fr;
  }

  .fifo-trial-row {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 520px) {
  .grant-detail-grid {
    grid-template-columns: 1fr;
  }

  .fifo-trial-controls,
  .fifo-trial-numbers {
    grid-template-columns: 1fr;
  }
}

.bulk-action-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;

  margin-bottom: 16px;
  padding: 14px 16px;

  border-radius: 18px;
  background: #f8fcfe;
  border: 1px solid var(--border);
  border-left: 7px solid var(--primary);

  box-shadow: var(--shadow);
}

.bulk-left,
.bulk-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.bulk-check-label {
  display: flex;
  align-items: center;
  gap: 8px;

  font-size: 15px;
  font-weight: bold;
  color: var(--primary-dark);
}

.selected-count-label {
  font-size: 14px;
  font-weight: bold;
