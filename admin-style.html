<style>
  :root {
    --bg-main: #f5f3ef;
    --bg-sub: #ebe6dc;
    --card-bg: #ffffff;
    --primary: #6f8b6b;
    --primary-dark: #4f6650;
    --primary-light: #dfe8dc;
    --accent-blue: #2f6fb3;
    --accent-red: #c94c4c;
    --accent-orange: #d98c2b;
    --accent-brown: #8b6b4f;
    --text-main: #2f2f2f;
    --text-sub: #6f6b63;
    --border: #ddd6ca;
    --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
    --radius: 14px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
  }

  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }

  .header {
    background: linear-gradient(135deg, var(--primary-light), var(--bg-sub));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }

  .title {
    margin: 0 0 8px;
    font-size: 28px;
    color: var(--primary-dark);
  }

  .subtitle {
    margin: 0;
    color: var(--text-sub);
    font-size: 14px;
  }

  .toolbar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .tool-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 16px;
  }

  .tool-title {
    font-size: 16px;
    font-weight: bold;
    color: var(--primary-dark);
    margin-bottom: 12px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }

  .field label {
    font-size: 13px;
    color: var(--text-sub);
    font-weight: bold;
  }

  .field input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    background: #fff;
    font-size: 14px;
  }

  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
  }

  .tab-btn {
    border: none;
    border-radius: 999px;
    padding: 10px 18px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    background: #fff;
    color: var(--primary-dark);
    border: 1px solid var(--border);
    transition: 0.2s;
  }

  .tab-btn:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }

  .tab-btn.active {
    background: var(--primary-dark);
    color: white;
    border-color: var(--primary-dark);
  }

  .panel {
    min-height: 240px;
  }

  .message {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    color: var(--text-sub);
    box-shadow: var(--shadow);
  }

  .message.error {
    border-left: 6px solid var(--accent-red);
    color: var(--accent-red);
    font-weight: bold;
  }

  .message.success {
    border-left: 6px solid var(--primary);
    color: var(--primary-dark);
    font-weight: bold;
  }

  .card-container {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 16px;
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
  }

  .card.pending {
    border-left: 8px solid var(--accent-blue);
  }

  .card.approved {
    border-left: 8px solid var(--primary);
  }

  .card.rejected {
    border-left: 8px solid var(--accent-red);
  }

  .card-left {
    flex: 1;
  }

  .card-id {
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 8px;
    word-break: break-all;
  }

  .employee-name {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .info-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px 12px;
    margin-bottom: 10px;
  }

  .info-item {
    background: #faf9f6;
    border: 1px solid #eee8dc;
    border-radius: 10px;
    padding: 10px;
  }

  .info-label {
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 4px;
  }

  .info-value {
    font-size: 14px;
    font-weight: bold;
    color: var(--text-main);
  }

  .balance-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px 12px;
    margin-top: 12px;
    margin-bottom: 10px;
  }

  .balance-item {
    background: #f8f6f1;
    border: 1px solid #e7e0d4;
    border-radius: 10px;
    padding: 10px;
  }

  .balance-label {
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 4px;
  }

  .balance-value {
    font-size: 16px;
    font-weight: bold;
    color: var(--primary-dark);
  }

  .reason-box {
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    background: #faf9f6;
    border: 1px solid #eee8dc;
  }

  .reason-title {
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 4px;
  }

  .status-badge {
    display: inline-block;
    margin-top: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: bold;
    color: white;
  }

  .status-badge.pending {
    background: var(--accent-blue);
  }

  .status-badge.approved {
    background: var(--primary);
  }

  .status-badge.rejected {
    background: var(--accent-red);
  }

  .card-right {
    min-width: 180px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    border: none;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    color: white;
    transition: 0.2s;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }

  .btn-approve {
    background: var(--primary);
  }

  .btn-reject {
    background: var(--accent-red);
  }

  .btn-refresh {
    background: var(--accent-orange);
  }

  .btn-export-monthly {
    background: var(--accent-blue);
    width: 100%;
  }

  .btn-export-yearly {
    background: var(--accent-brown);
    width: 100%;
  }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .log-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
  }

  .log-title {
    font-weight: bold;
    margin-bottom: 8px;
    color: var(--primary-dark);
  }

  .log-meta {
    color: var(--text-sub);
    font-size: 14px;
    line-height: 1.7;
  }

  @media (max-width: 900px) {
    .toolbar {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 760px) {
    .card {
      flex-direction: column;
    }

    .card-right {
      min-width: auto;
      width: 100%;
    }

    .btn {
      width: 100%;
    }
  }
</style>
