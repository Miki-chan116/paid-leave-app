<style>
  :root {
  --bg-main:#f3f9fb;
  --bg-sub:#dceff5;
  --card-bg:#ffffff;

  --primary:#4f9fba;
  --primary-dark:#2f6f86;
  --primary-light:#d9f0f5;

  --accent-blue:#3f8fc5;
  --accent-red:#d94f78;
  --accent-orange:#e59a45;
  --accent-brown:#7a8fa0;

  --text-main:#263238;
  --text-sub:#60727a;
  --border:#d2e4ea;

  --shadow:0 3px 10px rgba(47,111,134,.10);
  --radius:12px;
}

  * { box-sizing:border-box; }
  body { margin:0; font-family:sans-serif; background:var(--bg-main); color:var(--text-main); }
  .page { max-width:1200px; margin:0 auto; padding:20px 16px 48px; }

  .header,.search-card,.tool-card,.current-range-box,.compact-card {
    background:#fff; border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow);
  }

  .header { background:linear-gradient(135deg,var(--primary-light),var(--bg-sub)); padding:18px; margin-bottom:14px; }
  .title { margin:0 0 6px; font-size:26px; color:var(--primary-dark); }
  .subtitle { margin:0; color:var(--text-sub); font-size:14px; }

  .current-range-box {
    padding:12px 16px; margin-bottom:14px; font-weight:bold;
    color:var(--primary-dark); background:#f8fbf7; border-left:7px solid var(--primary);
  }

  .admin-section {
    margin-top: 18px;
  }

  .section-heading-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 12px;
  }

  .section-kicker {
    display: inline-block;
    margin-bottom: 5px;
    padding: 4px 9px;
    border-radius: 999px;
    background: #eef8fb;
    border: 1px solid #d8edf4;
    color: var(--accent-blue);
    font-size: 12px;
    font-weight: 900;
  }

  .section-heading {
    margin: 0;
    font-size: 22px;
    color: var(--primary-dark);
  }

  .section-description {
    margin: 4px 0 0;
    color: var(--text-sub);
    font-size: 14px;
  }

  .search-card,.tool-card { padding:14px; }
  .search-card { margin-bottom:18px; }
  .search-title,.tool-title { font-size:16px; font-weight:bold; color:var(--primary-dark); margin-bottom:10px; }

  .search-grid { display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:10px; }
  .search-actions { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
  .search-actions-spread { justify-content:flex-end; }
  .request-search-card { margin-bottom:14px; }
  .search-card-header {
    display:flex;
    justify-content:space-between;
    gap:12px;
    align-items:flex-start;
    margin-bottom:10px;
  }
  .search-card-header .search-title { margin-bottom:4px; }
  .search-hint {
    flex-shrink:0;
    border-radius:999px;
    padding:7px 11px;
    background:#f5fbfd;
    border:1px solid #e3f1f6;
    color:var(--primary-dark);
    font-size:12px;
    font-weight:900;
  }

  .toolbar { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:18px; }

  .field { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
  .field label { font-size:13px; color:var(--text-sub); font-weight:bold; }
  .field input,.field select {
    width:100%; border:1px solid var(--border); border-radius:10px;
    padding:9px 11px; background:#fff; font-size:14px;
  }

  .tabs { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .tab-btn {
    border-radius:999px; padding:10px 18px; cursor:pointer; font-size:14px; font-weight:bold;
    background:#fff; color:var(--primary-dark); border:1px solid var(--border);
  }
  .tab-btn.active { background:var(--primary-dark); color:#fff; border-color:var(--primary-dark); }

  .message {
    background:#fff; border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; color:var(--text-sub); box-shadow:var(--shadow);
  }
  .message.error { border-left:6px solid var(--accent-red); color:var(--accent-red); font-weight:bold; }
  .message.success { border-left:6px solid var(--primary); color:var(--primary-dark); font-weight:bold; }

  .state-message {
    width:100%;
    padding:22px 18px;
    border:1px solid var(--border);
    border-radius:16px;
    background:#ffffff;
    box-shadow:var(--shadow);
    text-align:center;
  }
  .state-title {
    font-size:16px;
    font-weight:900;
    color:var(--primary-dark);
  }
  .state-sub {
    margin-top:6px;
    font-size:13px;
    color:var(--text-sub);
  }
  .loading-state {
    background:#f8fcfe;
    border-color:#dceff5;
  }
  .error-state {
    background:#fff7f8;
    border-color:#f1c6d2;
  }
  .error-state .state-title {
    color:var(--accent-red);
  }

  .card-container { display:flex; flex-direction:column; gap:10px; }

  /* compact request card */
  .compact-card {
    padding:14px 16px;
    display:grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap:14px;
    align-items:center;
  }
  .compact-card.pending { border-left:7px solid var(--accent-blue); }
  .compact-card.approved { border-left:7px solid var(--primary); }
  .compact-card.rejected { border-left:7px solid var(--accent-red); }

  .compact-main { min-width:0; }
  .compact-top {
    display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:8px 12px; margin-bottom:8px;
  }
  .compact-name { font-size:19px; font-weight:900; color:var(--text-main); }
  .compact-id { margin-left:8px; font-size:12px; color:var(--text-sub); font-weight:700; }
  .compact-date { font-size:15px; font-weight:bold; color:var(--primary-dark); }
  .compact-meta {
    display:flex; flex-wrap:wrap; gap:6px;
    color:var(--text-sub); font-size:13px; line-height:1.5;
  }
  .mini-chip {
    display:inline-flex; align-items:center; gap:4px;
    border:1px solid #eee8dc; background:#faf9f6; border-radius:999px;
    padding:4px 9px;
  }
  .important-chip {
    border-color:#d7e8ff;
    background:#f8fbff;
  }
  .mini-chip strong { color:var(--text-main); }

  .compact-detail {
    display:flex;
    gap:7px;
    margin-top:9px;
    font-size:13px;
    color:var(--text-sub);
    word-break:break-all;
  }
  .detail-label {
    flex-shrink:0;
    color:var(--primary-dark);
    font-weight:900;
  }
  .compact-sub-detail {
    margin-top:4px;
    font-size:12px;
    color:var(--text-sub);
  }

  .status-badge {
    display:inline-block; padding:4px 9px; border-radius:999px;
    font-size:12px; font-weight:bold; color:#fff;
  }
  .status-badge.pending { background:var(--accent-blue); }
  .status-badge.approved { background:var(--primary); }
  .status-badge.rejected { background:var(--accent-red); }

  .compact-actions {
    display:flex;
    gap:8px;
    align-items:center;
    justify-content:flex-end;
    min-width:168px;
  }

  .btn {
    border:none; border-radius:10px; padding:10px 12px;
    font-size:13px; font-weight:bold; cursor:pointer; color:#fff;
  }
  .btn-card-action {
    min-width:76px;
    min-height:44px;
    font-size:15px;
  }
  .btn-approve { background:var(--primary); }
  .btn-reject { background:var(--accent-red); }
  .btn-refresh,.btn-reset { background:var(--accent-orange); }
  .btn-search,.btn-export-monthly { background:var(--accent-blue); }
  .btn-export-yearly { background:var(--accent-brown); width:100%; }
  .btn-export-monthly { width:100%; }

  .log-list { display:flex; flex-direction:column; gap:10px; }
  .log-card {
    background:#fff; border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:12px 14px;
  }
  .log-title { font-weight:bold; margin-bottom:6px; color:var(--primary-dark); }
  .log-meta { color:var(--text-sub); font-size:13px; line-height:1.6; }

 /* =========================
   仕上げ調整：爽やか・押しやすい・ミス防止
========================= */

/* カードに軽い操作感を出す */
.compact-card {
  transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
}

.compact-card:hover {
  background: #f7fcfe;
  transform: translateY(-1px);
  box-shadow: 0 5px 14px rgba(47, 111, 134, 0.12);
}

/* 承認ボタン：明るく押しやすく */
.btn-approve {
  background: #4f9fba;
}

.btn-approve:hover {
  background: #5fb3cf;
}

/* 否認ボタン：ミス防止のため注意色を少し強める */
.btn-reject {
  background: #d94f78;
}

.btn-reject:hover {
  background: #e23f75;
}

/* 検索・出力ボタンも少し反応を出す */
.btn-search:hover,
.btn-export-monthly:hover {
  background: #4aa1d1;
}

.btn-reset:hover,
.btn-refresh:hover {
  background: #f0a64f;
}

.btn-export-yearly:hover {
  background: #8da1b2;
}

/* カード内の情報チップを軽くする */
.mini-chip {
  background: #f5fbfd;
  border: 1px solid #e3f1f6;
}

/* ステータスバッジを少し柔らかく */
.status-badge {
  opacity: 0.9;
}

/* ミス防止：否認ボタンだけ少し目立つ枠をつける */
.btn-reject {
  border: 2px solid rgba(217, 79, 120, 0.2);
}

/* ミス防止：承認・否認ボタンの押せる感を強める */
.btn:hover {
  transform: translateY(-1px);
  transition: 0.15s ease;
}

.btn:active {
  transform: translateY(0);
  opacity: 0.85;
}

  @media (max-width:900px) {
    .toolbar,.search-grid { grid-template-columns:1fr; }
  }

  @media (max-width:760px) {
    .compact-card { grid-template-columns:1fr; }
    .compact-actions { min-width:0; justify-content:flex-start; flex-wrap:wrap; }
    .btn { width:auto; }
  }

  /* =========================
   管理画面トップ：状況カード
========================= */
.admin-dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 18px;
}

.dashboard-card {
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 16px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  min-height: 140px;
}

.dashboard-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(47, 111, 134, 0.16);
  background: #f8fcfe;
}

.dashboard-label {
  display: inline-block;
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 900;
  color: #ffffff;
  background: var(--accent-blue);
  margin-bottom: 10px;
}

.dashboard-title {
  font-size: 18px;
  font-weight: 900;
  color: var(--primary-dark);
}

.dashboard-count {
  margin-top: 8px;
  font-size: 34px;
  font-weight: 900;
  color: var(--text-main);
  line-height: 1;
}

.dashboard-sub {
  margin-top: 8px;
  font-size: 13px;
  color: var(--text-sub);
  font-weight: 700;
}

.pending-card {
  border-left: 8px solid var(--accent-blue);
}

.approved-card {
  border-left: 8px solid var(--primary);
}

.rejected-card {
  border-left: 8px solid var(--accent-red);
}

.log-card-mini {
  border-left: 8px solid var(--accent-orange);
}

.approved-card .dashboard-label {
  background: var(--primary);
}

.rejected-card .dashboard-label {
  background: var(--accent-red);
}

.log-card-mini .dashboard-label {
  background: var(--accent-orange);
}

.paid-leave-dashboard-section {
  padding-top: 8px;
  border-top: 1px solid #dceff5;
}

.paid-leave-dashboard-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow);
  padding: 14px;
  margin-bottom: 18px;
}

.paid-leave-summary-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}

.paid-leave-summary-card {
  border: 1px solid #dceff5;
  border-left: 6px solid var(--primary);
  border-radius: 12px;
  background: #f8fcfe;
  padding: 12px;
  min-width: 0;
}

.paid-leave-summary-card span {
  display: block;
  color: var(--text-sub);
  font-size: 12px;
  font-weight: 800;
  line-height: 1.35;
}

.paid-leave-summary-card strong {
  display: block;
  margin-top: 6px;
  color: var(--text-main);
  font-size: 26px;
  line-height: 1;
}

.paid-leave-summary-card.warning {
  border-left-color: #d8b23f;
}

.paid-leave-summary-card.within-90 {
  border-left-color: #e0c94b;
}

.paid-leave-summary-card.within-30 {
  border-left-color: var(--accent-orange);
}

.paid-leave-summary-card.expired {
  border-left-color: var(--accent-red);
}

.paid-leave-dashboard-filters {
  display: grid;
  grid-template-columns: 120px 140px minmax(180px, 1fr) auto auto auto;
  gap: 10px;
  align-items: end;
  margin-bottom: 12px;
}

.paid-leave-dashboard-filters .field {
  margin-bottom: 0;
}

.paid-leave-filter-check {
  min-height: 40px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #fff;
  color: var(--text-sub);
  font-size: 13px;
  font-weight: 800;
  white-space: nowrap;
}

.paid-leave-filter-actions {
  display: flex;
  align-items: end;
}

.paid-leave-dashboard-caption {
  margin: 0 0 10px;
  color: var(--text-sub);
  font-size: 13px;
  font-weight: 800;
}

.paid-leave-dashboard-table-wrap {
  overflow-x: auto;
}

.paid-leave-dashboard-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 820px;
  background: #fff;
  border: 1px solid var(--border);
}

.paid-leave-dashboard-table th,
.paid-leave-dashboard-table td {
  padding: 10px 11px;
  border-bottom: 1px solid #e5f0f4;
  text-align: left;
  font-size: 13px;
  vertical-align: middle;
}

.paid-leave-dashboard-table th {
  background: #eef8fb;
  color: var(--primary-dark);
  font-weight: 900;
  white-space: nowrap;
}

.paid-leave-dashboard-table tbody tr.expiry-expired {
  background: #fff5f7;
}

.paid-leave-dashboard-table tbody tr.expiry-within_30 {
  background: #fff8ed;
}

.paid-leave-dashboard-table tbody tr.expiry-within_90 {
  background: #fffdec;
}

.pld-employee-name {
  font-weight: 900;
  color: var(--text-main);
}

.pld-employee-id {
  margin-top: 3px;
  color: var(--text-sub);
  font-size: 12px;
}

.pld-five-day,
.pld-expiry-badge {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}

.pld-five-day.complete,
.pld-expiry-badge.normal {
  color: var(--primary-dark);
  background: #edf8f1;
  border: 1px solid #cfe8d8;
}

.pld-five-day.incomplete,
.pld-expiry-badge.within_90 {
  color: #7b6d00;
  background: #fff9cf;
  border: 1px solid #eee4a3;
}

.pld-expiry-badge.within_30 {
  color: #9a5a10;
  background: #fff1dc;
  border: 1px solid #efcf9e;
}

.pld-expiry-badge.expired {
  color: var(--accent-red);
  background: #fff0f4;
  border: 1px solid #efbed0;
}

@media (max-width: 900px) {
  .admin-dashboard {
    grid-template-columns: 1fr 1fr;
  }

  .paid-leave-summary-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .paid-leave-dashboard-filters {
    grid-template-columns: 1fr 1fr;
  }
}

@media (max-width: 560px) {
  .admin-dashboard {
    grid-template-columns: 1fr;
  }

  .paid-leave-summary-grid,
  .paid-leave-dashboard-filters {
    grid-template-columns: 1fr;
  }
}

/* =========================
   簡易ログイン画面
========================= */
.login-screen {
  min-height: calc(100vh - 70px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-card {
  width: min(440px, 100%);
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: 0 12px 34px rgba(47, 111, 134, 0.18);
  padding: 28px;
}

.login-title {
  margin: 0 0 8px;
  font-size: 28px;
  color: var(--primary-dark);
  text-align: center;
}

.login-subtitle {
  margin: 0 0 22px;
  font-size: 14px;
  color: var(--text-sub);
  text-align: center;
}

.login-btn {
  width: 100%;
  font-size: 16px;
  padding: 13px;
  margin-top: 8px;
}

.login-message {
  margin-top: 14px;
  font-size: 14px;
  font-weight: bold;
  color: var(--accent-red);
  text-align: center;
  white-space: pre-line;
}

.admin-app-hidden {
  display: none;
}

.login-user-bar {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  color: var(--text-sub);
  font-size: 13px;
  font-weight: bold;
}

.logout-btn {
  border: none;
  border-radius: 999px;
  padding: 7px 12px;
  background: var(--accent-red);
  color: #ffffff;
  font-weight: bold;
  cursor: pointer;
}

/* =========================
   6か月有給付与チェック
   年次付与カードと同じデザイン
========================= */

.six-month-card {
  margin-top: 0;
}

.six-month-grant-area {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 18px;
}

.six-month-row {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 8px;

  padding: 12px 14px;
  border-radius: 14px;

  background: #f8fbff;
  border: 1px solid #d7e8ff;
}

.six-month-main {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.grant-card-topline {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.six-month-actions {
  display: flex;
  flex-direction: row;
  justify-content: flex-end;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.six-month-actions .btn {
  min-width: 64px;
  min-height: 32px;
  padding: 7px 11px;
  white-space: nowrap;
}

.six-month-processed-btn {
  border: none;
  background: var(--accent-red);
  color: #ffffff;
  box-shadow: var(--shadow);
}

.six-month-processed-btn:hover {
  filter: brightness(1.06);
}

.six-month-name {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
  font-size: 16px;
  font-weight: 700;
  color: #24435f;
  min-width: 0;
}

.six-month-id {
  font-size: 12px;
  color: #5d7488;
  font-weight: 700;
}

.grant-adjustment-badge {
  display: none;
  align-items: center;
  min-height: 22px;
  padding: 3px 8px;
  border-radius: 999px;
  background: #fff1f5;
  color: #c94c72;
  font-size: 11px;
  font-weight: 900;
}

.has-grant-adjustment .grant-adjustment-badge {
  display: inline-flex;
}

.grant-card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 10px;
  color: #5d7488;
  font-size: 12px;
  font-weight: 800;
}

.grant-card-meta span {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 3px 9px;
  border: 1px solid #dceff5;
  border-radius: 999px;
  background: #ffffff;
}

.grant-candidate-check {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 8px;
  border: 1px solid #dceff5;
  border-radius: 999px;
  background: #ffffff;
  color: #5d7488;
  font-size: 12px;
  font-weight: 800;
}

.grant-candidate-check input {
  margin: 0;
}

.grant-bulk-action-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 12px 14px;
  border: 1px solid #dceff5;
  border-radius: 14px;
  background: #f5fbfd;
}

.grant-bulk-info {
  color: var(--primary-dark);
  font-size: 13px;
  font-weight: 900;
}

.grant-bulk-info small {
  display: block;
  margin-top: 2px;
  color: #7a8d9d;
  font-size: 11px;
  font-weight: 700;
}

.grant-bulk-actions {
  display: flex;
