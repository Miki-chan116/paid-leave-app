<!DOCTYPE html>
<html>
<head>
  <base target="_top">
</head>
<body>

<h2>承認待ち一覧</h2>

<table border="1" id="requestTable">
  <thead>
    <tr>
      <th>申請ID</th>
      <th>社員名</th>
      <th>日付</th>
      <th>日数</th>
      <th>半日区分</th>
      <th>操作</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
  alert("admin loaded");
</script>

<script>
alert("admin loaded");

function loadRequests() {
  console.log("loadRequests start");

  google.script.run
    .withSuccessHandler(function(data) {
      console.log("success:", data);
      renderTable(data);
    })
    .withFailureHandler(function(err) {
      console.error("ERROR:", err);
      alert("APIエラー: " + err.message);
    })
    .getPendingRequests();
}

function renderTable(data) {
  const tbody = document.querySelector("#requestTable tbody");
  tbody.innerHTML = "";

  if (!data || data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6">承認待ちデータなし</td></tr>`;
    return;
  }

  data.forEach(req => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${req.request_id}</td>
      <td>${req.employee_name}</td>
      <td>${req.date}</td>
      <td>${req.days}</td>
      <td>${req.half_day}</td>
      <td>
        <button onclick="approve('${req.request_id}')">承認</button>
        <button onclick="reject('${req.request_id}')">否認</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

function approve(id) {
  google.script.run
    .withSuccessHandler(() => {
      alert("承認しました");
      loadRequests();
    })
    .approveRequest(id);
}

function reject(id) {
  const reason = prompt("否認理由を入力してください");
  if (!reason) return;

  google.script.run
    .withSuccessHandler(() => {
      alert("否認しました");
      loadRequests();
    })
    .rejectRequest(id, reason);
}

window.onload = loadRequests;
</script>

</body>
</html>
