<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include('admin-style'); ?>
  <?!= include('style'); ?>
</head>

<body>
  <?!= include('nav'); ?>

    <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1 class="login-title">管理画面ログイン</h1>
      <p class="login-subtitle">管理者を選択してPINを入力してください</p>

      <div class="field">
        <label for="adminUserSelect">管理者</label>
        <select id="adminUserSelect">
          <option value="">読み込み中...</option>
        </select>
      </div>

      <div class="field">
        <label for="adminPinInput">PIN</label>
        <input type="password" id="adminPinInput" inputmode="numeric" placeholder="PINを入力">
      </div>

      <button class="btn btn-search login-btn" type="button" onclick="loginAdmin()">
        ログイン
      </button>

      <div id="loginMessage" class="login-message"></div>
    </div>
  </div>

 <div id="adminApp" class="page admin-app-hidden"></div>

 <div id="loginUserBar" class="login-user-bar"></div>

    <div class="header">
      <h1 class="title">有給申請 管理画面</h1>
      <p class="subtitle">承認待ち・承認済み・否認・ログ・出力機能をここで管理できます。</p>
    </div>

    <div id="currentRangeBox" class="current-range-box">
      現在表示中：前月＋当月のデータ
    </div>

    <div class="admin-dashboard">
      <div class="dashboard-card pending-card" onclick="loadRequests('pending')">
        <div class="dashboard-label">今日見るところ</div>
        <div class="dashboard-title">承認待ち</div>
        <div id="pendingCount" class="dashboard-count">-</div>
        <div class="dashboard-sub">未対応の申請</div>
      </div>

      <div class="dashboard-card approved-card" onclick="loadRequests('approved')">
        <div class="dashboard-label">確認用</div>
        <div class="dashboard-title">承認済み</div>
        <div id="approvedCount" class="dashboard-count">-</div>
        <div class="dashboard-sub">処理済み</div>
      </div>

      <div class="dashboard-card rejected-card" onclick="loadRequests('rejected')">
        <div class="dashboard-label">確認用</div>
        <div class="dashboard-title">否認</div>
        <div id="rejectedCount" class="dashboard-count">-</div>
        <div class="dashboard-sub">否認済み</div>
      </div>

      <div class="dashboard-card log-card-mini" onclick="loadLogs()">
        <div class="dashboard-label">記録確認</div>
        <div class="dashboard-title">ログ</div>
        <div class="dashboard-count">📋</div>
        <div class="dashboard-sub">操作履歴を見る</div>
      </div>
    </div>

    <!-- ================= 検索 ================= -->
    <div class="search-card">
      <div class="search-title">検索</div>

      <div class="search-grid">
        <div class="field">
          <label for="searchKeyword">社員ID・氏名</label>
          <input type="text" id="searchKeyword" placeholder="例：E001 / 青木">
        </div>

        <div class="field">
          <label for="searchStatus">ステータス</label>
          <select id="searchStatus">
            <option value="all">すべて</option>
            <option value="pending">承認待ち</option>
            <option value="approved">承認済み</option>
            <option value="rejected">否認</option>
          </select>
        </div>

        <div class="field">
          <label for="searchStartDate">開始日</label>
          <input type="date" id="searchStartDate">
        </div>

        <div class="field">
          <label for="searchEndDate">終了日</label>
          <input type="date" id="searchEndDate">
        </div>
      </div>

      <div class="search-actions">
        <button class="btn btn-search" onclick="searchRequestList()">検索する</button>
        <button class="btn btn-reset" onclick="resetSearch()">前月＋当月に戻す</button>
      </div>
    </div>

    <!-- ================= 出力 ================= -->
    <div class="toolbar">

      <div class="tool-card">
        <div class="tool-title">月間一覧確認・CSV出力</div>

        <div class="field">
          <label for="monthlyYear">対象年</label>
          <input type="number" id="monthlyYear" placeholder="例: 2026">
        </div>

        <div class="field">
          <label for="monthlyMonth">対象月</label>
          <input type="number" id="monthlyMonth" min="1" max="12" placeholder="例: 5">
        </div>

        <div class="field">
          <label for="monthlyCompany">会社</label>
          <select id="monthlyCompany">
            <option value="ALL">すべて</option>
            <option value="MAIN">MAIN（自社）</option>
            <option value="PARTNER">PARTNER（協力会社）</option>
            <option value="TOMOHISA">（有）友尚建設</option>
          </select>
        </div>

        <button class="btn btn-export-monthly" onclick="previewMonthlyReport()">
          画面で確認する
        </button>

        <button class="btn btn-reset" onclick="downloadMonthlyReportCsv()">
          CSVダウンロード
        </button>
      </div>

      <div class="tool-card">
        <div class="tool-title">年間一覧確認・CSV出力</div>

        <div class="field">
          <label for="yearlyFiscalYear">対象年度</label>
          <input type="number" id="yearlyFiscalYear" placeholder="例: 2026">
        </div>

        <div class="field">
          <label for="yearlyCompany">会社</label>
          <select id="yearlyCompany">
            <option value="MAIN">MAIN（自社）</option>
            <option value="PARTNER">PARTNER（協力会社）</option>
            <option value="TOMOHISA">（有）友尚建設</option>
          </select>
        </div>

        <button class="btn btn-export-yearly" onclick="exportYearlyReport()">
          年間一覧を出力
        </button>

        <button class="btn btn-reset" onclick="downloadYearlyReportCsv()">
          CSVダウンロード
        </button>
      </div>

    </div>

    <div id="exportMessage" style="margin-bottom:20px;"></div>

    <div id="monthlyPreviewArea" class="search-card" style="display:none; margin-bottom:20px;">
      <div class="search-title">月間一覧プレビュー</div>
      <div id="monthlyPreviewSummary" class="subtitle" style="margin-top:0;"></div>
      <div id="monthlyPreviewTable"></div>
    </div>

    <!-- ================= タブ ================= -->
    <div class="tabs">
      <button id="tab-pending" class="tab-btn" onclick="loadRequests('pending')">承認待ち</button>
      <button id="tab-approved" class="tab-btn" onclick="loadRequests('approved')">承認済み</button>
      <button id="tab-rejected" class="tab-btn" onclick="loadRequests('rejected')">否認</button>
      <button id="tab-logs" class="tab-btn" onclick="loadLogs()">ログ</button>
    </div>

    <!-- ================= コンテンツ ================= -->
    <div class="panel">
      <div id="requestView" class="card-container"></div>
      <div id="logView" style="display:none;"></div>
    </div>

  </div>

  <?!= include('admin-script'); ?>

</body>
</html>
