<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: sans-serif;
      background: #f6f7fb;
    }

    h2 { margin-bottom: 10px; }

    button.refresh {
      padding: 6px 12px;
      margin-bottom: 15px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .row {
      font-size: 13px;
      margin: 2px 0;
    }

    .buttons {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    .approve {
      background: #4caf50;
      color: white;
      border: none;
      padding: 6px;
      flex: 1;
      border-radius: 6px;
      cursor: pointer;
    }

    .reject {
      background: #f44336;
      color: white;
      border: none;
      padding: 6px;
      flex: 1;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>有給申請（承認待ち）</h2>

<button class="refresh" onclick="loadData()">再読み込み</button>

<div class="container" id="cards"></div>

<script>
function loadData() {
  google.script.run
    .withSuccessHandler(renderCards)
    .getRequestsByStatus("pending");
}

function renderCards(data) {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = "データなし";
    return;
  }

  data.forEach(row => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">${row.employee_id}</div>
      <div class="row">申請日: ${row["申請日"]}</div>
      <div class="row">日数: ${row["取得日数"]}</div>
      <div class="row">ステータス: ${row.status}</div>

      <div class="buttons">
        <button class="approve" onclick="approve('${row.request_id}')">承認</button>
        <button class="reject" onclick="reject('${row.request_id}')">却下</button>
      </div>
    `;

    container.appendChild(div);
  });
}

function approve(id) {
  google.script.run
    .withSuccessHandler(loadData)
    .updateStatus(id, "approved");
}

function reject(id) {
  google.script.run
    .withSuccessHandler(loadData)
    .updateStatus(id, "rejected");
}

loadData();
</script>

</body>
</html>
