<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include('admin-style'); ?>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1 class="title">有給申請 管理画面</h1>
      <p class="subtitle">承認待ち・承認済み・否認・ログ・出力機能をここで管理できます。</p>
    </div>

    <div class="toolbar">
      <div class="tool-card">
        <div class="tool-title">月間一覧出力</div>

        <div class="field">
          <label for="monthlyYear">対象年</label>
          <input type="number" id="monthlyYear" placeholder="例: 2026">
        </div>

        <div class="field">
          <label for="monthlyMonth">対象月</label>
          <input type="number" id="monthlyMonth" min="1" max="12" placeholder="例: 5">
        </div>

        <button class="btn btn-export-monthly" onclick="exportMonthlyReport()">月間一覧を出力</button>
      </div>

      <div class="tool-card">
        <div class="tool-title">年間一覧出力</div>

        <div class="field">
          <label for="yearlyFiscalYear">対象年度</label>
          <input type="number" id="yearlyFiscalYear" placeholder="例: 2026">
        </div>

        <button class="btn btn-export-yearly" onclick="exportYearlyReport()">年間一覧を出力</button>
      </div>
    </div>

    <div id="exportMessage" style="margin-bottom:20px;"></div>

    <div class="tabs">
      <button id="tab-pending" class="tab-btn" onclick="loadRequests('pending')">承認待ち</button>
      <button id="tab-approved" class="tab-btn" onclick="loadRequests('approved')">承認済み</button>
      <button id="tab-rejected" class="tab-btn" onclick="loadRequests('rejected')">否認</button>
      <button id="tab-logs" class="tab-btn" onclick="loadLogs()">ログ</button>
    </div>

    <div class="panel">
      <div id="requestView" class="card-container"></div>
      <div id="logView" style="display:none;"></div>
    </div>
  </div>

  <?!= include('admin-script'); ?>
</body>
</html>
