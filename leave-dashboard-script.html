<script>
let currentAdminUser = null;
let currentPaidLeaveDashboardData = null;
let currentPaidLeaveDashboardQuickFilter = "all";
const adminAuthConfig = {
  validateLoginInput: false,
  clearMessageBeforeLoadUsers: true,
  clearMessageBeforeLogin: true,
  showEmptyAdminOption: true,
  emptyAdminMessage: "有効な管理者がいません",
  loginMissingInputMessage: "管理者とPINを入力してください。",
  loginFailureMessage: "ログインできませんでした。",
  normalizeLoginUser: true,
  clearPinOnLogout: true,
  reloadUsersOnLogout: true
};

window.addEventListener("DOMContentLoaded", () => {
  initAdminLogin();
});

function getCurrentFiscalYear() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  return month >= 4 ? year : year - 1;
}

function setDefaultDashboardValues() {
  const fiscalYear = document.getElementById("pldFiscalYear");
  if (fiscalYear && !fiscalYear.value) {
    fiscalYear.value = getCurrentFiscalYear();
  }
}

function toInputDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function formatDays(value) {
  if (value === "" || value == null) return "-";

  const num = Number(value || 0);
  return `${num}日`;
}

/* =========================
   簡易ログイン
========================= */
function initAdminLogin() {
  const saved = localStorage.getItem(ADMIN_LOGIN_KEY);

  if (saved) {
    try {
      currentAdminUser = JSON.parse(saved);

      if (currentAdminUser && currentAdminUser.admin_id) {
        showAdminApp();
        return;
      }
    } catch (e) {
      localStorage.removeItem(ADMIN_LOGIN_KEY);
    }
  }

  showLoginScreen();
  loadAdminUsersForLogin();
}

function showAdminApp() {
  showAuthenticatedShell();
}

function onAdminAuthenticated() {
  setDefaultDashboardValues();
  loadPaidLeaveDashboard();
}

/* =========================
   有給管理ダッシュボード
========================= */
function getPaidLeaveDashboardFilters() {
  return {
    fiscal_year: Number(document.getElementById("pldFiscalYear").value || getCurrentFiscalYear()),
    company_code: document.getElementById("pldCompany").value || "ALL",
    keyword: document.getElementById("pldKeyword").value || "",
    five_day_incomplete_only: document.getElementById("pldFiveDayOnly").checked,
    expired_only: document.getElementById("pldExpiredOnly").checked,
    as_of_date: toInputDate(new Date())
  };
}

function loadPaidLeaveDashboard() {
  const table = document.getElementById("paidLeaveDashboardTable");
  const message = document.getElementById("paidLeaveDashboardMessage");
  const caption = document.getElementById("paidLeaveDashboardCaption");

  if (!table) return;

  table.innerHTML = `<tr><td colspan="7">読み込み中...</td></tr>`;
  if (message) message.innerHTML = "";
  if (caption) caption.textContent = "";

  google.script.run
    .withSuccessHandler(data => {
      renderPaidLeaveDashboard(data);
    })
    .withFailureHandler(err => {
      console.error("有給管理ダッシュボード取得エラー:", err);
      table.innerHTML = `<tr><td colspan="7">データ取得でエラーが発生しました。</td></tr>`;
      if (message) {
        message.innerHTML = `<div class="message error">${escapeHtml(err && err.message ? err.message : "有給管理ダッシュボードを取得できませんでした。")}</div>`;
      }
    })
    .getPaidLeaveDashboardData(getPaidLeaveDashboardFilters());
}

function renderPaidLeaveDashboard(data) {
  const result = data || {};
  const summary = result.summary || {};
  const rows = sortPaidLeaveDashboardRowsByPriority(
    applyPaidLeaveDashboardQuickFilter(Array.isArray(result.rows) ? result.rows : [])
  );
  const table = document.getElementById("paidLeaveDashboardTable");
  const caption = document.getElementById("paidLeaveDashboardCaption");

  currentPaidLeaveDashboardData = result;
  updatePaidLeaveDashboardQuickFilterButtons();

  setTextContent("pldTargetCount", summary.target_employee_count || 0);
  setTextContent("pldFiveDayIncompleteCount", summary.five_day_incomplete_count || 0);
  setTextContent("pldWithin90Count", summary.within_90_count || 0);
  setTextContent("pldWithin30Count", summary.within_30_count || 0);
  setTextContent("pldExpiredCount", summary.expired_count || 0);

  if (caption) {
    caption.textContent = `${result.fiscal_year || ""}年度 / ${result.company_code || "ALL"} / ${rows.length}件表示 / 基準日 ${formatDisplayDate(result.as_of_date)}`;
  }

  if (!table) return;

  if (rows.length === 0) {
    table.innerHTML = `<tr><td colspan="7">条件に一致する社員はいません。</td></tr>`;
    return;
  }

  table.innerHTML = rows.map(row => {
    const status = row.expiry_status || "normal";
    const nearest = row.nearest_expiry_date
      ? `${formatDisplayDate(row.nearest_expiry_date)}${row.nearest_expiry_days !== "" && row.nearest_expiry_days != null ? `（あと${row.nearest_expiry_days}日）` : ""}`
      : "-";

    return `
      <tr class="expiry-${escapeHtml(status)}">
        <td>
          <div class="pld-employee-name">${escapeHtml(row.employee_name || row.name || row.employee_id)}</div>
          <div class="pld-employee-id">${escapeHtml(row.display_employee_id || row.employee_id || "")}</div>
        </td>
        <td>${escapeHtml(getPaidLeaveDashboardCompanyLabel(row))}</td>
        <td>${escapeHtml(formatDays(row.current_remaining_days))}</td>
        <td>${escapeHtml(formatDays(row.fiscal_used_days))}</td>
        <td>${renderFiveDayStatus(row)}</td>
        <td><span class="pld-expiry-badge ${Number(row.expired_days || 0) > 0 ? "expired" : "normal"}">${escapeHtml(formatDays(row.expired_days))}</span></td>
        <td><span class="pld-expiry-badge ${escapeHtml(status)}">${escapeHtml(nearest)}</span></td>
      </tr>
    `;
  }).join("");
}

function setPaidLeaveDashboardQuickFilter(filterKey) {
  currentPaidLeaveDashboardQuickFilter = filterKey || "all";
  updatePaidLeaveDashboardQuickFilterButtons();

  if (currentPaidLeaveDashboardData) {
    renderPaidLeaveDashboard(currentPaidLeaveDashboardData);
  }
}

function updatePaidLeaveDashboardQuickFilterButtons() {
  document.querySelectorAll(".paid-leave-quick-filter").forEach(button => {
    button.classList.toggle(
      "active",
      button.dataset.filter === currentPaidLeaveDashboardQuickFilter
    );
  });
}

function applyPaidLeaveDashboardQuickFilter(rows) {
  const list = Array.isArray(rows) ? rows : [];

  if (currentPaidLeaveDashboardQuickFilter === "needs_now") {
    return list.filter(row =>
      isPaidLeaveDashboardExpired(row) ||
      isPaidLeaveDashboardWithin30(row) ||
      isPaidLeaveDashboardFiveDayIncomplete(row)
    );
  }

  if (currentPaidLeaveDashboardQuickFilter === "expiry_soon") {
    return list.filter(row =>
      isPaidLeaveDashboardExpired(row) ||
      isPaidLeaveDashboardWithin30(row) ||
      isPaidLeaveDashboardWithin90(row)
    );
  }

  if (currentPaidLeaveDashboardQuickFilter === "five_day") {
    return list.filter(row => isPaidLeaveDashboardFiveDayIncomplete(row));
  }

  return list;
}

function getPaidLeaveDashboardPriority(row) {
  if (isPaidLeaveDashboardExpired(row)) return 1;
  if (isPaidLeaveDashboardWithin30(row)) return 2;
  if (isPaidLeaveDashboardWithin90(row)) return 3;
  if (isPaidLeaveDashboardFiveDayIncomplete(row)) return 4;
  return 5;
}

function sortPaidLeaveDashboardRowsByPriority(rows) {
  return (Array.isArray(rows) ? rows.slice() : []).sort((a, b) => {
    const priorityDiff =
      getPaidLeaveDashboardPriority(a) - getPaidLeaveDashboardPriority(b);
    if (priorityDiff !== 0) return priorityDiff;

    const aDays = getPaidLeaveDashboardNearestExpiryDays_(a);
    const bDays = getPaidLeaveDashboardNearestExpiryDays_(b);
    if (aDays !== bDays) return aDays - bDays;

    return String(a.employee_id || "").localeCompare(String(b.employee_id || ""));
  });
}

function isPaidLeaveDashboardExpired(row) {
  return Number(row && row.expired_days || 0) > 0 ||
    String(row && row.expiry_status || "") === "expired";
}

function isPaidLeaveDashboardWithin30(row) {
  return String(row && row.expiry_status || "") === "within_30";
}

function isPaidLeaveDashboardWithin90(row) {
  return String(row && row.expiry_status || "") === "within_90";
}

function isPaidLeaveDashboardFiveDayIncomplete(row) {
  return row && row.five_day_completed !== true;
}

function getPaidLeaveDashboardNearestExpiryDays_(row) {
  const value = row ? row.nearest_expiry_days : "";
  if (value === "" || value == null) return Number.POSITIVE_INFINITY;

  const num = Number(value);
  return Number.isFinite(num) ? num : Number.POSITIVE_INFINITY;
}

function setTextContent(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value;
}

function getPaidLeaveDashboardCompanyLabel(row) {
  const code = String(row.company_code || "").trim();
  const name = String(row.company_name || "").trim();
  if (name && code) return `${name}（${code}）`;
  return name || code || "-";
}

function renderFiveDayStatus(row) {
  const completed = row.five_day_completed === true;
  const used = Number(row.five_day_used || 0);
  const remaining = Number(row.five_day_remaining || 0);
  const cls = completed ? "complete" : "incomplete";
  const label = completed ? "達成" : `未達（あと${remaining}日）`;

  return `
    <span class="pld-five-day ${cls}">
      ${escapeHtml(label)} / ${escapeHtml(formatDays(used))}
    </span>
  `;
}
</script>
