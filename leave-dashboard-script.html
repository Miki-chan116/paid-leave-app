<script>
let currentAdminUser = null;
let currentPaidLeaveDashboardData = null;
let currentPaidLeaveDashboardQuickFilter = "all";
let currentPaidLeaveDashboardDetailEmployeeId = "";
const adminAuthConfig = {
  validateLoginInput: false,
  clearMessageBeforeLoadUsers: true,
  clearMessageBeforeLogin: true,
  showEmptyAdminOption: true,
  emptyAdminMessage: "有効な管理者がいません",
  loginMissingInputMessage: "管理者とPINを入力してください。",
  loginFailureMessage: "ログインできませんでした。",
  normalizeLoginUser: true,
  clearPinOnLogout: true,
  reloadUsersOnLogout: true
};

window.addEventListener("DOMContentLoaded", () => {
  initAdminLogin();
});

window.addEventListener("keydown", event => {
  if (event.key === "Escape") {
    closePaidLeaveDashboardEmployeeDetail();
  }
});

function getCurrentFiscalYear() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  return month >= 4 ? year : year - 1;
}

function setDefaultDashboardValues() {
  const fiscalYear = document.getElementById("pldFiscalYear");
  if (fiscalYear && !fiscalYear.value) {
    fiscalYear.value = getCurrentFiscalYear();
  }
}

function toInputDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function formatDays(value) {
  if (value === "" || value == null) return "-";

  const num = Number(value || 0);
  return `${num}日`;
}

/* =========================
   簡易ログイン
========================= */
function initAdminLogin() {
  const saved = localStorage.getItem(ADMIN_LOGIN_KEY);

  if (saved) {
    try {
      currentAdminUser = JSON.parse(saved);

      if (currentAdminUser && currentAdminUser.admin_id) {
        showAdminApp();
        return;
      }
    } catch (e) {
      localStorage.removeItem(ADMIN_LOGIN_KEY);
    }
  }

  showLoginScreen();
  loadAdminUsersForLogin();
}

function showAdminApp() {
  showAuthenticatedShell();
}

function onAdminAuthenticated() {
  setDefaultDashboardValues();
  loadPaidLeaveDashboard();
}

/* =========================
   有給管理ダッシュボード
========================= */
function getPaidLeaveDashboardFilters() {
  return {
    fiscal_year: Number(document.getElementById("pldFiscalYear").value || getCurrentFiscalYear()),
    company_code: document.getElementById("pldCompany").value || "ALL",
    keyword: document.getElementById("pldKeyword").value || "",
    five_day_incomplete_only: document.getElementById("pldFiveDayOnly").checked,
    expired_only: document.getElementById("pldExpiredOnly").checked,
    as_of_date: toInputDate(new Date())
  };
}

function loadPaidLeaveDashboard() {
  const table = document.getElementById("paidLeaveDashboardTable");
  const message = document.getElementById("paidLeaveDashboardMessage");
  const caption = document.getElementById("paidLeaveDashboardCaption");

  if (!table) return;

  table.innerHTML = `<tr><td colspan="7">読み込み中...</td></tr>`;
  if (message) message.innerHTML = "";
  if (caption) caption.textContent = "";

  google.script.run
    .withSuccessHandler(data => {
      renderPaidLeaveDashboard(data);
    })
    .withFailureHandler(err => {
      console.error("有給管理ダッシュボード取得エラー:", err);
      table.innerHTML = `<tr><td colspan="7">データ取得でエラーが発生しました。</td></tr>`;
      if (message) {
        message.innerHTML = `<div class="message error">${escapeHtml(err && err.message ? err.message : "有給管理ダッシュボードを取得できませんでした。")}</div>`;
      }
    })
    .getPaidLeaveDashboardData(getPaidLeaveDashboardFilters());
}

function renderPaidLeaveDashboard(data) {
  const result = data || {};
  const summary = result.summary || {};
  const rows = sortPaidLeaveDashboardRowsByPriority(
    applyPaidLeaveDashboardQuickFilter(Array.isArray(result.rows) ? result.rows : [])
  );
  const table = document.getElementById("paidLeaveDashboardTable");
  const caption = document.getElementById("paidLeaveDashboardCaption");

  currentPaidLeaveDashboardData = result;
  updatePaidLeaveDashboardQuickFilterButtons();

  setTextContent("pldTargetCount", summary.target_employee_count || 0);
  setTextContent("pldFiveDayIncompleteCount", summary.five_day_incomplete_count || 0);
  setTextContent("pldWithin90Count", summary.within_90_count || 0);
  setTextContent("pldWithin30Count", summary.within_30_count || 0);
  setTextContent("pldExpiredCount", summary.expired_count || 0);

  if (caption) {
    caption.textContent = `${result.fiscal_year || ""}年度 / ${result.company_code || "ALL"} / ${rows.length}件表示 / 基準日 ${formatDisplayDate(result.as_of_date)}`;
  }

  if (!table) return;

  if (rows.length === 0) {
    table.innerHTML = `<tr><td colspan="7">条件に一致する社員はいません。</td></tr>`;
    return;
  }

  table.innerHTML = rows.map(row => {
    const status = row.expiry_status || "normal";
    const nearest = row.nearest_expiry_date
      ? `${formatDisplayDate(row.nearest_expiry_date)}${row.nearest_expiry_days !== "" && row.nearest_expiry_days != null ? `（あと${row.nearest_expiry_days}日）` : ""}`
      : "-";

    return `
      <tr class="expiry-${escapeHtml(status)} paid-leave-dashboard-row"
          tabindex="0"
          data-employee-id="${escapeHtml(row.employee_id || "")}"
          onclick="openPaidLeaveDashboardEmployeeDetail(this.dataset.employeeId)"
          onkeydown="handlePaidLeaveDashboardRowKey(event, this.dataset.employeeId)">
        <td>
          <div class="pld-employee-name">${escapeHtml(row.employee_name || row.name || row.employee_id)}</div>
          <div class="pld-employee-id">${escapeHtml(row.display_employee_id || row.employee_id || "")}</div>
        </td>
        <td>${escapeHtml(getPaidLeaveDashboardCompanyLabel(row))}</td>
        <td>${escapeHtml(formatDays(row.current_remaining_days))}</td>
        <td>${escapeHtml(formatDays(row.fiscal_used_days))}</td>
        <td>${renderFiveDayStatus(row)}</td>
        <td><span class="pld-expiry-badge ${Number(row.expired_days || 0) > 0 ? "expired" : "normal"}">${escapeHtml(formatDays(row.expired_days))}</span></td>
        <td><span class="pld-expiry-badge ${escapeHtml(status)}">${escapeHtml(nearest)}</span></td>
      </tr>
    `;
  }).join("");
}

function handlePaidLeaveDashboardRowKey(event, employeeId) {
  if (!event || (event.key !== "Enter" && event.key !== " ")) return;

  event.preventDefault();
  openPaidLeaveDashboardEmployeeDetail(employeeId);
}

function openPaidLeaveDashboardEmployeeDetail(employeeId) {
  const targetEmployeeId = String(employeeId || "").trim();
  if (!targetEmployeeId) return;

  const modal = document.getElementById("paidLeaveEmployeeDetailModal");
  const message = document.getElementById("paidLeaveDetailMessage");
  const status = document.getElementById("paidLeaveDetailStatus");
  const summary = document.getElementById("paidLeaveDetailSummary");
  const grants = document.getElementById("paidLeaveDetailGrants");
  const title = document.getElementById("paidLeaveDetailTitle");
  const row = findPaidLeaveDashboardRowByEmployeeId_(targetEmployeeId);

  currentPaidLeaveDashboardDetailEmployeeId = targetEmployeeId;

  if (modal) {
    modal.style.display = "flex";
    modal.setAttribute("aria-hidden", "false");
  }

  if (title) title.textContent = "社員の有給詳細";
  if (message) message.innerHTML = `<div class="message">詳しい有給状況を読み込んでいます...</div>`;
  if (status) status.innerHTML = "";
  if (summary) {
    summary.innerHTML = row
      ? renderPaidLeaveDetailSummaryCards_(row)
      : `<div class="empty-message">社員情報を読み込んでいます。</div>`;
  }
  if (grants) {
    grants.innerHTML = `<div class="empty-message">付与ごとの有給を読み込んでいます。</div>`;
  }

  google.script.run
    .withSuccessHandler(detail => {
      if (currentPaidLeaveDashboardDetailEmployeeId !== targetEmployeeId) return;
      renderPaidLeaveDashboardEmployeeDetail(detail);
    })
    .withFailureHandler(err => {
      if (message) {
        message.innerHTML = `<div class="message error">${escapeHtml(err && err.message ? err.message : "社員の有給詳細を取得できませんでした。")}</div>`;
      }
    })
    .getPaidLeaveDashboardEmployeeDetail(targetEmployeeId, getPaidLeaveDashboardFilters());
}

function closePaidLeaveDashboardEmployeeDetail() {
  const modal = document.getElementById("paidLeaveEmployeeDetailModal");
  if (!modal || modal.style.display === "none") return;

  currentPaidLeaveDashboardDetailEmployeeId = "";
  modal.style.display = "none";
  modal.setAttribute("aria-hidden", "true");
}

function renderPaidLeaveDashboardEmployeeDetail(detail) {
  const data = detail || {};
  const employee = data.employee || {};
  const summary = data.summary || {};
  const grants = Array.isArray(data.grant_details) ? data.grant_details : [];
  const title = document.getElementById("paidLeaveDetailTitle");
  const subtitle = document.getElementById("paidLeaveDetailSubtitle");
  const message = document.getElementById("paidLeaveDetailMessage");
  const statusArea = document.getElementById("paidLeaveDetailStatus");
  const summaryArea = document.getElementById("paidLeaveDetailSummary");
  const grantsArea = document.getElementById("paidLeaveDetailGrants");
  const employeeName = employee.employee_name || employee.display_name || employee.name || employee.employee_id || "";
  const companyLabel = getPaidLeaveDashboardCompanyLabel(employee);
  const statusInfo = getPaidLeaveDetailStatusInfo(summary, grants);

  if (title) title.textContent = employeeName ? `${employeeName}さんの有給詳細` : "社員の有給詳細";
  if (subtitle) {
    subtitle.textContent = `${companyLabel} / 古い有給から順番に使った場合の残りを表示しています。`;
  }
  if (message) message.innerHTML = "";
  if (statusArea) statusArea.innerHTML = renderPaidLeaveDetailStatusNotice(statusInfo);
  if (summaryArea) summaryArea.innerHTML = renderPaidLeaveDetailSummaryCards_(summary);
  if (!grantsArea) return;

  if (grants.length === 0) {
    grantsArea.innerHTML = `<div class="empty-message">残っている付与ごとの有給はありません。</div>`;
    return;
  }

  grantsArea.innerHTML = `
    <div class="paid-leave-detail-grant-table-wrap">
      <table class="paid-leave-detail-grant-table">
        <thead>
          <tr>
            <th>付与日</th>
            <th>付与日数</th>
            <th>残日数</th>
            <th>有効期限</th>
            <th>状態</th>
          </tr>
        </thead>
        <tbody>
          ${grants.map(grant => `
            <tr class="status-${escapeHtml(grant.status || "normal")}">
              <td>${escapeHtml(formatDisplayDate(grant.grant_date))}</td>
              <td>${escapeHtml(formatDays(grant.grant_days))}</td>
              <td>${escapeHtml(formatDays(grant.remaining_days))}</td>
              <td>${escapeHtml(formatDisplayDate(grant.valid_to))}</td>
              <td>
                <span class="paid-leave-detail-status ${escapeHtml(grant.status || "normal")}">
                  ${escapeHtml(grant.status_label || "通常")}
                </span>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function getPaidLeaveDetailStatusInfo(summary, grants) {
  const data = summary || {};
  const grantRows = Array.isArray(grants) ? grants : [];
  const hasExpired = Number(data.expired_days || 0) > 0 ||
    grantRows.some(grant => String(grant.status || "") === "expired");
  const hasWithin30 = String(data.expiry_status || "") === "within_30" ||
    grantRows.some(grant => String(grant.status || "") === "within_30");
  const hasWithin90 = String(data.expiry_status || "") === "within_90" ||
    grantRows.some(grant => String(grant.status || "") === "within_90");
  const hasFiveDayIncomplete = data.five_day_completed !== true;
  const reasons = [];

  if (hasExpired) reasons.push("期限切れの有給があります。");
  if (hasWithin30) reasons.push("30日以内に期限が近い有給があります。");
  if (hasWithin90) reasons.push("90日以内に期限が近い有給があります。");
  if (hasFiveDayIncomplete) reasons.push("5日取得が足りない可能性があります。");

  if (hasExpired || hasWithin30) {
    return { status: "needs_check", label: "要確認", reasons };
  }

  if (hasWithin90) {
    return { status: "near_expiry", label: "期限が近い", reasons };
  }

  if (hasFiveDayIncomplete) {
    return { status: "needs_check", label: "要確認", reasons };
  }

  return {
    status: "ok",
    label: "問題なし",
    reasons: ["現時点で大きな確認事項はありません。"]
  };
}

function renderPaidLeaveDetailStatusNotice(statusInfo) {
  const info = statusInfo || {};
  const status = info.status || "ok";
  const label = info.label || "問題なし";
  const reasons = Array.isArray(info.reasons) && info.reasons.length
    ? info.reasons
    : ["現時点で大きな確認事項はありません。"];

  return `
    <div class="paid-leave-detail-status-notice-inner ${escapeHtml(status)}">
      <span class="paid-leave-detail-overall-badge ${escapeHtml(status)}">
        ${escapeHtml(label)}
      </span>
      <div class="paid-leave-detail-status-reasons">
        ${reasons.map(reason => `<div>${escapeHtml(reason)}</div>`).join("")}
      </div>
    </div>
  `;
}

function renderPaidLeaveDetailSummaryCards_(summary) {
  const nearest = summary.nearest_expiry_date
    ? `${formatDisplayDate(summary.nearest_expiry_date)}${summary.nearest_expiry_days !== "" && summary.nearest_expiry_days != null ? `（あと${summary.nearest_expiry_days}日）` : ""}`
    : "-";

  return `
    <div class="paid-leave-detail-summary-card">
      <span>現在の残日数</span>
      <strong>${escapeHtml(formatDays(summary.current_remaining_days))}</strong>
    </div>
    <div class="paid-leave-detail-summary-card">
      <span>今年使った日数</span>
      <strong>${escapeHtml(formatDays(summary.fiscal_used_days))}</strong>
    </div>
    <div class="paid-leave-detail-summary-card">
      <span>5日取得状況</span>
      <strong>${renderFiveDayStatus(summary)}</strong>
    </div>
    <div class="paid-leave-detail-summary-card">
      <span>期限切れ日数</span>
      <strong>${escapeHtml(formatDays(summary.expired_days))}</strong>
    </div>
    <div class="paid-leave-detail-summary-card">
      <span>最短期限日</span>
      <strong>${escapeHtml(nearest)}</strong>
    </div>
  `;
}

function findPaidLeaveDashboardRowByEmployeeId_(employeeId) {
  const data = currentPaidLeaveDashboardData || {};
  const rows = Array.isArray(data.rows) ? data.rows : [];
  return rows.find(row => String(row.employee_id || "") === String(employeeId || "")) || null;
}

function setPaidLeaveDashboardQuickFilter(filterKey) {
  currentPaidLeaveDashboardQuickFilter = filterKey || "all";
  updatePaidLeaveDashboardQuickFilterButtons();

  if (currentPaidLeaveDashboardData) {
    renderPaidLeaveDashboard(currentPaidLeaveDashboardData);
  }
}

function handlePaidLeaveDashboardSummaryKey(event, filterKey) {
  if (!event || (event.key !== "Enter" && event.key !== " ")) return;

  event.preventDefault();
  setPaidLeaveDashboardQuickFilter(filterKey);
}

function updatePaidLeaveDashboardQuickFilterButtons() {
  document.querySelectorAll(".paid-leave-quick-filter").forEach(button => {
    button.classList.toggle(
      "active",
      button.dataset.filter === currentPaidLeaveDashboardQuickFilter
    );
  });

  document.querySelectorAll(".paid-leave-summary-card.clickable").forEach(card => {
    card.classList.toggle(
      "active",
      card.dataset.filter === currentPaidLeaveDashboardQuickFilter
    );
  });
}

function applyPaidLeaveDashboardQuickFilter(rows) {
  const list = Array.isArray(rows) ? rows : [];

  if (currentPaidLeaveDashboardQuickFilter === "needs_now") {
    return list.filter(row =>
      isPaidLeaveDashboardExpired(row) ||
      isPaidLeaveDashboardWithin30(row) ||
      isPaidLeaveDashboardFiveDayIncomplete(row)
    );
  }

  if (currentPaidLeaveDashboardQuickFilter === "expiry_soon") {
    return list.filter(row =>
      isPaidLeaveDashboardExpired(row) ||
      isPaidLeaveDashboardWithin30(row) ||
      isPaidLeaveDashboardWithin90(row)
    );
  }

  if (currentPaidLeaveDashboardQuickFilter === "five_day") {
    return list.filter(row => isPaidLeaveDashboardFiveDayIncomplete(row));
  }

  return list;
}

function getPaidLeaveDashboardPriority(row) {
  if (isPaidLeaveDashboardExpired(row)) return 1;
  if (isPaidLeaveDashboardWithin30(row)) return 2;
  if (isPaidLeaveDashboardWithin90(row)) return 3;
  if (isPaidLeaveDashboardFiveDayIncomplete(row)) return 4;
  return 5;
}

function sortPaidLeaveDashboardRowsByPriority(rows) {
  return (Array.isArray(rows) ? rows.slice() : []).sort((a, b) => {
    const priorityDiff =
      getPaidLeaveDashboardPriority(a) - getPaidLeaveDashboardPriority(b);
    if (priorityDiff !== 0) return priorityDiff;

    const aDays = getPaidLeaveDashboardNearestExpiryDays_(a);
    const bDays = getPaidLeaveDashboardNearestExpiryDays_(b);
    if (aDays !== bDays) return aDays - bDays;

    return String(a.employee_id || "").localeCompare(String(b.employee_id || ""));
  });
}

function isPaidLeaveDashboardExpired(row) {
  return Number(row && row.expired_days || 0) > 0 ||
    String(row && row.expiry_status || "") === "expired";
}

function isPaidLeaveDashboardWithin30(row) {
  return String(row && row.expiry_status || "") === "within_30";
}

function isPaidLeaveDashboardWithin90(row) {
  return String(row && row.expiry_status || "") === "within_90";
}

function isPaidLeaveDashboardFiveDayIncomplete(row) {
  return row && row.five_day_completed !== true;
}

function getPaidLeaveDashboardNearestExpiryDays_(row) {
  const value = row ? row.nearest_expiry_days : "";
  if (value === "" || value == null) return Number.POSITIVE_INFINITY;

  const num = Number(value);
  return Number.isFinite(num) ? num : Number.POSITIVE_INFINITY;
}

function setTextContent(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value;
}

function getPaidLeaveDashboardCompanyLabel(row) {
  const code = String(row.company_code || "").trim();
  const name = String(row.company_name || "").trim();
  if (name && code) return `${name}（${code}）`;
  return name || code || "-";
}

function renderFiveDayStatus(row) {
  const completed = row.five_day_completed === true;
  const used = Number(row.five_day_used || 0);
  const remaining = Number(row.five_day_remaining || 0);
  const cls = completed ? "complete" : "incomplete";
  const label = completed ? "達成" : `未達（あと${remaining}日）`;

  return `
    <span class="pld-five-day ${cls}">
      ${escapeHtml(label)} / ${escapeHtml(formatDays(used))}
    </span>
  `;
}
</script>
