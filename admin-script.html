<script>
let currentStatus = "pending";
let currentMode = "recent";

window.addEventListener("DOMContentLoaded", () => {
  setDefaultReportValues();
  setDefaultSearchDates();
  loadRequests("pending");
});

function setDefaultReportValues() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;

  document.getElementById("monthlyYear").value = year;
  document.getElementById("monthlyMonth").value = month;
  document.getElementById("yearlyFiscalYear").value = month >= 4 ? year : year - 1;
}

function setDefaultSearchDates() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);

  document.getElementById("searchStartDate").value = toInputDate(start);
  document.getElementById("searchEndDate").value = toInputDate(end);
}

function toInputDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function formatDisplayDate(value) {
  if (!value) return "";
  return String(value).replace(/-/g, "/");
}

function updateCurrentRangeText(text) {
  const el = document.getElementById("currentRangeBox");
  if (el) el.textContent = text;
}

function setActiveTab(tabName) {
  ["pending", "approved", "rejected", "logs"].forEach(name => {
    const el = document.getElementById("tab-" + name);
    if (!el) return;
    el.classList.toggle("active", name === tabName);
  });
}

function showLoading(targetId, text) {
  const el = document.getElementById(targetId);
  if (!el) return;
  el.innerHTML = `<div class="message">${escapeHtml(text || "読み込み中...")}</div>`;
}

function showError(targetId, text) {
  const el = document.getElementById(targetId);
  if (!el) return;
  el.innerHTML = `<div class="message error">${escapeHtml(text || "エラーが発生しました")}</div>`;
}

function showExportMessage(message, type) {
  const el = document.getElementById("exportMessage");
  if (!el) return;
  const cls = type === "error" ? "message error" : "message success";
  el.innerHTML = `<div class="${cls}">${escapeHtml(message)}</div>`;
}

function escapeHtml(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getStatusLabel(status) {
  if (status === "pending") return "承認待ち";
  if (status === "approved") return "承認済み";
  if (status === "rejected") return "否認";
  return status || "";
}

function formatDays(value) {
  const num = Number(value || 0);
  return `${num}日`;
}

/* 申請一覧 */
function loadRequests(status) {
  currentStatus = status;
  currentMode = "recent";

  document.getElementById("requestView").style.display = "flex";
  document.getElementById("logView").style.display = "none";

  setActiveTab(status);
  setDefaultSearchDates();

  const start = document.getElementById("searchStartDate").value;
  const end = document.getElementById("searchEndDate").value;

  updateCurrentRangeText(
    `現在表示中：${getStatusLabel(status)} / 前月＋当月（${formatDisplayDate(start)} ～ ${formatDisplayDate(end)}）`
  );

  showLoading("requestView", "申請データを読み込み中です...");

  google.script.run
    .withSuccessHandler(renderCards)
    .withFailureHandler(err => {
      console.error("GASエラー:", err);
      showError("requestView", "申請データ取得でエラーが発生しました");
    })
    .getRequestsByStatus(status);
}

function searchRequestList() {
  document.getElementById("requestView").style.display = "flex";
  document.getElementById("logView").style.display = "none";

  const keyword = document.getElementById("searchKeyword").value;
  const status = document.getElementById("searchStatus").value;
  const start = document.getElementById("searchStartDate").value;
  const end = document.getElementById("searchEndDate").value;

  currentStatus = status;
  currentMode = "search";

  setActiveTab(status === "all" ? "" : status);

  updateCurrentRangeText(
    `現在表示中：検索結果 / ${formatDisplayDate(start) || "開始日なし"} ～ ${formatDisplayDate(end) || "終了日なし"}`
  );

  showLoading("requestView", "検索しています...");

  google.script.run
    .withSuccessHandler(renderCards)
    .withFailureHandler(err => {
      console.error("検索エラー:", err);
      showError("requestView", "検索でエラーが発生しました");
    })
    .searchRequests({
      employeeKeyword: keyword,
      status: status,
      start_date: start,
      end_date: end
    });
}

function resetSearch() {
  document.getElementById("searchKeyword").value = "";
  document.getElementById("searchStatus").value = currentStatus === "all" ? "pending" : currentStatus;
  setDefaultSearchDates();

  if (currentStatus === "approved" || currentStatus === "rejected") {
    loadRequests(currentStatus);
  } else {
    loadRequests("pending");
  }
}

function renderCards(data) {
  const container = document.getElementById("requestView");
  container.innerHTML = "";

  if (!Array.isArray(data)) {
    container.innerHTML = `<div class="message error">配列ではないデータを受信しました</div>`;
    return;
  }

  if (data.length === 0) {
    container.innerHTML = `<div class="message">該当する申請はありません。</div>`;
    return;
  }

  data.forEach(req => {
    const card = document.createElement("div");
    card.className = "compact-card " + escapeHtml(req.status || "pending");

    let buttonsHtml = `
      <button class="btn btn-refresh" type="button" onclick="reloadCurrentView()">再読込</button>
    `;

    if (req.status === "pending") {
      buttonsHtml = `
        <button class="btn btn-approve" type="button" onclick="approveRequestAction('${escapeHtml(req.request_id)}')">承認</button>
        <button class="btn btn-reject" type="button" onclick="rejectRequestAction('${escapeHtml(req.request_id)}')">否認</button>
      `;
    }

    const reasonText = req.reason_detail
      ? `${req.reason || "記載なし"} / ${req.reason_detail}`
      : (req.reason || "記載なし");

    card.innerHTML = `
      <div class="compact-main">
        <div class="compact-top">
          <span class="compact-name">${escapeHtml(req.employee_name)}</span>
          <span class="compact-id">${escapeHtml(req.employee_id || "")}</span>
          <span class="status-badge ${escapeHtml(req.status)}">${escapeHtml(getStatusLabel(req.status))}</span>
        </div>

        <div class="compact-meta">
          <span class="mini-chip">日付 <strong>${escapeHtml(req.date_label || "")}</strong></span>
          <span class="mini-chip">日数 <strong>${escapeHtml(formatDays(req.days))}</strong></span>
          <span class="mini-chip">半日 <strong>${escapeHtml(req.half_day || "なし")}</strong></span>
          <span class="mini-chip">残 <strong>${escapeHtml(formatDays(req.current_remaining_days))}</strong></span>
          <span class="mini-chip">取得済 <strong>${escapeHtml(formatDays(req.used_days))}</strong></span>
        </div>

        <div class="compact-detail">
          理由：${escapeHtml(reasonText)} ／ 申請ID：${escapeHtml(req.request_id)}
        </div>
      </div>

      <div class="compact-actions">
        ${buttonsHtml}
      </div>
    `;

    container.appendChild(card);
  });
}

function reloadCurrentView() {
  if (currentMode === "search") {
    searchRequestList();
  } else {
    loadRequests(currentStatus);
  }
}

function approveRequestAction(requestId) {
  if (!requestId) return;
  if (!confirm("この申請を承認しますか？")) return;

  showLoading("requestView", "承認処理を実行中です...");

  google.script.run
    .withSuccessHandler(() => {
      alert("承認しました");
      reloadCurrentView();
    })
    .withFailureHandler(err => {
      console.error("承認エラー:", err);
      showError("requestView", "承認処理でエラーが発生しました");
    })
    .approveRequest(requestId);
}

function rejectRequestAction(requestId) {
  if (!requestId) return;

  const reason = prompt("否認理由を入力してください", "");
  if (reason === null) return;

  showLoading("requestView", "否認処理を実行中です...");

  google.script.run
    .withSuccessHandler(() => {
      alert("否認しました");
      reloadCurrentView();
    })
    .withFailureHandler(err => {
      console.error("否認エラー:", err);
      showError("requestView", "否認処理でエラーが発生しました");
    })
    .rejectRequest(requestId, reason);
}

/* ログ */
function loadLogs() {
  document.getElementById("requestView").style.display = "none";
  document.getElementById("logView").style.display = "block";

  setActiveTab("logs");
  setDefaultSearchDates();

  const start = document.getElementById("searchStartDate").value;
  const end = document.getElementById("searchEndDate").value;

  updateCurrentRangeText(
    `現在表示中：ログ / 前月＋当月（${formatDisplayDate(start)} ～ ${formatDisplayDate(end)}）`
  );

  showLoading("logView", "ログを読み込み中です...");

  google.script.run
    .withSuccessHandler(renderLogs)
    .withFailureHandler(err => {
      console.error("ログ取得エラー:", err);
      showError("logView", "ログ取得でエラーが発生しました");
    })
    .getUsageLogs();
}

function renderLogs(data) {
  const logView = document.getElementById("logView");
  const requestView = document.getElementById("requestView");

  if (!logView) return;

  if (requestView) requestView.style.display = "none";
  logView.style.display = "block";

  if (!Array.isArray(data) || data.length === 0) {
    logView.innerHTML = `<div class="empty-message">ログはありません。</div>`;
    return;
  }

  logView.innerHTML = data.map(log => `
    <div class="log-card ${escapeHtml(log.type_class || "")}">
      <div class="log-card-header">
        <span class="log-badge">${escapeHtml(log.type_label || log.type || "")}</span>
        <span class="log-date">${escapeHtml(log.date || "")}</span>
      </div>

      <div class="log-main">
        ${escapeHtml(log.comment || "")}
      </div>

      <div class="log-sub">
        対象ID：${escapeHtml(log.request_id || "-")}
        ${log.employee_name ? " ／ 氏名：" + escapeHtml(log.employee_name) : ""}
        ／ 操作者：${escapeHtml(log.user_name || log.user_id || "-")}
      </div>
    </div>
  `).join("");
}

/* 出力 */
function exportMonthlyReport() {
  const year = Number(document.getElementById("monthlyYear").value);
  const month = Number(document.getElementById("monthlyMonth").value);

  if (!year || !month) {
    showExportMessage("月間一覧の対象年・対象月を入力してください。", "error");
    return;
  }

  showExportMessage("月間一覧を出力しています...", "success");

  google.script.run
    .withSuccessHandler(res => {
      showExportMessage(
        `月間一覧を出力しました。対象期間: ${res.period_start} ～ ${res.period_end} / 明細 ${res.detail_count} 件 / 集計 ${res.total_count} 件`,
        "success"
      );
    })
    .withFailureHandler(err => {
      console.error("月間出力エラー:", err);
      showExportMessage("月間一覧の出力でエラーが発生しました。", "error");
    })
    .exportMonthlyPaidLeaveReport(year, month);
}

function exportYearlyReport() {
  const fiscalYear = Number(document.getElementById("yearlyFiscalYear").value);

  if (!fiscalYear) {
    showExportMessage("年間一覧の対象年度を入力してください。", "error");
    return;
  }

  showExportMessage("年間一覧を出力しています...", "success");

  google.script.run
    .withSuccessHandler(res => {
      showExportMessage(
        `年間一覧を出力しました。対象年度: ${res.period_start} ～ ${res.period_end} / ${res.row_count} 名分`,
        "success"
      );
    })
    .withFailureHandler(err => {
      console.error("年間出力エラー:", err);
      showExportMessage("年間一覧の出力でエラーが発生しました。", "error");
    })
    .exportYearlyPaidLeaveReport(fiscalYear);
}

let monthlyPreviewData = null;

/* =========================
   月間一覧プレビュー
========================= */
function previewMonthlyReport() {
  const year = document.getElementById("monthlyYear").value;
  const month = document.getElementById("monthlyMonth").value;
  const company = document.getElementById("monthlyCompany").value;

  const filters = buildMonthlyPreviewFilters(year, month, company);

  showExportMessage("月間一覧を作成しています...", "");

  google.script.run
    .withSuccessHandler(data => {
      monthlyPreviewData = data;
      renderMonthlyPreview(data);
      showExportMessage("月間一覧を表示しました。", "ok");
    })
    .withFailureHandler(err => {
      console.error(err);
      showExportMessage("月間一覧の取得でエラーが発生しました。\n" + (err.message || err), "error");
    })
    .getMonthlyPaidLeaveReportPreview(filters);
}

function buildMonthlyPreviewFilters(year, month, company) {
  const filters = {
    target_year: year,
    target_month: month,
    company_code: "",
    company_name: ""
  };

  if (company === "MAIN") {
    filters.company_code = "MAIN";
  }

  if (company === "PARTNER") {
    filters.company_code = "PARTNER";
  }

  if (company === "TOMOHISA") {
    filters.company_code = "PARTNER";
    filters.company_name = "（有）友尚建設";
  }

  return filters;
}

function renderMonthlyPreview(data) {
  const area = document.getElementById("monthlyPreviewArea");
  const summary = document.getElementById("monthlyPreviewSummary");
  const table = document.getElementById("monthlyPreviewTable");

  if (!area || !summary || !table) return;

  area.style.display = "block";

  const companyLabel = getMonthlyCompanyLabel(data.company_code, data.company_name);

  summary.textContent =
    `対象期間：${data.period_start} 〜 ${data.period_end} ／ ${companyLabel} ／ 明細 ${data.detail_count}件`;

  if (!data.detail_rows || data.detail_rows.length === 0) {
    table.innerHTML = `<div class="history-empty">該当データはありません。</div>`;
    return;
  }

  const detailHtml = data.detail_rows.map(row => `
    <tr>
      <td>${escapeHtml(row.display_employee_id || row.employee_id)}</td>
      <td>${escapeHtml(row.employee_name)}</td>
      <td>${escapeHtml(row.company_name || row.company_code)}</td>
      <td>${escapeHtml(row.date)}</td>
      <td style="text-align:right;">${escapeHtml(row.days)}</td>
    </tr>
  `).join("");

  const totalHtml = data.total_rows.map(row => `
    <tr>
      <td>${escapeHtml(row.display_employee_id || row.employee_id)}</td>
      <td>${escapeHtml(row.employee_name)}</td>
      <td>${escapeHtml(row.company_name || row.company_code)}</td>
      <td style="text-align:right;">${escapeHtml(row.total_days)}</td>
    </tr>
  `).join("");

  table.innerHTML = `
    <div style="overflow-x:auto;">
      <h3>取得明細</h3>
      <table class="preview-table">
        <thead>
          <tr>
            <th>表示ID</th>
            <th>氏名</th>
            <th>会社</th>
            <th>取得日</th>
            <th>日数</th>
          </tr>
        </thead>
        <tbody>${detailHtml}</tbody>
      </table>

      <h3 style="margin-top:24px;">社員別合計</h3>
      <table class="preview-table">
        <thead>
          <tr>
            <th>表示ID</th>
            <th>氏名</th>
            <th>会社</th>
            <th>合計日数</th>
          </tr>
        </thead>
        <tbody>${totalHtml}</tbody>
      </table>
    </div>
  `;
}

function getMonthlyCompanyLabel(companyCode, companyName) {
  if (companyName) return companyName;
  if (companyCode === "MAIN") return "MAIN（自社）";
  if (companyCode === "PARTNER") return "PARTNER（協力会社）";
  return "すべて";
}

/* =========================
   CSVダウンロード
========================= */
function downloadMonthlyReportCsv() {
  if (!monthlyPreviewData || !monthlyPreviewData.detail_rows) {
    alert("先に「画面で確認する」を押してください。");
    return;
  }

  const rows = [];

  rows.push(["月間有給取得一覧"]);
  rows.push([`対象期間`, `${monthlyPreviewData.period_start}〜${monthlyPreviewData.period_end}`]);
  rows.push([`会社`, getMonthlyCompanyLabel(monthlyPreviewData.company_code, monthlyPreviewData.company_name)]);
  rows.push([]);
  rows.push(["表示ID", "社員ID", "氏名", "会社コード", "会社名", "取得日", "取得日数"]);

  monthlyPreviewData.detail_rows.forEach(row => {
    rows.push([
      row.display_employee_id || "",
      row.employee_id || "",
      row.employee_name || "",
      row.company_code || "",
      row.company_name || "",
      row.date || "",
      row.days || 0
    ]);
  });

  rows.push([]);
  rows.push(["社員別合計"]);
  rows.push(["表示ID", "社員ID", "氏名", "会社コード", "会社名", "合計取得日数"]);

  monthlyPreviewData.total_rows.forEach(row => {
    rows.push([
      row.display_employee_id || "",
      row.employee_id || "",
      row.employee_name || "",
      row.company_code || "",
      row.company_name || "",
      row.total_days || 0
    ]);
  });

  const csv = rows.map(row =>
    row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(",")
  ).join("\n");

  const bom = "\uFEFF";
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });

  const companyPart = getMonthlyCompanyLabel(
    monthlyPreviewData.company_code,
    monthlyPreviewData.company_name
  ).replace(/[\\/:*?"<>|]/g, "");

  const filename =
    `月間有給取得一覧_${monthlyPreviewData.target_year}_${monthlyPreviewData.target_month}_${companyPart}.csv`;

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();

  URL.revokeObjectURL(link.href);
}
</script>
