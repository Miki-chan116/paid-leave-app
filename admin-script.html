<script>
let currentStatus = "pending";
let currentMode = "recent";
let dashboardSummaryTimer = null;

const PAGE_SIZE = 20;
const pageOffsets = {
  sixMonth: 0,
  yearly: 0
};

const selectedRequestIds = new Set();

window.addEventListener("DOMContentLoaded", () => {
  initAdminLogin();
});

function setDefaultReportValues() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const fiscalYear = month >= 4 ? year : year - 1;

  document.getElementById("monthlyYear").value = year;
  document.getElementById("monthlyMonth").value = month;
  document.getElementById("yearlyFiscalYear").value = fiscalYear;
}

function setDefaultSearchDates(status) {
  const now = new Date();
  const isPending = String(status || "pending") === "pending";
  const start = isPending
    ? new Date(now.getFullYear(), now.getMonth(), 1)
    : new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const end = isPending
    ? new Date(now.getFullYear(), now.getMonth() + 2, 0)
    : new Date(now.getFullYear(), now.getMonth() + 1, 0);

  document.getElementById("searchStartDate").value = toInputDate(start);
  document.getElementById("searchEndDate").value = toInputDate(end);
}

function toInputDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function formatDisplayDate(value) {
  if (!value) return "";
  return String(value).replace(/-/g, "/");
}

function updateCurrentRangeText(text) {
  const el = document.getElementById("currentRangeBox");
  if (el) el.textContent = text;
}

function updateSearchHint(text) {
  const el = document.getElementById("searchHint");
  if (el) el.textContent = text || "前月＋当月";
}

function getDefaultRangeLabel(status) {
  return String(status || "") === "pending" ? "当月＋翌月" : "前月＋当月";
}

function setActiveTab(tabName) {
  ["pending", "approved", "rejected", "logs"].forEach(name => {
    const el = document.getElementById("tab-" + name);
    if (!el) return;
    el.classList.toggle("active", name === tabName);
  });
}

function showLoading(targetId, text) {
  const el = document.getElementById(targetId);
  if (!el) return;
  el.innerHTML = `
    <div class="state-message loading-state">
      <div class="state-title">${escapeHtml(text || "読み込み中...")}</div>
      <div class="state-sub">少しお待ちください。</div>
    </div>
  `;
}

function showError(targetId, text) {
  const el = document.getElementById(targetId);
  if (!el) return;
  el.innerHTML = `
    <div class="state-message error-state">
      <div class="state-title">${escapeHtml(text || "エラーが発生しました")}</div>
      <div class="state-sub">時間をおいて再度お試しください。</div>
    </div>
  `;
}

function showExportMessage(message, type) {
  const el = document.getElementById("exportMessage");
  if (!el) return;
  const cls = type === "error" ? "message error" : "message success";
  el.innerHTML = `<div class="${cls}">${escapeHtml(message)}</div>`;
}

function escapeHtml(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getStatusLabel(status) {
  if (status === "all") return "すべて";
  if (status === "pending") return "承認待ち";
  if (status === "approved") return "承認済み";
  if (status === "rejected") return "否認";
  return status || "";
}

function getRequestTypeLabel(halfDay, days) {
  const value = String(halfDay || "").trim().toLowerCase();
  if (value === "am") return "午前半休";
  if (value === "pm") return "午後半休";
  if (value) return "半日有給";
  if (Number(days || 0) > 1) return "複数日有給";
  return "1日有給";
}

function formatDays(value) {
  const num = Number(value || 0);
  return `${num}日`;
}

function renderEmptyState(title, subText) {
  return `
    <div class="state-message empty-state">
      <div class="state-title">${escapeHtml(title)}</div>
      <div class="state-sub">${escapeHtml(subText || "")}</div>
    </div>
  `;
}

/* =========================
   簡易ログイン
========================= */
const ADMIN_LOGIN_KEY = "paid_leave_admin_login";

let currentAdminUser = null;

function initAdminLogin() {
  const saved = localStorage.getItem(ADMIN_LOGIN_KEY);

  if (saved) {
    try {
      currentAdminUser = JSON.parse(saved);

      if (currentAdminUser && currentAdminUser.admin_id) {
        showAdminApp();
        return;
      }
    } catch (e) {
      localStorage.removeItem(ADMIN_LOGIN_KEY);
    }
  }

  showLoginScreen();
  loadAdminUsersForLogin();
}

function showLoginScreen() {
  const loginScreen = document.getElementById("loginScreen");
  const adminApp = document.getElementById("adminApp");

  if (loginScreen) loginScreen.style.display = "flex";
  if (adminApp) adminApp.classList.add("admin-app-hidden");
}

function showAdminApp() {
  const loginScreen = document.getElementById("loginScreen");
  const adminApp = document.getElementById("adminApp");

  if (loginScreen) loginScreen.style.display = "none";
  if (adminApp) adminApp.classList.remove("admin-app-hidden");

  renderLoginUserBar();

  setDefaultReportValues();
  setDefaultSearchDates();
  loadRequests("pending");
}

function renderLoginUserBar() {
  const bar = document.getElementById("loginUserBar");
  if (!bar) return;

  const name = currentAdminUser ? currentAdminUser.admin_name : "";

  bar.innerHTML = `
    <span>ログイン中：${escapeHtml(name)}</span>
    <button class="logout-btn" type="button" onclick="logoutAdmin()">ログアウト</button>
  `;
}

function loadAdminUsersForLogin() {
  const select = document.getElementById("adminUserSelect");
  const message = document.getElementById("loginMessage");

  if (message) message.textContent = "";

  google.script.run
    .withSuccessHandler(users => {
      if (!select) return;

      if (!Array.isArray(users) || users.length === 0) {
        select.innerHTML = `<option value="">有効な管理者がいません</option>`;
        return;
      }

      select.innerHTML = `<option value="">選択してください</option>`;

      users.forEach(user => {
        const option = document.createElement("option");
        option.value = user.admin_id;
        option.textContent = `${user.admin_name}（${user.admin_id}）`;
        select.appendChild(option);
      });
    })
    .withFailureHandler(err => {
      console.error("管理者一覧取得エラー:", err);
      if (message) message.textContent = "管理者一覧の取得でエラーが発生しました。";
    })
    .getAdminUsersForLogin();
}

function loginAdmin() {
  const adminId = document.getElementById("adminUserSelect").value;
  const pin = document.getElementById("adminPinInput").value;
  const message = document.getElementById("loginMessage");

  if (message) message.textContent = "";

  google.script.run
    .withSuccessHandler(user => {
      currentAdminUser = user;

      localStorage.setItem(ADMIN_LOGIN_KEY, JSON.stringify({
        admin_id: user.admin_id,
        admin_name: user.admin_name
      }));

      showAdminApp();
    })
    .withFailureHandler(err => {
      console.error("ログインエラー:", err);
      if (message) {
        message.textContent = err && err.message ? err.message : "ログインできませんでした。";
      }
    })
    .verifyAdminLogin(adminId, pin);
}

function logoutAdmin() {
  localStorage.removeItem(ADMIN_LOGIN_KEY);
  currentAdminUser = null;

  const pin = document.getElementById("adminPinInput");
  if (pin) pin.value = "";

  showLoginScreen();
  loadAdminUsersForLogin();
}

/* =========================
   管理トップ件数表示
========================= */
function loadDashboardSummary() {
  google.script.run
    .withSuccessHandler(summary => {

      const pending = document.getElementById("pendingCount");
      const approved = document.getElementById("approvedCount");
      const rejected = document.getElementById("rejectedCount");
      const pendingSub = document.querySelector(".pending-card .dashboard-sub");

      if (pending) {
        pending.textContent = summary.pending || 0;
      }

      if (pendingSub) {
        const outOfRange = Number(summary.pending_out_of_range || 0);
        pendingSub.textContent = outOfRange > 0
          ? `期間外にも承認待ちがあります（${outOfRange}件）`
          : "当月＋翌月の未対応";
      }

      if (approved) {
        approved.textContent = summary.approved || 0;
      }

      if (rejected) {
        rejected.textContent = summary.rejected || 0;
      }

    })
    .withFailureHandler(err => {
      console.error("dashboard summary error:", err);

      ["pendingCount", "approvedCount", "rejectedCount"]
        .forEach(id => {

          const el = document.getElementById(id);

          if (el) {
            el.textContent = "!";
          }

        });
    })
    .getAdminDashboardSummary();
}

function scheduleDashboardSummaryRefresh(delayMs) {
  if (dashboardSummaryTimer) {
    clearTimeout(dashboardSummaryTimer);
  }

  dashboardSummaryTimer = setTimeout(() => {
    dashboardSummaryTimer = null;
    loadDashboardSummary();
  }, Number(delayMs || 300));
}

/* 申請一覧 */
function loadRequests(status) {
  currentStatus = status;
  currentMode = "recent";

  document.getElementById("requestView").style.display = "flex";
  document.getElementById("logView").style.display = "none";

  setActiveTab(status);
  setDefaultSearchDates(status);
  document.getElementById("searchKeyword").value = "";
  document.getElementById("searchStatus").value = status;

  const start = document.getElementById("searchStartDate").value;
  const end = document.getElementById("searchEndDate").value;
  const rangeLabel = getDefaultRangeLabel(status);

  updateCurrentRangeText(
    `現在表示中：${getStatusLabel(status)} / ${rangeLabel}（${formatDisplayDate(start)} ～ ${formatDisplayDate(end)}）`
  );
  updateSearchHint(`${getStatusLabel(status)} / ${rangeLabel}`);

  showLoading("requestView", "申請データを読み込み中です...");

  google.script.run
    .withSuccessHandler(data => {
      renderCards(data);
      scheduleDashboardSummaryRefresh(300);
    })
    .withFailureHandler(err => {
      console.error("GASエラー:", err);
      showError("requestView", "申請データ取得でエラーが発生しました");
    })
    .getRequestsByStatus(status);
}

function searchRequestList(options) {
  const opts = options || {};

  document.getElementById("requestView").style.display = "flex";
  document.getElementById("logView").style.display = "none";

  const keyword = document.getElementById("searchKeyword").value;
  const status = document.getElementById("searchStatus").value;
  const start = document.getElementById("searchStartDate").value;
  const end = document.getElementById("searchEndDate").value;

  currentStatus = status;
  currentMode = "search";

  setActiveTab(status === "all" ? "" : status);

  updateCurrentRangeText(
    `現在表示中：検索結果 / ${formatDisplayDate(start) || "開始日なし"} ～ ${formatDisplayDate(end) || "終了日なし"}`
  );
  updateSearchHint(
    `検索中：${getStatusLabel(status) || "すべて"} / ${formatDisplayDate(start) || "開始日なし"} ～ ${formatDisplayDate(end) || "終了日なし"}`
  );

  showLoading("requestView", "検索しています...");

  google.script.run
    .withSuccessHandler(data => {
      renderCards(data);
      if (opts.refreshSummary) {
        scheduleDashboardSummaryRefresh(300);
      }
    })
    .withFailureHandler(err => {
      console.error("検索エラー:", err);
      showError("requestView", "検索でエラーが発生しました");
    })
    .searchRequests({
      employeeKeyword: keyword,
      status: status,
      start_date: start,
      end_date: end
    });
}

function resetSearch() {
  const resetStatus = currentStatus === "all" ? "pending" : currentStatus;

  document.getElementById("searchKeyword").value = "";
  document.getElementById("searchStatus").value = resetStatus;
  setDefaultSearchDates(resetStatus);

  if (currentStatus === "approved" || currentStatus === "rejected") {
    loadRequests(currentStatus);
  } else {
    loadRequests("pending");
  }
}

function renderCards(data) {
  const bulkBar = document.getElementById("bulkActionBar");

  if (bulkBar) {
    bulkBar.style.display =
      currentStatus === "pending"
        ? "flex"
        : "none";
  }

  selectedRequestIds.clear();
  updateSelectedCount();

  const container = document.getElementById("requestView");
  container.innerHTML = "";

  if (!Array.isArray(data)) {
    container.innerHTML = renderEmptyState(
      "申請データを表示できませんでした。",
      "受信データの形式を確認してください。"
    );
    return;
  }

  if (data.length === 0) {
    const rangeLabel = getDefaultRangeLabel(currentStatus);
    container.innerHTML = currentMode === "search"
      ? renderEmptyState("検索条件に一致する申請はありません。", `条件を変えるか、${rangeLabel}に戻してください。`)
      : renderEmptyState("現在表示できる申請はありません。", "別のステータスを確認するか、検索条件を変更してください。");
    return;
  }

  data.forEach(req => {
    const card = document.createElement("div");
    card.className = "compact-card " + escapeHtml(req.status || "pending");

    let buttonsHtml = `
      <button class="btn btn-refresh btn-card-action" type="button" onclick="reloadCurrentView()">再読込</button>
    `;

    if (req.status === "pending") {
      buttonsHtml = `
        <button class="btn btn-approve btn-card-action" type="button" onclick="approveRequestAction('${escapeHtml(req.request_id)}')">承認</button>
        <button class="btn btn-reject btn-card-action" type="button" onclick="rejectRequestAction('${escapeHtml(req.request_id)}')">否認</button>
      `;
    }

    const reasonText = req.reason_detail
      ? `${req.reason || "記載なし"} / ${req.reason_detail}`
      : (req.reason || "記載なし");
    const requestType = getRequestTypeLabel(req.half_day, req.days);

    card.innerHTML = `
      <div class="compact-main-row">

        ${
          req.status === "pending"
            ? `
              <div class="request-checkbox-wrap">
                <input
                  type="checkbox"
                  class="request-checkbox"
                  data-request-id="${escapeHtml(req.request_id)}"
                  onchange="toggleRequestSelection(this.dataset.requestId, this.checked)"
                >
              </div>
            `
            : ""
        }

        <div class="compact-main">
          <div class="compact-top">
            <div>
              <span class="compact-name">${escapeHtml(req.employee_name)}</span>
              <span class="compact-id">${escapeHtml(req.employee_id || "")}</span>
            </div>
            <span class="status-badge ${escapeHtml(req.status)}">${escapeHtml(getStatusLabel(req.status))}</span>
          </div>

          <div class="compact-meta">
            <span class="mini-chip important-chip">取得希望日 <strong>${escapeHtml(req.date_label || "")}</strong></span>
            <span class="mini-chip">日数 <strong>${escapeHtml(formatDays(req.days))}</strong></span>
            <span class="mini-chip">申請種別 <strong>${escapeHtml(requestType)}</strong></span>
            <span class="mini-chip">残日数 <strong>${escapeHtml(formatDays(req.current_remaining_days))}</strong></span>
          </div>

          <div class="compact-detail">
            <span class="detail-label">理由</span>
            <span>${escapeHtml(reasonText)}</span>
          </div>

          <div class="compact-sub-detail">
            取得済：${escapeHtml(formatDays(req.used_days))} ／ 申請ID：${escapeHtml(req.request_id)}
          </div>
        </div>

      </div>

      <div class="compact-actions">
        ${buttonsHtml}
      </div>
    `;

    container.appendChild(card);
  });
}

function reloadCurrentView(options) {
  const opts = options || {};

  if (currentMode === "search") {
    searchRequestList(opts);
  } else {
    loadRequests(currentStatus);
  }
}

function approveRequestAction(requestId) {
  if (!requestId) return;
  if (!confirm("この申請を承認しますか？")) return;

  showLoading("requestView", "承認処理を実行中です...");

  google.script.run
    .withSuccessHandler(() => {
      alert("承認しました");
      reloadCurrentView({ refreshSummary: true });
})
    .withFailureHandler(err => {
      console.error("承認エラー:", err);
      showError("requestView", "承認処理でエラーが発生しました");
    })
    .approveRequest(requestId, currentAdminUser);
}

function rejectRequestAction(requestId) {
  if (!requestId) return;

  const reason = prompt("否認理由を入力してください", "");
  if (reason === null) return;

  showLoading("requestView", "否認処理を実行中です...");

  google.script.run
    .withSuccessHandler(() => {
      alert("否認しました");
      reloadCurrentView({ refreshSummary: true });
    })
    .withFailureHandler(err => {
      console.error("否認エラー:", err);
      showError("requestView", "否認処理でエラーが発生しました");
    })
    .rejectRequest(requestId, reason, currentAdminUser);
}

/* ログ */
function loadLogs() {
  document.getElementById("requestView").style.display = "none";
  document.getElementById("logView").style.display = "block";

  setActiveTab("logs");
  setDefaultSearchDates();
  updateSearchHint("ログ / 前月＋当月");

  const start = document.getElementById("searchStartDate").value;
  const end = document.getElementById("searchEndDate").value;

  updateCurrentRangeText(
    `現在表示中：ログ / 前月＋当月（${formatDisplayDate(start)} ～ ${formatDisplayDate(end)}）`
  );

  showLoading("logView", "ログを読み込み中です...");

  google.script.run
    .withSuccessHandler(renderLogs)
    .withFailureHandler(err => {
      console.error("ログ取得エラー:", err);
      showError("logView", "ログ取得でエラーが発生しました");
    })
    .getUsageLogs();
}

function renderLogs(data) {
  const logView = document.getElementById("logView");
  const requestView = document.getElementById("requestView");

  if (!logView) return;

  if (requestView) requestView.style.display = "none";
  logView.style.display = "block";

  if (!Array.isArray(data) || data.length === 0) {
    logView.innerHTML = `<div class="empty-message">ログはありません。</div>`;
    return;
  }

  logView.innerHTML = data.map(log => `
    <div class="log-card ${escapeHtml(log.type_class || "")}">
      <div class="log-card-header">
        <span class="log-badge">${escapeHtml(log.type_label || log.type || "")}</span>
        <span class="log-date">${escapeHtml(log.date || "")}</span>
      </div>

      <div class="log-main">
        ${escapeHtml(log.comment || "")}
      </div>

      <div class="log-sub">
        対象ID：${escapeHtml(log.request_id || "-")}
        ${log.employee_name ? " ／ 氏名：" + escapeHtml(log.employee_name) : ""}
        ／ 操作者：${escapeHtml(log.user_name || log.user_id || "-")}
      </div>
    </div>
  `).join("");
}

/* =========================
   出力
========================= */
let monthlyPreviewData = null;
let yearlyPreviewData = null;

function buildMonthlyPreviewFilters(year, month, company) {
  const filters = {
    target_year: year,
    target_month: month,
    company_code: "",
    company_name: ""
  };

  if (company === "MAIN") filters.company_code = "MAIN";
  if (company === "PARTNER") filters.company_code = "PARTNER";
  if (company === "TOMOHISA") {
    filters.company_code = "PARTNER";
    filters.company_name = "（有）友尚建設";
  }

  return filters;
}

function buildYearlyPreviewFilters(fiscalYear, company) {
  const filters = {
    fiscal_year: fiscalYear,
    company_code: "",
    company_name: ""
  };

  if (company === "MAIN") filters.company_code = "MAIN";
  if (company === "PARTNER") filters.company_code = "PARTNER";
  if (company === "TOMOHISA") {
    filters.company_code = "PARTNER";
    filters.company_name = "（有）友尚建設";
  }

  return filters;
}

function getCompanyLabel(companyCode, companyName) {
  if (companyName) return companyName;
  if (companyCode === "MAIN") return "MAIN（自社）";
  if (companyCode === "PARTNER") return "PARTNER（協力会社）";
  return "すべて";
}

function previewMonthlyReport() {
  const year = document.getElementById("monthlyYear").value;
  const month = document.getElementById("monthlyMonth").value;
  const company = document.getElementById("monthlyCompany").value;

  if (!year || !month) {
    showExportMessage("月間一覧の対象年・対象月を入力してください。", "error");
    return;
  }

  showExportMessage("月間一覧を作成しています...", "success");

  google.script.run
    .withSuccessHandler(data => {
      monthlyPreviewData = data;
      renderMonthlyPreview(data);
      showExportMessage("月間一覧を表示しました。", "success");
    })
    .withFailureHandler(err => {
      console.error(err);
      showExportMessage("月間一覧の取得でエラーが発生しました。\n" + (err.message || err), "error");
    })
    .getMonthlyPaidLeaveReportPreview(
      buildMonthlyPreviewFilters(year, month, company)
    );
}

function renderMonthlyPreview(data) {
  const area = document.getElementById("monthlyPreviewArea");
  const summary = document.getElementById("monthlyPreviewSummary");
  const table = document.getElementById("monthlyPreviewTable");

  if (!area || !summary || !table) return;

  area.style.display = "block";

  summary.textContent =
    `対象期間：${data.period_start} 〜 ${data.period_end} ／ ${getCompanyLabel(data.company_code, data.company_name)} ／ 明細 ${data.detail_count}件`;

  if (!data.detail_rows || data.detail_rows.length === 0) {
    table.innerHTML = `<div class="history-empty">該当データはありません。</div>`;
    return;
  }

  const detailHtml = data.detail_rows.map(row => `
    <tr>
      <td>${escapeHtml(row.employee_name)}</td>
      <td>${escapeHtml(row.date)}</td>
      <td style="text-align:right;">${escapeHtml(row.days)}</td>
    </tr>
  `).join("");

  table.innerHTML = `
    <div style="overflow-x:auto;">
      <table class="preview-table">
        <thead>
          <tr>
            <th>表示用氏名</th>
            <th>取得日</th>
            <th>取得日数</th>
          </tr>
        </thead>
        <tbody>${detailHtml}</tbody>
      </table>
    </div>
  `;
}

function downloadMonthlyReportCsv() {
  if (!monthlyPreviewData || !monthlyPreviewData.detail_rows) {
    alert("先に「月間一覧を確認」を押してください。");
    return;
  }

  const rows = [
    ["表示用氏名", "取得日", "取得日数"]
  ];

  monthlyPreviewData.detail_rows.forEach(row => {
    rows.push([
      row.employee_name || "",
      row.date || "",
      row.days || 0
    ]);
  });

  const companyPart = getCompanyLabel(
    monthlyPreviewData.company_code,
    monthlyPreviewData.company_name
  ).replace(/[\\/:*?"<>|]/g, "");

  downloadCsvFile(
    rows,
    `月間有給一覧_${monthlyPreviewData.target_year}_${monthlyPreviewData.target_month}_${companyPart}.csv`,
    { quoteAll: false }
  );

  showExportMessage("月間CSVを保存しました。", "success");
}

function previewYearlyReport() {
  const fiscalYear = document.getElementById("yearlyFiscalYear").value;
  const company = document.getElementById("yearlyCompany").value;

  if (!fiscalYear) {
    showExportMessage("年間一覧の対象年度を入力してください。", "error");
    return;
  }

  showExportMessage("年間一覧を作成しています...", "success");

  google.script.run
    .withSuccessHandler(data => {
      yearlyPreviewData = data;
      renderYearlyPreview(data);
      showExportMessage("年間一覧を表示しました。", "success");
    })
    .withFailureHandler(err => {
      console.error(err);

function downloadYearlyReportCsv() {
  if (!yearlyPreviewData || !yearlyPreviewData.rows) {
    alert("先に「年間一覧を確認」を押してください。");
    return;
  }

  const rows = [
    ["年間有給一覧"],
    ["対象期間", `${yearlyPreviewData.period_start}〜${yearlyPreviewData.period_end}`],
    ["会社", getCompanyLabel(yearlyPreviewData.company_code, yearlyPreviewData.company_name)],
    [],
    ["表示ID", "社員ID", "氏名", "会社コード", "会社名", "前年度残日数", "今年度付与日数", "今年度取得済み日数", "来年度繰越日数", "消滅日数"]
  ];

  yearlyPreviewData.rows.forEach(row => {
    rows.push([
      row.display_employee_id || "",
      row.employee_id || "",
      row.employee_name || "",
      row.company_code || "",
      row.company_name || "",
      row.carry_over_days || 0,
      row.grant_days || 0,
      row.used_days || 0,
      row.next_carry_over_days || 0,
      row.expired_days || 0
    ]);
  });

  const companyPart = getCompanyLabel(
    yearlyPreviewData.company_code,
    yearlyPreviewData.company_name
  ).replace(/[\\/:*?"<>|]/g, "");

  downloadCsvFile(
    rows,
    `年間有給一覧_${yearlyPreviewData.fiscal_year}_${companyPart}.csv`
  );

  showExportMessage("年間CSVを保存しました。", "success");
}

function downloadCsvFile(rows, filename, options) {
  options = options || {};
  const quoteAll = options.quoteAll !== false;

  function formatCsvValue(value) {
    const text = String(value == null ? "" : value);
    const escaped = text.replace(/"/g, '""');
    if (quoteAll || /[",\n\r]/.test(text)) {
      return `"${escaped}"`;
    }
    return escaped;
  }

  const csv = rows.map(row =>
    row.map(formatCsvValue).join(",")
  ).join("\n");

  const bom = "\uFEFF";
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();

  URL.revokeObjectURL(link.href);
}

function renderGrantBulkActionBar(type, count) {

    <div class="grant-bulk-action-bar">

      </div>
    </div>
  `;

function getPagedRows(response) {
  if (Array.isArray(response)) return response;
  return Array.isArray(response && response.rows) ? response.rows : [];
}

function getPagedTotalCount(response, rows) {
  if (response && response.total_count != null) {
    return Number(response.total_count || 0);
  }
  return Array.isArray(rows) ? rows.length : 0;
}

function renderPager(type, response) {
  if (!response || response.total_count == null) return "";

  const total = Number(response.total_count || 0);
  const offset = Math.max(0, Number(response.offset || 0));
  const limit = Math.max(1, Number(response.limit || PAGE_SIZE));
  const rowCount = Number(
    response.scanned_count != null
      ? response.scanned_count
      : response.row_count != null ? response.row_count : getPagedRows(response).length
  );
  const start = total === 0 ? 0 : offset + 1;
  const end = total === 0 ? 0 : Math.min(offset + Math.max(rowCount, 0), total);
  const hasPrev = response.has_prev === true || offset > 0;
  const hasNext = response.has_next === true || offset + limit < total;

  return `
    <div class="pager-bar">
      <div class="pager-range">${escapeHtml(start)}〜${escapeHtml(end)}件 / 全${escapeHtml(total)}件</div>
      <div class="pager-actions">
        <button class="btn btn-reset" type="button" onclick="changePagedView('${type}', -1)" ${hasPrev ? "" : "disabled"}>前の20件</button>
        <button class="btn btn-reset" type="button" onclick="changePagedView('${type}', 1)" ${hasNext ? "" : "disabled"}>次の20件</button>
      </div>
    </div>
  `;
}

function changePagedView(type, direction) {
  const nextOffset = Math.max(0, Number(pageOffsets[type] || 0) + direction * PAGE_SIZE);
  pageOffsets[type] = nextOffset;

  if (type === "sixMonth") {
    loadSixMonthGrantCandidates(true);
  } else if (type === "yearly") {
    loadYearlyGrantCandidates(true);
  }
}

function getGrantBulkSelectedCountId(type) {
  return type === "sixMonth"
    ? "sixMonthGrantSelectedCount"
    : "yearlyGrantSelectedCount";
}

function getGrantCandidateCheckboxes(type) {
  const selector = type === "sixMonth"
    ? ".six-month-grant-checkbox"
    : ".yearly-grant-checkbox";
  return Array.from(document.querySelectorAll(selector));
}

function toggleGrantCandidateSelection(type, checked) {
  getGrantCandidateCheckboxes(type).forEach(checkbox => {
    checkbox.checked = checked;
  });
  updateGrantBulkSelectionCount(type);
}

function updateGrantBulkSelectionCount(type) {
  const countEl = document.getElementById(getGrantBulkSelectedCountId(type));
  if (!countEl) return;

  const selectedCount = getGrantCandidateCheckboxes(type)
    .filter(checkbox => checkbox.checked)
    .length;

  countEl.textContent = String(selectedCount);
}

function getSelectedGrantCandidateIds(type) {
  return getGrantCandidateCheckboxes(type)
    .filter(checkbox => checkbox.checked)
    .map(checkbox => checkbox.value)
    .filter(Boolean);
}

function getSelectedGrantCandidateItems(type) {
  const items = [];
  const checkboxes = getGrantCandidateCheckboxes(type).filter(checkbox => checkbox.checked);

  for (const checkbox of checkboxes) {
    const grantOptions = getGrantDaysOptionsFromElement(checkbox);
    if (!grantOptions) return null;

    items.push({
      employee_id: checkbox.dataset.employeeId || checkbox.value,
      name: checkbox.dataset.name || "",
      grant_days: grantOptions.grant_days_override,
      original_grant_days: grantOptions.original_grant_days,
      manual_note: grantOptions.manual_note
    });
  }

  return items;
}

function getGrantDaysOptionsFromElement(element) {
  const card = element.closest(".six-month-row, .yearly-grant-item");
  const input = card ? card.querySelector(".grant-days-input") : null;

  if (!input) {
    return {};
  }

  const systemGrantDays = Number(input.dataset.systemGrantDays || 0);
  const rawValue = String(input.value || "").trim();
  const grantDays = rawValue === "" ? systemGrantDays : Number(rawValue);

  if (rawValue !== "" && !isFinite(grantDays)) {
    alert("付与日数は数値で入力してください");
    input.focus();
    return null;
  }

  if (grantDays <= 0) {
    alert("付与日数は0日より大きい値を入力してください");
    input.focus();
    return null;
  }

  if (grantDays > 20) {
    alert("付与日数は20日以下で入力してください");
    input.focus();
    return null;
  }

  if (Math.abs(grantDays * 2 - Math.round(grantDays * 2)) > 0.000001) {
    alert("付与日数は0.5日単位で入力してください");
    input.focus();
    return null;
  }

  return {
    grant_days_override: grantDays,
    original_grant_days: systemGrantDays,
    manual_note: "手入力調整"
  };
}

function updateGrantDaysAdjustment(input) {
  const card = input.closest(".six-month-row, .yearly-grant-item");
  if (!card) return;

  const systemGrantDays = Number(input.dataset.systemGrantDays || 0);
  const rawValue = String(input.value || "").trim();
  const grantDays = rawValue === "" ? systemGrantDays : Number(rawValue);
  const hasAdjustment = isFinite(grantDays) &&
    Math.abs(systemGrantDays - grantDays) > 0.000001;

  card.classList.toggle("has-grant-adjustment", hasAdjustment);
}

function hasGrantDaysAdjustment(item) {
  const systemDays = Number(item && item.original_grant_days || 0);
  const grantDays = Number(item && item.grant_days || item && item.grant_days_override || 0);
  return Math.abs(systemDays - grantDays) > 0.000001;
}

function formatGrantDaysForConfirm(value) {
  const num = Number(value || 0);
  return Number.isInteger(num) ? String(num) : String(num);
}

function buildIndividualGrantConfirmMessage(item) {
  const systemDays = Number(item.original_grant_days || 0);
  const grantDays = Number(item.grant_days || 0);
  const hasAdjustment = hasGrantDaysAdjustment({
    original_grant_days: systemDays,
    grant_days: grantDays
  });
  const lines = [
    item.name || "",
    `社員ID: ${item.employee_id || ""}`,
    "",
    `システム計算: ${formatGrantDaysForConfirm(systemDays)}日`,
    `実際に付与: ${formatGrantDaysForConfirm(grantDays)}日`,
    ""
  ];

  if (hasAdjustment) {
    lines.push("手入力調整があります。");
  }

  lines.push("この内容で付与しますか？");
  return lines.join("\n");
}

function buildBulkGrantConfirmMessage(items) {
  const rows = Array.isArray(items) ? items : [];
  const detailRows = rows.slice(0, 10).map((item, index) => {
    const adjustment = hasGrantDaysAdjustment(item) ? "（調整あり）" : "";

    return [
      `${index + 1}. ${item.name || ""} / ${item.employee_id || ""}`,
      `   システム計算: ${formatGrantDaysForConfirm(item.original_grant_days)}日 → 付与: ${formatGrantDaysForConfirm(item.grant_days)}日${adjustment}`
    ].join("\n");
  });

  if (rows.length > 10) {
    detailRows.push(`ほか${rows.length - 10}名`);
  }

  return [
    `${rows.length}名に有給を付与します。`,
    "",
    detailRows.join("\n\n"),
    "",
    "この内容で付与しますか？"
  ].join("\n");
}

function grantSelectedCandidatesAction(type) {
  const items = getSelectedGrantCandidateItems(type);
  if (!items) return;

  if (items.length === 0) {
    alert("付与する社員を選択してください");
    return;
  }

  const ok = confirm(buildBulkGrantConfirmMessage(items));

  if (!ok) return;

  const targetId = type === "sixMonth" ? "sixMonthGrantArea" : "yearlyGrantList";
  const target = document.getElementById(targetId);

  if (target) {
    target.innerHTML = `<div class="message">選択した社員へ一括付与を実行しています...</div>`;
  }

  const runner = google.script.run
    .withSuccessHandler(res => {
      alert(buildGrantBatchResultMessage(res));
      loadDashboardSummary();
      if (type === "sixMonth") {
        loadSixMonthGrantCandidates();
      } else {
        loadYearlyGrantCandidates();
      }
    })
    .withFailureHandler(err => {
      console.error("一括付与エラー:", err);
      const message = err && err.message
        ? err.message
        : "一括付与でエラーが発生しました。";
      if (target) {
        target.innerHTML = `<div class="message error">${escapeHtml(message)}</div>`;
      }
    });

  if (type === "sixMonth") {
    runner.grantSelectedSixMonthPaidLeave(items, currentAdminUser);
  } else {
    runner.grantSelectedYearlyPaidLeave(items, currentAdminUser);
  }
}

function buildGrantBatchResultMessage(res) {
  const data = res || {};
  const errors = Array.isArray(data.results)
    ? data.results.filter(item => item.status === "error")
    : [];
  const skipped = Array.isArray(data.results)
    ? data.results.filter(item => item.status === "skipped")
    : [];
  let message =
    `一括付与が完了しました。\n` +
    `成功: ${data.success_count || 0}名\n` +
    `スキップ: ${data.skipped_count || 0}名\n` +
    `失敗: ${data.error_count || 0}名`;

  if (skipped.length > 0) {
    message += "\n\nスキップ:\n" + skipped
      .slice(0, 5)
      .map(item => `${item.employee_id}: ${item.message}`)
      .join("\n");
  }

  if (errors.length > 0) {
    message += "\n\nエラー:\n" + errors
      .slice(0, 5)
      .map(item => `${item.employee_id}: ${item.message}`)
      .join("\n");
  }

  return message;
}

        <div class="message error">
          年次付与対象者の取得でエラーが発生しました。
        </div>
      `;
    })
    .getYearlyGrantCandidates({
      offset: pageOffsets.yearly,
      limit: PAGE_SIZE
    });
}

/* =========================
   年次付与候補描画
========================= */
function renderYearlyGrantCandidates(response) {
  const container = document.getElementById("yearlyGrantList");
  if (!container) return;

  const data = getPagedRows(response);
  const totalCount = getPagedTotalCount(response, data);

  if (totalCount > 0 && data.length === 0 && pageOffsets.yearly > 0) {
    pageOffsets.yearly = Math.max(0, pageOffsets.yearly - PAGE_SIZE);
    loadYearlyGrantCandidates(true);
    return;
  }

  if (!Array.isArray(data) || data.length === 0) {
    container.innerHTML = `
      <div class="message">
        現在、年次付与対象者はいません。
      </div>
    `;
    return;
  }

  container.innerHTML = `
    ${renderGrantBulkActionBar("yearly", totalCount)}
    ${renderPager("yearly", response)}
    ${data.map(item => `
    <div class="yearly-grant-item">
      <div class="yearly-grant-main">
        <div class="grant-card-topline">
          <div class="yearly-grant-name">
            <label class="grant-candidate-check">
              <input
                type="checkbox"
                class="grant-candidate-checkbox yearly-grant-checkbox"
                value="${escapeHtml(item.employee_id)}"
                data-employee-id="${escapeHtml(item.employee_id)}"
                data-name="${escapeHtml(item.name)}"
                onchange="updateGrantBulkSelectionCount('yearly')"
              >
              <span>選択</span>
            </label>
            ${escapeHtml(item.name)}
            <span class="six-month-id">
              ${escapeHtml(item.display_employee_id || item.employee_id)}
            </span>
            <span class="grant-adjustment-badge">調整あり</span>
          </div>

          <div class="yearly-grant-actions">
            <button
              class="btn btn-approve"
              type="button"
              data-employee-id="${escapeHtml(item.employee_id)}"
              data-name="${escapeHtml(item.name)}"
              data-grant-days="${escapeHtml(item.grant_days)}"
              onclick="grantYearlyPaidLeaveActionFromButton(this)"
            >
              付与
            </button>
          </div>
        </div>

        <div class="grant-card-meta">
          <span>${escapeHtml(item.company_name || item.company_code || "-")}</span>
          <span>${escapeHtml(item.department || "-")}</span>
        </div>

        <div class="grant-card-summary-grid">
          <div class="grant-detail-item">
            <span>基準日</span>
            <strong>${escapeHtml(item.basis_date || "")}</strong>
          </div>
          <div class="grant-detail-item highlight">
            <span>付与日数</span>
            ${renderGrantDaysInput(item.grant_days)}
          </div>
        </div>

        <details class="grant-card-details">
          <summary>詳細を見る</summary>
          <div class="grant-detail-grid compact">
            <div class="grant-detail-item">
              <span>入社日</span>
              <strong>${escapeHtml(item.hire_date || "")}</strong>
            </div>
            <div class="grant-detail-item">
              <span>勤続</span>
              <strong>${escapeHtml(item.months_worked)}か月</strong>
            </div>
            <div class="grant-detail-item">
              <span>年度開始</span>
              <strong>${escapeHtml(item.fiscal_start_month || 4)}月</strong>
            </div>
            <div class="grant-detail-item">
              <span>システム計算</span>
              <strong>${escapeHtml(item.grant_days)}日</strong>
            </div>
          </div>
        </details>
      </div>
    </div>
  `).join("")}
    ${renderPager("yearly", response)}
  `;
}

function grantYearlyPaidLeaveActionFromButton(button) {
  const grantOptions = getGrantDaysOptionsFromElement(button);
  if (!grantOptions) return;

  grantYearlyPaidLeaveAction(
    button.dataset.employeeId,
    button.dataset.name,
    grantOptions.grant_days_override,
    grantOptions
  );
}

/* =========================
   年次付与実行
========================= */
function grantYearlyPaidLeaveAction(employeeId, name, grantDays, grantOptions) {
  if (!employeeId) return;

  const ok = confirm(buildIndividualGrantConfirmMessage({
    employee_id: employeeId,
    name: name,
    grant_days: grantDays,
    original_grant_days: grantOptions && grantOptions.original_grant_days
  }));

  if (!ok) return;

  const container = document.getElementById("yearlyGrantList");

  if (container) {
    container.innerHTML = `
      <div class="message">
        年次有給付与を実行しています...
      </div>
    `;
  }

  google.script.run
    .withSuccessHandler(() => {
      alert(`${name} さんへ ${grantDays}日付与しました`);
      loadDashboardSummary();
      loadYearlyGrantCandidates();
    })
    .withFailureHandler(err => {
      console.error("年次付与エラー:", err);

      const message =
        err && err.message
          ? err.message
          : "年次付与でエラーが発生しました。";

      if (container) {
        container.innerHTML = `
          <div class="message error">
            ${escapeHtml(message)}
          </div>
        `;
      }
    })
    .grantYearlyPaidLeave(employeeId, currentAdminUser, grantOptions || {});
}

function closeYearlyGrantList() {
  const container = document.getElementById("yearlyGrantList");
  if (!container) return;

  pageOffsets.yearly = 0;
  container.innerHTML = `
    <div class="empty-message">
      「付与対象者を確認する」を押してください
    </div>
  `;
}

function closeSixMonthGrantList() {
  const area = document.getElementById("sixMonthGrantArea");
  if (!area) return;

  pageOffsets.sixMonth = 0;
  area.innerHTML = `
    <div class="empty-message">
      「付与対象者を確認する」を押してください
    </div>
  `;
}

function toggleRequestSelection(requestId, checked) {
  if (!requestId) return;

  if (checked) {
    selectedRequestIds.add(requestId);
  } else {
    selectedRequestIds.delete(requestId);
  }

  updateSelectedCount();
}

function updateSelectedCount() {
  const label = document.getElementById("selectedCountLabel");

  if (label) {
    label.textContent = `${selectedRequestIds.size}件選択`;
  }
}

function toggleSelectAllRequests(checked) {
  document.querySelectorAll(".request-checkbox")
    .forEach(el => {
      el.checked = checked;

      const requestId = el.dataset.requestId;

      if (!requestId) return;

      if (checked) {
        selectedRequestIds.add(requestId);
      } else {
        selectedRequestIds.delete(requestId);
      }
    });

  updateSelectedCount();
}

function clearSelectedRequests() {
  selectedRequestIds.clear();

  document.querySelectorAll(".request-checkbox")
    .forEach(el => {
      el.checked = false;
    });

  const selectAll = document.getElementById("bulkSelectAll");

  if (selectAll) {
    selectAll.checked = false;
  }

  updateSelectedCount();
}

function approveSelectedRequests() {
  const ids = Array.from(selectedRequestIds);

  if (ids.length === 0) {
    alert("承認する申請を選択してください");
    return;
  }

  const ok = confirm(
    `${ids.length}件の申請をまとめて承認しますか？`
  );

  if (!ok) return;

  showLoading(
    "requestView",
    "一括承認を実行しています..."
  );

  google.script.run
    .withSuccessHandler(() => {

      alert(`${ids.length}件承認しました`);

      clearSelectedRequests();

      loadDashboardSummary();

      reloadCurrentView();
    })
    .withFailureHandler(err => {
      console.error("一括承認エラー:", err);

      showError(
        "requestView",
        "一括承認でエラーが発生しました"
      );
    })
    .approveRequestsBatch(
      ids,
      currentAdminUser
    );
}


</script>
