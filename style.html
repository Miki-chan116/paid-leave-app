<style>
/* =========================
   基本設定
========================= */
:root {
  --bg-main: #f3f9fb;
  --bg-sub: #dceff5;
  --card-bg: #ffffff;

  --primary: #4f9fba;
  --primary-dark: #2f6f86;
  --accent-blue: #3f8fc5;
  --accent-red: #d94f78;
  --accent-orange: #e59a45;

  --text-main: #263238;
  --text-sub: #60727a;
  --border: #d2e4ea;

  --shadow: 0 4px 14px rgba(47, 111, 134, 0.10);
  --radius: 18px;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  overflow-y: auto;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
}

.app-shell {
  width: 100%;
  max-width: 1280px;
  min-height: 100vh;
  margin: 0 auto;
  padding: 16px 18px 120px;
}

/* =========================
   ヘッダー
========================= */
.app-header {
  text-align: center;
  background: linear-gradient(135deg, #eef6ef, var(--bg-sub));
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 20px 16px;
  margin-bottom: 18px;
}

.app-title {
  margin: 0 0 8px;
  font-size: 36px;
  color: var(--primary-dark);
}

.app-subtitle {
  margin: 0;
  font-size: 18px;
  color: var(--text-sub);
}

/* =========================
   共通画面
========================= */
.screen {
  display: none;
}

.screen.active {
  display: block;
}

.screen-card {
  width: 100%;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--shadow);
  padding: 18px;
}

/* =========================
   社員選択
========================= */
.sticky-tabs-wrap {
  position: sticky;
  top: 0;
  z-index: 20;
  padding-bottom: 10px;
  background: linear-gradient(to bottom, var(--bg-main) 80%, rgba(243,249,251,0));
}

.kana-tabs {
  display: grid;
  grid-template-columns: repeat(11, minmax(0, 1fr));
  gap: 8px;
  background: rgba(243,249,251,0.96);
  padding: 8px 0 2px;
}

.kana-tabs button {
  min-height: 52px;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: #ffffff;
  color: var(--primary-dark);
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: var(--shadow);
}

.kana-tabs button.active {
  background: var(--primary-dark);
  color: #ffffff;
  border-color: var(--primary-dark);
}

.kana-tabs button.no-member {
  opacity: 0.55;
}

.group-header {
  margin-bottom: 16px;
}

.section-title {
  font-size: 28px;
  font-weight: bold;
  color: var(--primary-dark);
}

.section-subtitle {
  font-size: 16px;
  color: var(--text-sub);
  margin-top: 4px;
}

.employee-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-auto-rows: 108px;
  gap: 14px;
}

.employee-btn {
  height: 108px;
  border: 2px solid var(--border);
  border-radius: 18px;
  background: #ffffff;
  cursor: pointer;
  padding: 10px 14px;
  box-shadow: var(--shadow);

  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;

  overflow: hidden;
  text-align: left;
}

.employee-btn:hover {
  background: #f7fbf7;
  border-color: var(--primary);
}

.employee-left {
  flex: 1;
  min-width: 0;
}

.employee-name {
  font-size: 30px;
  font-weight: bold;
  color: var(--text-main);
  line-height: 1.1;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.employee-kana,
.employee-fiscal-year {
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-sub);

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.employee-right {
  width: 92px;
  min-width: 92px;

  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: center;

  gap: 4px;
}

.employee-days {
  font-size: 22px;
  font-weight: 900;
  color: var(--primary-dark);
}

.employee-days-sub {
  font-size: 12px;
  color: var(--text-sub);
}

.employee-five {
  display: flex;
  align-items: center;
  gap: 5px;
}

.five-mini-bar {
  width: 54px;
  height: 8px;
  border-radius: 999px;
  background: #eadfcb;
  overflow: hidden;
}

.five-mini-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-orange), #efb14f);
}

.five-mini-text {
  font-size: 11px;
  font-weight: bold;
  color: var(--accent-orange);
}

/* =========================
   上部カード
========================= */
.request-topbar {
  display: flex;
  gap: 16px;
  align-items: stretch;
  margin-bottom: 18px;
}

.selected-employee-top-cards {
  flex: 1;

  display: grid;
  grid-template-columns: minmax(0, 1fr) 150px;
  gap: 12px;
}

.selected-employee-name-card,
.selected-employee-balance-card {
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px;
  box-shadow: var(--shadow);
}

.selected-employee-name {
  font-size: 26px;
  font-weight: bold;
  color: var(--primary-dark);
  line-height: 1.2;
}

.selected-fiscal-year {
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-sub);
}

.selected-employee-balance-card {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
}

.mini-info-line,
.mini-five-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}

.mini-info-label {
  font-size: 12px;
  color: var(--text-sub);
}

.mini-info-value {
  font-size: 18px;
  font-weight: bold;
  color: var(--accent-blue);
}

.mini-five-bar {
  width: 72px;
  height: 8px;
  border-radius: 999px;
  background: #eadfcb;
  overflow: hidden;
}

.mini-five-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-orange), #efb14f);
}

.mini-five-count,
.mini-five-message {
  font-size: 12px;
  font-weight: bold;
  color: var(--accent-orange);
}

.back-btn {
  border: none;
  border-radius: 14px;
  background: var(--accent-blue);
  color: #ffffff;

  min-height: 60px;
  min-width: 140px;

  font-size: 22px;
  font-weight: bold;

  cursor: pointer;
  box-shadow: var(--shadow);
}

/* =========================
   レイアウト
========================= */
.tablet-request-layout {
  display: grid;
  grid-template-columns: minmax(320px, 0.8fr) minmax(0, 1.35fr);
  gap: 18px;
  align-items: start;
}

.request-section {
  margin-top: 20px;
  padding: 16px;
  border: 1px solid #e6e0d6;
  border-radius: 16px;
  background: #fcfbf8;
}

.request-section:first-child,
.calendar-main-section {
  margin-top: 0;
}

.request-section-title {
  font-size: 24px;
  font-weight: bold;
  color: var(--primary-dark);
  margin-bottom: 14px;
}

/* =========================
   区分ボタン
========================= */
.tablet-type-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.type-btn {
  min-height: 76px;

  border: 2px solid var(--border);
  border-radius: 18px;

  background: #ffffff;
  color: var(--text-main);

  font-size: 24px;
  font-weight: bold;

  cursor: pointer;
  box-shadow: var(--shadow);
}

.type-btn.active {
  background: var(--primary-dark);
  color: #ffffff;
  border-color: var(--primary-dark);
}

/* =========================
   フォーム
========================= */
.field {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.field label {
  font-size: 18px;
  font-weight: bold;
  color: var(--text-sub);
}

.field input,
.field select,
.field textarea {
  width: 100%;

  border: 2px solid var(--border);
  border-radius: 14px;

  padding: 14px 16px;

  font-size: 20px;
  background: #ffffff;
}

.multi-day-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.hidden-date-field {
  display: none;
}

/* =========================
   カレンダー
========================= */
.calendar-ui-card {
  padding: 16px;
  border-radius: 20px;
  background: #f8fcfe;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.calendar-ui-header {
  display: flex;
  align-items: center;
  justify-content: space-between;

  margin-bottom: 12px;
}

.calendar-nav-btn {
  width: 54px;
  height: 54px;

  border: none;
  border-radius: 999px;

  background: var(--accent-blue);
  color: #ffffff;

  font-size: 34px;
  font-weight: bold;

  cursor: pointer;
}

.calendar-month-label {
  font-size: 26px;
  font-weight: 900;
  color: var(--primary-dark);
  text-align: center;
}

.calendar-help-text {
  margin-top: 4px;
  font-size: 13px;
  color: var(--text-sub);
  text-align: center;
}

.calendar-week-row,
.request-calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
}

.calendar-week-row {
  margin-bottom: 8px;
}

.calendar-week-row div {
  text-align: center;
  font-size: 13px;
  font-weight: bold;
  color: var(--text-sub);
}

.calendar-day {
  min-height: 86px;

  border: 2px solid var(--border);
  border-radius: 14px;

  background: #ffffff;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  gap: 4px;

  cursor: pointer;
}

.calendar-day.empty {
  background: transparent;
  border: none;
  pointer-events: none;
}

.calendar-day-number {
  font-size: 26px;
  font-weight: 900;
}

.calendar-day-label {
  font-size: 12px;
}

.calendar-day.holiday {
  background: #f1f5f9;
}

.calendar-day.no_leave {
  background: #fff1f2;
  border-color: var(--accent-red);
}

.calendar-day.selected,
.calendar-day.range-start,
.calendar-day.range-end {
  background: var(--primary-dark);
  border-color: var(--primary-dark);
}

.calendar-day.selected *,
.calendar-day.range-start *,
.calendar-day.range-end * {
  color: #ffffff;
}

.calendar-day.in-range {
  background: #e6f6fb;
}

/* =========================
   ステータス
========================= */
.calendar-selected-status {
  margin-top: 12px;

  padding: 12px 14px;

  border-radius: 14px;

  background: #f1f7ff;
  border: 1px solid #d6e8ff;

  color: #1f4f7a;

  text-align: center;
  white-space: pre-line;
}

.calendar-selected-status.ok {
  background: #eefaf3;
  color: #216b3a;
}

.calendar-selected-status.error {
  background: #fff1f1;
  color: #9f2a2a;
}

.calendar-selected-status.success {
  background: #eefaf3;
  color: #216b3a;
}

/* =========================
   送信
========================= */
.submit-area {
  margin-top: 24px;
}

.submit-btn {
  width: 100%;
  min-height: 76px;

  border: none;
  border-radius: 16px;

  font-size: 30px;
  font-weight: bold;

  background: var(--primary);
  color: #ffffff;

  cursor: pointer;
  box-shadow: var(--shadow);
}

.submit-btn.submitted {
  background: #2f9e7e;
}

/* =========================
   履歴
========================= */
.history-toggle-area {
  margin-top: 12px;
  text-align: center;
}

.history-toggle-btn {
  border-radius: 999px;
  padding: 12px 24px;

  background: #ffffff;
  color: var(--primary-dark);

  border: 2px solid var(--border);

  font-size: 16px;
  font-weight: bold;

  cursor: pointer;
}

.history-section {
  margin-top: 18px;

  padding: 14px;

  border-radius: 16px;

  background: #f8fcfe;
  border: 1px solid var(--border);
}

.history-section.history-collapsed {
  display: none;
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.history-row {
  display: grid;
  grid-template-columns: 1.4fr 0.8fr 0.6fr 0.8fr;
  gap: 8px;

  padding: 10px 12px;

  border-radius: 12px;

  background: #ffffff;
  border: 1px solid #e3f1f6;
}

.history-status {
  text-align: center;

  border-radius: 999px;
  padding: 5px 8px;

  color: #ffffff;
  font-size: 12px;
  font-weight: bold;
}

.history-status.approved {
  background: var(--primary);
}

.history-status.pending {
  background: var(--accent-blue);
}

.history-status.rejected {
  background: var(--accent-red);
}

/* =========================
   個人QRページ
========================= */
body.personal-page-mode #employeeScreen {
  display: none !important;
}

body.personal-page-mode #requestScreen {
  display: block !important;
}

/* =========================
   タブレット
========================= */
@media (max-width: 1000px) {

  .tablet-request-layout {
    grid-template-columns: 1fr;
  }

  .tablet-type-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .multi-day-grid {
    grid-template-columns: 1fr;
  }
}

/* =========================
   スマホ
========================= */
@media (max-width: 700px) {

  .app-shell {
    max-width: 430px;
    padding: 8px 10px 80px;
  }

  .screen-card {
    padding: 10px 10px 80px;
  }

  .app-title {
    font-size: 26px;
  }

  .app-subtitle {
    font-size: 13px;
  }

  .kana-tabs {
    grid-template-columns: repeat(4, 1fr);
  }

  .employee-grid {
    grid-template-columns: 1fr;
  }

  .employee-name {
    font-size: 24px;
  }

  .request-topbar {
    flex-direction: column;
    gap: 10px;
  }

  .selected-employee-top-cards {
    width: 100%;
    grid-template-columns: minmax(0, 1fr) 132px;
    gap: 8px;
  }

  .selected-employee-name {
    font-size: 22px;
  }

  .mini-five-bar {
    width: 64px;
  }

  .tablet-request-layout {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .tablet-calendar-column {
    order: 1;
  }

  .tablet-side-column {
    order: 2;
  }

  .tablet-type-grid {
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .type-btn {
    min-height: 58px;
    font-size: 18px;
  }

  .calendar-ui-card {
    padding: 8px;
  }

  .calendar-week-row,
  .request-calendar-grid {
    gap: 3px;
  }

  .calendar-day {
    min-height: 44px;
    border-radius: 9px;
  }

  .calendar-day-number {
    font-size: 16px;
  }

  .calendar-day-label,
  .calendar-legend {
    display: none;
  }

  .field input,
  .field select,
  .field textarea {
    font-size: 17px;
  }

  .submit-btn {
    min-height: 64px;
    font-size: 22px;
  }

  .history-row {
    grid-template-columns: 1fr 0.8fr;
    font-size: 12px;
  }
}

/* =========================
   メニュー画面
========================= */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  margin-top: 18px;
}

.menu-card {
  display: block;
  text-decoration: none;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 26px 20px;
  box-shadow: var(--shadow);
  color: var(--text-main);
}

.menu-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(47, 111, 134, 0.18);
}

.menu-icon {
  font-size: 42px;
  margin-bottom: 12px;
}

.menu-title {
  font-size: 24px;
  font-weight: 900;
  color: var(--primary-dark);
  margin-bottom: 8px;
}

.menu-desc {
  font-size: 15px;
  color: var(--text-sub);
  line-height: 1.6;
}

@media (max-width: 900px) {
  .menu-grid {
    grid-template-columns: 1fr;
  }
}

</style>
