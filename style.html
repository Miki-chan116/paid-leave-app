<style>
  :root {
    --bg-main: #f6f3ee;
    --bg-sub: #e7e0d4;
    --card-bg: #ffffff;
    --primary: #3f6f48;
    --primary-dark: #294831;
    --accent-blue: #1f5aa6;
    --accent-red: #bf3636;
    --accent-orange: #d27b14;
    --text-main: #1e1e1e;
    --text-sub: #575757;
    --border: #d8cfbf;
    --shadow: 0 6px 18px rgba(0, 0, 0, 0.10);
    --radius: 18px;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    margin: 0;
    font-family: sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
  }

  .app-shell {
    max-width: 1280px;
    margin: 0 auto;
    padding: 16px 18px 30px;
  }

  .app-header {
    text-align: center;
    background: linear-gradient(135deg, #eef6ef, var(--bg-sub));
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 20px 16px;
    margin-bottom: 18px;
  }

  .app-title {
    margin: 0 0 8px;
    font-size: 36px;
    color: var(--primary-dark);
  }

  .app-subtitle {
    margin: 0;
    font-size: 18px;
    color: var(--text-sub);
  }

  .screen {
    display: none;
  }

  .screen.active {
    display: block;
  }

  .sticky-tabs-wrap {
    position: sticky;
    top: 0;
    z-index: 20;
    padding-bottom: 10px;
    background: linear-gradient(to bottom, var(--bg-main) 80%, rgba(246,243,238,0));
  }

  .kana-tabs {
    display: grid;
    grid-template-columns: repeat(11, minmax(0, 1fr));
    gap: 8px;
    background: rgba(246,243,238,0.96);
    padding: 8px 0 2px;
  }

  .kana-tabs button {
    min-height: 52px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: #fff;
    color: var(--primary-dark);
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: var(--shadow);
    white-space: nowrap;
  }

  .kana-tabs button.active {
    background: var(--primary-dark);
    color: #fff;
    border-color: var(--primary-dark);
  }

  .kana-tabs button.no-member {
    opacity: 0.55;
  }

  .screen-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 18px;
  }

  .group-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 28px;
    font-weight: bold;
    color: var(--primary-dark);
  }

  .section-subtitle {
    font-size: 16px;
    color: var(--text-sub);
    margin-top: 4px;
  }

  .employee-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: 108px;
    gap: 14px;
  }

  .employee-btn {
    height: 108px;
    border: 2px solid var(--border);
    border-radius: 18px;
    background: #fff;
    cursor: pointer;
    padding: 10px 14px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    overflow: hidden;
    text-align: left;
  }

  .employee-btn:hover {
    background: #f7fbf7;
    border-color: var(--primary);
  }

  .employee-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
    flex: 1;
  }

  .employee-name {
    font-size: 30px;
    font-weight: bold;
    color: var(--text-main);
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .employee-kana {
    font-size: 14px;
    color: var(--text-sub);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .employee-right {
    width: 92px;
    min-width: 92px;
    max-width: 92px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: center;
    gap: 3px;
    flex-shrink: 0;
  }

  .employee-days {
    font-size: 15px;
    font-weight: bold;
    color: var(--accent-blue);
    text-align: right;
    line-height: 1.1;
  }

  .employee-days-sub {
    font-size: 12px;
    color: var(--text-sub);
    text-align: right;
    line-height: 1.1;
  }

  .employee-five {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 5px;
    margin-top: 2px;
  }

  .five-mini-bar {
    width: 42px;
    height: 5px;
    border-radius: 999px;
    background: #eadfcb;
    overflow: hidden;
  }

  .five-mini-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent-orange), #efb14f);
    border-radius: 999px;
  }

  .five-mini-text {
    font-size: 11px;
    font-weight: bold;
    color: var(--accent-orange);
    min-width: 24px;
    text-align: right;
    line-height: 1;
  }

  .request-topbar {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 18px;
  }

  .back-btn {
    border: none;
    border-radius: 14px;
    background: var(--accent-blue);
    color: #fff;
    min-height: 60px;
    min-width: 140px;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }

  .selected-employee-box {
    flex: 1;
    background: #f8f6f1;
    border: 1px solid #e7e0d4;
    border-radius: 16px;
    padding: 12px 14px;
  }

  .selected-employee-label {
    font-size: 13px;
    color: var(--text-sub);
    margin-bottom: 6px;
  }

  .selected-employee-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
  }

  .selected-employee-name {
    flex: 1;
    font-size: 30px;
    font-weight: bold;
    color: var(--primary-dark);
    line-height: 1.15;
    min-width: 0;
    word-break: break-word;
  }

  .selected-employee-mini-info {
    width: 120px;
    min-width: 120px;
    max-width: 120px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .mini-info-line {
    display: flex;
    align-items: baseline;
    justify-content: flex-end;
    gap: 6px;
    width: 100%;
  }

  .mini-info-label {
    font-size: 12px;
    color: var(--text-sub);
    white-space: nowrap;
  }

  .mini-info-value {
    font-size: 15px;
    font-weight: bold;
    color: var(--accent-blue);
    white-space: nowrap;
  }

  .mini-five-wrap {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
    width: 100%;
    margin-top: 2px;
  }

  .mini-five-bar {
    width: 48px;
    height: 6px;
    border-radius: 999px;
    background: #eadfcb;
    overflow: hidden;
  }

  .mini-five-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent-orange), #efb14f);
    border-radius: 999px;
    transition: width 0.2s ease;
  }

  .mini-five-count {
    font-size: 11px;
    font-weight: bold;
    color: var(--accent-orange);
    min-width: 26px;
    text-align: right;
  }

  .mini-five-message {
    font-size: 12px;
    font-weight: bold;
    color: var(--accent-orange);
    text-align: right;
    width: 100%;
    line-height: 1.2;
  }

  .request-section {
    margin-top: 20px;
    padding: 16px;
    border: 1px solid #e6e0d6;
    border-radius: 16px;
    background: #fcfbf8;
  }

  .request-section-title {
    font-size: 24px;
    font-weight: bold;
    color: var(--primary-dark);
    margin-bottom: 14px;
  }

  .single-date-field {
    max-width: 340px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field label {
    font-size: 18px;
    font-weight: bold;
    color: var(--text-sub);
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 22px;
    background: #fff;
  }

  .full-width {
    width: 100%;
  }

  .request-type-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }

  .type-btn {
    min-height: 88px;
    border: 2px solid var(--border);
    border-radius: 18px;
    background: #fff;
    color: var(--text-main);
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: var(--shadow);
  }

  .type-btn.active {
    background: var(--primary-dark);
    color: #fff;
    border-color: var(--primary-dark);
  }

  .multi-day-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 760px;
  }

  .status-box {
    margin-top: 18px;
    padding: 16px;
    border-radius: 14px;
    background: #faf9f6;
    border: 1px solid #eee8dc;
    color: var(--text-sub);
    font-size: 20px;
    white-space: pre-line;
    line-height: 1.5;
  }

  .status-box.ok {
    border-left: 8px solid var(--primary);
    color: var(--primary-dark);
    background: #f4f8f3;
  }

  .status-box.error {
    border-left: 8px solid var(--accent-red);
    color: var(--accent-red);
    background: #fff4f4;
  }

  .submit-area {
    margin-top: 18px;
    text-align: center;
  }

  .submit-btn {
    border: none;
    border-radius: 16px;
    padding: 18px 36px;
    font-size: 30px;
    font-weight: bold;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
    min-width: 300px;
    box-shadow: var(--shadow);
  }

  @media (max-width: 1200px) {
    .kana-tabs {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }
  }

  @media (max-width: 900px) {
    .employee-grid {
      grid-template-columns: 1fr;
      grid-auto-rows: 104px;
    }

    .kana-tabs {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .request-topbar {
      flex-direction: column;
    }

    .request-type-grid {
      grid-template-columns: 1fr 1fr;
    }

    .multi-day-grid {
      grid-template-columns: 1fr;
    }

    .employee-btn {
      height: 104px;
      padding: 10px 12px;
    }

    .employee-name {
      font-size: 26px;
    }

    .employee-right {
      width: 86px;
      min-width: 86px;
      max-width: 86px;
    }

    .employee-days {
      font-size: 14px;
    }

    .employee-days-sub {
      font-size: 11px;
    }

    .selected-employee-header {
      flex-direction: column;
      align-items: stretch;
    }

    .selected-employee-mini-info {
      width: 100%;
      min-width: 0;
      max-width: none;
      align-items: flex-start;
    }

    .mini-info-line,
    .mini-five-wrap,
    .mini-five-message {
      justify-content: flex-start;
      text-align: left;
      width: auto;
    }
  }
</style>
