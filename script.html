<script>
let employees = [];
let selectedEmployee = null;
let currentGroup = "a";
let currentRequestType = "";

/* =========================
   初期化
========================= */
function initPage() {
  google.script.run
    .withSuccessHandler(data => {
      employees = data || [];
      currentGroup = getFirstAvailableGroup();
      render();
      updateGroupTabs();
      initReasonOptions();
    })
    .withFailureHandler(err => {
      console.error(err);
      alert("社員一覧の取得でエラーが発生しました");
    })
    .getEmployeesForRequest();
}

window.addEventListener("DOMContentLoaded", initPage);

/* =========================
   理由プルダウン初期化
========================= */
function initReasonOptions() {
  const reasonType = document.getElementById("reasonType");
  if (!reasonType) return;

  reasonType.innerHTML = `
    <option value="">選択してください</option>
    <option value="private">私用</option>
    <option value="sick">体調不良</option>
    <option value="other">その他</option>
  `;
}

/* =========================
   五十音グループ判定
========================= */
function getKanaGroup(emp) {
  const kana = (emp.name_kana || "").trim();
  const k = kana.charAt(0);

  if (!k) return "global";
  if (/[A-Za-z]/.test(k)) return "global";

  if ("あいうえおぁぃぅぇぉ".includes(k)) return "a";
  if ("かきくけこがぎぐげご".includes(k)) return "k";
  if ("さしすせそざじずぜぞ".includes(k)) return "s";
  if ("たちつてとだぢづでど".includes(k)) return "t";
  if ("なにぬねの".includes(k)) return "n";
  if ("はひふへほばびぶべぼぱぴぷぺぽ".includes(k)) return "h";
  if ("まみむめも".includes(k)) return "m";
  if ("やゆよゃゅょ".includes(k)) return "y";
  if ("らりるれろ".includes(k)) return "r";
  if ("わをん".includes(k)) return "w";

  return "global";
}

function getGroupOrder() {
  return ["a", "k", "s", "t", "n", "h", "m", "y", "r", "w", "global"];
}

function getFirstAvailableGroup() {
  const order = getGroupOrder();
  const first = order.find(group => employees.some(emp => getKanaGroup(emp) === group));
  return first || "a";
}

function changeGroup(group) {
  currentGroup = group;
  render();
  updateGroupTabs();
}

function updateGroupTabs() {
  getGroupOrder().forEach(group => {
    const btn = document.querySelector(`[data-group="${group}"]`);
    if (!btn) return;

    btn.classList.toggle("active", group === currentGroup);

    const hasMember = employees.some(emp => getKanaGroup(emp) === group);
    btn.classList.toggle("no-member", !hasMember);
  });
}

/* =========================
   社員カード描画
========================= */
function render() {
  const grid = document.getElementById("employeeSwipeArea");
  const groupTitle = document.getElementById("groupTitle");
  if (!grid) return;

  grid.innerHTML = "";

  const filtered = employees.filter(emp => getKanaGroup(emp) === currentGroup);

  const groupNames = {
    a: "あ行",
    k: "か行",
    s: "さ行",
    t: "た行",
    n: "な行",
    h: "は行",
    m: "ま行",
    y: "や行",
    r: "ら行",
    w: "わ行",
    global: "外国人"
  };

  if (groupTitle) {
    groupTitle.textContent = groupNames[currentGroup] || "あ行";
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="status-box">この行に該当する社員はいません。</div>`;
    return;
  }

  filtered.forEach(emp => {
    const btn = document.createElement("button");
    btn.className = "employee-btn";
    btn.type = "button";

    const used = Number(emp.five_day_used || 0);
    const rate = Math.min((used / 5) * 100, 100);

    btn.innerHTML = `
      <div class="employee-left">
        <div class="employee-name">${escapeHtml(emp.name)}</div>
        <div class="employee-kana">${escapeHtml(emp.name_kana || "")}</div>
      </div>

      <div class="employee-right">
        <div class="employee-days">残 ${escapeHtml(emp.current_remaining_days)}日</div>
        <div class="employee-days-sub">付与 ${escapeHtml(emp.grant_days)}日</div>

        <div class="employee-five">
          <div class="five-mini-bar">
            <div class="five-mini-bar-fill" style="width:${rate}%"></div>
          </div>
          <div class="five-mini-text">${used}/5</div>
        </div>
      </div>
    `;

    btn.onclick = () => selectEmployee(emp);
    grid.appendChild(btn);
  });
}

/* =========================
   HTMLエスケープ
========================= */
function escapeHtml(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

/* =========================
   社員選択
========================= */
function selectEmployee(emp) {
  selectedEmployee = emp;

  document.getElementById("employeeScreen").classList.remove("active");
  document.getElementById("requestScreen").classList.add("active");

  document.getElementById("selectedEmployeeName").textContent = emp.name;

  document.getElementById("selectedRemainingDays").textContent =
    `${emp.current_remaining_days}日`;

  document.getElementById("selectedGrantDays").textContent =
    `${emp.grant_days}日`;

  const used = Number(emp.five_day_used || 0);
  const remain = Number(emp.five_day_remaining || 0);

  document.getElementById("fiveDayCount").textContent = `${used}/5`;
  document.getElementById("fiveDayBarFill").style.width = `${Math.min((used / 5) * 100, 100)}%`;
  document.getElementById("fiveDayMessage").textContent =
    emp.five_day_completed ? "達成済み" : `あと${remain}日`;

  loadEmployeeLeaveHistory(emp.employee_id);
}

/* =========================
   戻る
========================= */
function backToEmployeeList() {
  document.getElementById("requestScreen").classList.remove("active");
  document.getElementById("employeeScreen").classList.add("active");
}

/* =========================
   理由切替
========================= */
function handleReasonTypeChange() {
  const type = document.getElementById("reasonType").value;
  const wrap = document.getElementById("reasonDetailWrap");

  if (!wrap) return;

  wrap.style.display = type === "other" ? "block" : "none";
}

/* =========================
   申請区分
========================= */
function selectRequestType(type) {
  const buttons = document.querySelectorAll(".type-btn");
  buttons.forEach(btn => btn.classList.remove("active"));

  currentRequestType = type;

  const map = {
    one_day: "typeOneDay",
    half_am: "typeHalfAm",
    half_pm: "typeHalfPm",
    multi_day: "typeMultiDay"
  };

  const activeBtn = document.getElementById(map[type]);
  if (activeBtn) activeBtn.classList.add("active");

  const multiDayArea = document.getElementById("multiDayArea");
  if (multiDayArea) {
    multiDayArea.style.display = type === "multi_day" ? "block" : "none";
  }

  handleRequestTypeChange();
}

/* =========================
   日付変更時
========================= */
function handleRequestTypeChange() {
  const box = document.getElementById("calendarStatus");
  if (!box) return;

  box.classList.remove("ok", "error");
  box.textContent = "日付と申請区分を選択してください。";
}

/* =========================
   申請
========================= */
function submitRequest() {
  if (!selectedEmployee) {
    alert("社員を選択してください");
    return;
  }

  if (!currentRequestType) {
    alert("申請区分を選択してください");
    return;
  }

  let startDate = "";
  let endDate = "";
  let halfDay = false;
  let halfType = "";

  if (currentRequestType === "multi_day") {
    startDate = document.getElementById("rangeStartDate").value;
    endDate = document.getElementById("rangeEndDate").value;
  } else {
    startDate = document.getElementById("singleDate").value;
    endDate = startDate;
  }

  if (!startDate || !endDate) {
    alert("日付を選択してください");
    return;
  }

  if (currentRequestType === "half_am") {
    halfDay = true;
    halfType = "am";
  } else if (currentRequestType === "half_pm") {
    halfDay = true;
    halfType = "pm";
  }

  const reason = document.getElementById("reasonType").value;
  const detail = document.getElementById("reasonDetail").value;

  if (!reason) {
    alert("理由を選択してください");
    return;
  }

  const payload = {
    employee_id: selectedEmployee.employee_id,
    start_date: startDate,
    end_date: endDate,
    type: "paid_leave",
    half_day: halfDay,
    half_type: halfType,
    reason: reason,
    reason_detail: detail
  };

  const submitBtn = document.getElementById("submitBtn");
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.textContent = "申請中...";
  }

  google.script.run
    .withSuccessHandler(() => {
      alert("申請しました");
      loadEmployeeLeaveHistory(selectedEmployee.employee_id);

      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.textContent = "申請する";
      }
    })
    .withFailureHandler(err => {
      console.error(err);
      alert("エラーが発生しました");

      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.textContent = "申請する";
      }
    })
    .submitLeaveRequest(payload);
}

/* =========================
   年度内の申請履歴表示
========================= */
function loadEmployeeLeaveHistory(employeeId) {
  const list = document.getElementById("leaveHistoryList");
  if (!list) return;

  list.innerHTML = `<div class="history-empty">履歴を読み込み中です...</div>`;

  google.script.run
    .withSuccessHandler(renderEmployeeLeaveHistory)
    .withFailureHandler(err => {
      console.error(err);
      list.innerHTML = `<div class="history-empty history-error">履歴の取得でエラーが発生しました。</div>`;
    })
    .getEmployeeLeaveHistoryForRequest(employeeId);
}

function renderEmployeeLeaveHistory(data) {
  const list = document.getElementById("leaveHistoryList");
  if (!list) return;

  list.innerHTML = "";

  if (!Array.isArray(data) || data.length === 0) {
    list.innerHTML = `<div class="history-empty">今年度の申請履歴はありません。</div>`;
    return;
  }

  data.forEach(item => {
    const row = document.createElement("div");
    row.className = "history-row";

    row.innerHTML = `
      <div class="history-date">${escapeHtml(item.date_label)}</div>
      <div class="history-type">${escapeHtml(item.leave_type_label)}</div>
      <div class="history-days">${escapeHtml(item.days)}日</div>
      <div class="history-status ${escapeHtml(item.status)}">${escapeHtml(item.status_label)}</div>
    `;

    list.appendChild(row);
  });
}
</script>
