<script>
let employees = [];
let selectedEmployee = null;
let currentGroup = "a";
let currentRequestType = "";

let calendarDisplayDate = new Date();
let companyCalendarMap = {};

let selectedStartDateKey = "";
let selectedEndDateKey = "";
let loadedHistoryEmployeeId = "";
let employeeLeaveHistoryRows = [];
let editingRequestId = "";

function isPersonalPageMode() {
  if (typeof INITIAL_EMPLOYEE_ID === "undefined") {
    return false;
  }

  const id = String(INITIAL_EMPLOYEE_ID || "").trim();

  if (!id) {
    return false;
  }

  if (id === "undefined" || id === "null") {
    return false;
  }

  return true;
}

function setupPersonalPageMode() {
  if (!isPersonalPageMode()) return;

  document.body.classList.add("personal-page-mode");

  const notice = document.getElementById("personalPageNotice");
  if (notice) {
    notice.style.display = "block";
  }

  const backBtn = document.getElementById("backBtn");
  if (backBtn) {
    backBtn.style.display = "none";
  }

  const appSubtitle = document.getElementById("appSubtitle");
  if (appSubtitle) {
    appSubtitle.textContent = "自分専用ページから申請できます";
  }
}

/* =========================
   初期化
========================= */
function initPage() {
  setupPersonalPageMode();

  google.script.run
    .withSuccessHandler(data => {
      employees = data || [];
      currentGroup = getFirstAvailableGroup();

      render();
      updateGroupTabs();
      initReasonOptions();
      loadCompanyCalendarForRequest();

      if (isPersonalPageMode()) {
        const targetEmployee = employees.find(emp => {
          return String(emp.employee_id || "").trim() === String(INITIAL_EMPLOYEE_ID || "").trim();
        });

        if (targetEmployee) {
          selectEmployee(targetEmployee);
        } else {
          alert("専用ページの社員情報が見つかりません。事務所へ確認してください。");
        }
      }
    })
    .withFailureHandler(err => {
      console.error(err);
      alert("社員一覧の取得でエラーが発生しました");
    })
    .getEmployeesForRequest();
}

/* =========================
   会社カレンダー取得
========================= */
function loadCompanyCalendarForRequest() {
  google.script.run
    .withSuccessHandler(data => {
      console.log("companyCalendarMap:", data);
      companyCalendarMap = data || {};
      renderRequestCalendar();
    })
    .withFailureHandler(err => {
      console.error("company_calendar取得エラー:", err);
      companyCalendarMap = {};
      renderRequestCalendar();
    })
    .getCompanyCalendarMapForRequest();
}

/* =========================
   理由プルダウン初期化
========================= */
function initReasonOptions() {
  const reasonType = document.getElementById("reasonType");
  if (!reasonType) return;

  reasonType.innerHTML = `
    <option value="">選択してください</option>
    <option value="private">私用</option>
    <option value="sick">体調不良</option>
    <option value="other">その他</option>
  `;
}

/* =========================
   五十音グループ判定
========================= */
function getKanaGroup(emp) {
  const type = String(emp.employment_type || "").trim().toLowerCase();

  if (type === "trainee") return "trainee";

  const kana = String(emp.name_kana || "").trim();
  const k = kana.charAt(0);

  if (!k) return "w";

  if ("あいうえおぁぃぅぇぉ".includes(k)) return "a";
  if ("かきくけこがぎぐげご".includes(k)) return "k";
  if ("さしすせそざじずぜぞ".includes(k)) return "s";
  if ("たちつてとだぢづでど".includes(k)) return "t";
  if ("なにぬねの".includes(k)) return "n";
  if ("はひふへほばびぶべぼぱぴぷぺぽ".includes(k)) return "h";
  if ("まみむめも".includes(k)) return "m";
  if ("やゆよゃゅょ".includes(k)) return "y";
  if ("らりるれろ".includes(k)) return "r";
  if ("わをん".includes(k)) return "w";

  return "w";
}

function getGroupOrder() {
  return ["a", "k", "s", "t", "n", "h", "m", "y", "r", "w", "trainee"];
}

function getFirstAvailableGroup() {
  const order = getGroupOrder();
  const first = order.find(group => employees.some(emp => getKanaGroup(emp) === group));
  return first || "a";
}

function changeGroup(group) {
  currentGroup = group;
  render();
  updateGroupTabs();
}

function updateGroupTabs() {
  getGroupOrder().forEach(group => {
    const btn = document.querySelector(`[data-group="${group}"]`);
    if (!btn) return;

    btn.classList.toggle("active", group === currentGroup);

    const hasMember = employees.some(emp => getKanaGroup(emp) === group);
    btn.classList.toggle("no-member", !hasMember);
  });
}

/* =========================
   社員カード描画
========================= */
function render() {
  const grid = document.getElementById("employeeSwipeArea");
  const groupTitle = document.getElementById("groupTitle");
  if (!grid) return;

  grid.innerHTML = "";

  const filtered = employees.filter(emp => getKanaGroup(emp) === currentGroup);

  const groupNames = {
    a: "あ行",
    k: "か行",
    s: "さ行",
    t: "た行",
    n: "な行",
    h: "は行",
    m: "ま行",
    y: "や行",
    r: "ら行",
    w: "わ行",
    trainee: "研修生"
  };

  if (groupTitle) {
    groupTitle.textContent = groupNames[currentGroup] || "あ行";
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="status-box">この行に該当する社員はいません。</div>`;
    return;
  }

  filtered.forEach(emp => {
    const btn = document.createElement("button");
    btn.className = "employee-btn";
    btn.type = "button";

    const used = Number(emp.five_day_used || 0);
    const rate = Math.min((used / 5) * 100, 100);

    const fiscalYearText = emp.fiscal_year
      ? `${emp.fiscal_year}年度（${emp.fiscal_start_month || 4}月開始）`
      : "";

    btn.innerHTML = `
      <div class="employee-left">
        <div class="employee-name">${escapeHtml(emp.name)}</div>
        <div class="employee-kana">${escapeHtml(emp.name_kana || "")}</div>
        <div class="employee-fiscal-year">${escapeHtml(fiscalYearText)}</div>
      </div>

      <div class="employee-right">
        <div class="employee-days">
          <span class="employee-days-label">残</span>
          <span class="employee-days-value">${escapeHtml(emp.current_remaining_days)}</span>
          <span class="employee-days-unit">日</span>
        </div>
        <div class="employee-days-sub">付与 ${escapeHtml(emp.grant_days)}日</div>

        <div class="employee-five">
          <div class="five-mini-bar">
            <div class="five-mini-bar-fill" style="width:${rate}%"></div>
          </div>
          <div class="five-mini-text">${used}/5</div>
        </div>
      </div>
    `;

    btn.onclick = () => selectEmployee(emp);
    grid.appendChild(btn);
  });
}

/* =========================
   HTMLエスケープ
========================= */
function escapeHtml(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

/* =========================
   社員選択
========================= */
function selectEmployee(emp) {
  selectedEmployee = emp;
  clearEditingRequestState();

  // 前の人の申請区分・選択状態をリセット
  currentRequestType = "";

  document.querySelectorAll(".type-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  const multiDayArea = document.getElementById("multiDayArea");
  if (multiDayArea) {
    multiDayArea.style.display = "none";
  }

  resetSelectedDates();

  document.getElementById("employeeScreen").classList.remove("active");
  document.getElementById("requestScreen").classList.add("active");

  document.getElementById("selectedEmployeeName").textContent = emp.name;

  const fiscalYearEl = document.getElementById("selectedFiscalYear");
  if (fiscalYearEl) {
    fiscalYearEl.textContent = emp.fiscal_year
      ? `${emp.fiscal_year}年度（${emp.fiscal_start_month || 4}月開始）`
      : "";
  }

  document.getElementById("selectedRemainingDays").textContent =
    `${emp.current_remaining_days}日`;

  const used = Number(emp.five_day_used || 0);
  const remain = Number(emp.five_day_remaining || 0);

  document.getElementById("fiveDayCount").textContent = `${used}/5`;
  document.getElementById("fiveDayBarFill").style.width =
    `${Math.min((used / 5) * 100, 100)}%`;

  document.getElementById("fiveDayMessage").textContent =
    emp.five_day_completed ? "達成済み" : `あと${remain}日`;

  calendarDisplayDate = new Date();
  renderRequestCalendar();
  updateCalendarStatus();

  closeHistorySection();
  resetEmployeeLeaveHistory();
}

/* =========================
   戻る
========================= */
function backToEmployeeList() {
  if (isPersonalPageMode()) {
    return;
  }

  document.getElementById("requestScreen").classList.remove("active");
  document.getElementById("employeeScreen").classList.add("active");
}

/* =========================
   理由切替
========================= */
function handleReasonTypeChange() {
  const type = document.getElementById("reasonType").value;
  const wrap = document.getElementById("reasonDetailWrap");

  if (!wrap) return;

  wrap.style.display = type === "other" ? "block" : "none";
}

/* =========================
   申請区分
========================= */
function selectRequestType(type) {
  const buttons = document.querySelectorAll(".type-btn");
  buttons.forEach(btn => btn.classList.remove("active"));

  currentRequestType = type;

  const map = {
    one_day: "typeOneDay",
    half_am: "typeHalfAm",
    half_pm: "typeHalfPm",
    multi_day: "typeMultiDay"
  };

  const activeBtn = document.getElementById(map[type]);
  if (activeBtn) activeBtn.classList.add("active");

  const multiDayArea = document.getElementById("multiDayArea");
  if (multiDayArea) {
    multiDayArea.style.display = type === "multi_day" ? "block" : "none";
  }

  resetSelectedDates();
  updateHiddenDateInputs();
  updateCalendarStatus();
  renderRequestCalendar();
}

function isEditingRequest() {
  return !!String(editingRequestId || "").trim();
}

function clearEditingRequestState() {
  editingRequestId = "";
  hideEditingRequestBanner();
  clearEditingHistoryRow();
  setRequestFormEditingMode(false);

  const submitBtn = document.getElementById("submitBtn");
  if (submitBtn && !submitBtn.disabled) {
    submitBtn.textContent = "申請する";
  }
}

function setRequestFormEditingMode(enabled) {
  const layout = document.querySelector(".tablet-request-layout");
  const submitBtn = document.getElementById("submitBtn");

  if (layout) {
    layout.classList.toggle("editing", !!enabled);
  }

  if (submitBtn) {
    submitBtn.classList.toggle("editing", !!enabled);
  }
}

function resetRequestFormForNewRequest() {
  currentRequestType = "";

  document.querySelectorAll(".type-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  const multiDayArea = document.getElementById("multiDayArea");
  if (multiDayArea) {
    multiDayArea.style.display = "none";
  }

  resetSelectedDates();

  const reasonType = document.getElementById("reasonType");
  if (reasonType) {
    reasonType.value = "";
  }

  const reasonDetail = document.getElementById("reasonDetail");
  if (reasonDetail) {
    reasonDetail.value = "";
  }

  const reasonDetailWrap = document.getElementById("reasonDetailWrap");
  if (reasonDetailWrap) {
    reasonDetailWrap.style.display = "none";
  }

  updateHiddenDateInputs();
  updateCalendarStatus();
  renderRequestCalendar();
}

function cancelEditingRequest() {
  clearEditingRequestState();
  resetRequestFormForNewRequest();
}

function showEditingRequestBanner(item) {
  const banner = document.getElementById("editingRequestBanner");
  const meta = document.getElementById("editingRequestMeta");

  if (!banner) return;

  banner.style.display = "flex";

  if (meta) {
    meta.textContent = `${item.date_label || ""} / ${item.leave_type_label || ""}`;
  }
}

function hideEditingRequestBanner() {
  const banner = document.getElementById("editingRequestBanner");
  if (banner) {
    banner.style.display = "none";
  }
}

function clearEditingHistoryRow() {
  document.querySelectorAll(".history-row.editing").forEach(row => {
    row.classList.remove("editing");
  });
}

function setEditingHistoryRow(requestId) {
  clearEditingHistoryRow();

  const targetId = String(requestId || "");
  const row = Array.from(document.querySelectorAll(".history-row"))
    .find(item => String(item.dataset.requestId || "") === targetId);

  if (row) {
    row.classList.add("editing");
  }
}

/* =========================
   日付リセット
========================= */
function resetSelectedDates() {
  selectedStartDateKey = "";
  selectedEndDateKey = "";
  updateHiddenDateInputs();
}

/* =========================
   input連携
========================= */
function updateHiddenDateInputs() {
  const singleDate = document.getElementById("singleDate");
  const rangeStartDate = document.getElementById("rangeStartDate");
  const rangeEndDate = document.getElementById("rangeEndDate");

  if (singleDate) {
    singleDate.value = currentRequestType === "multi_day" ? "" : selectedStartDateKey;
  }

  if (rangeStartDate) {
    rangeStartDate.value = currentRequestType === "multi_day" ? selectedStartDateKey : "";
  }

  if (rangeEndDate) {
    rangeEndDate.value = currentRequestType === "multi_day" ? selectedEndDateKey : "";
  }
}

function handleRequestTypeChange() {
  const singleDate = document.getElementById("singleDate");
  const rangeStartDate = document.getElementById("rangeStartDate");
  const rangeEndDate = document.getElementById("rangeEndDate");

  if (currentRequestType === "multi_day") {
    selectedStartDateKey = rangeStartDate ? rangeStartDate.value : "";
    selectedEndDateKey = rangeEndDate ? rangeEndDate.value : "";
  } else {
    selectedStartDateKey = singleDate ? singleDate.value : "";
    selectedEndDateKey = selectedStartDateKey;
  }

  if (selectedStartDateKey) {
    calendarDisplayDate = new Date(selectedStartDateKey + "T00:00:00");
  }

  updateCalendarStatus();
  renderRequestCalendar();
}

function syncCalendarFromInput() {
  handleRequestTypeChange();
}

/* =========================
   カレンダー操作
========================= */
function toDateKeyLocal(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function formatDateLabel(dateKey) {
  if (!dateKey) return "";
  const [y, m, d] = dateKey.split("-");
  return `${y}/${m}/${d}`;
}

function countSelectableLeaveDays(startDateKey, endDateKey) {
  if (!startDateKey || !endDateKey) return 0;

  const start = new Date(startDateKey + "T00:00:00");
  const end = new Date(endDateKey + "T00:00:00");

  let count = 0;
  let cursor = new Date(start);

  while (cursor <= end) {
    const type = getCalendarDayType(cursor);

    if (type === "workday") {
      count++;
    }

    cursor.setDate(cursor.getDate() + 1);
  }

  return count;
}

function moveCalendarMonth(diff) {
  calendarDisplayDate.setMonth(calendarDisplayDate.getMonth() + diff);
  renderRequestCalendar();
}

function selectCalendarDate(dateKey) {
  if (!currentRequestType) {
    alert("先に申請区分を選択してください");
    return;
  }

  const date = new Date(dateKey + "T00:00:00");

  if (date.getDay() === 0) {
    alert("日曜日は有給申請できません");
    return;
  }

  const type = getCalendarDayTypeByKey(dateKey);

  if (type !== "workday") {
    alert("この日は有給申請できません");
    return;
  }

  if (currentRequestType === "multi_day") {
    selectMultiDayDate(dateKey);
  } else {
    selectedStartDateKey = dateKey;
    selectedEndDateKey = dateKey;
  }

  updateHiddenDateInputs();
  updateCalendarStatus();
  renderRequestCalendar();
}

function selectMultiDayDate(dateKey) {
  if (!selectedStartDateKey || selectedEndDateKey) {
    selectedStartDateKey = dateKey;
    selectedEndDateKey = "";
    return;
  }

  if (dateKey < selectedStartDateKey) {
    selectedEndDateKey = selectedStartDateKey;
    selectedStartDateKey = dateKey;
    return;
  }

  selectedEndDateKey = dateKey;
}

function getCalendarDayTypeByKey(dateKey) {
  const calendarItem = companyCalendarMap[dateKey];

  if (calendarItem && calendarItem.type) {
    return String(calendarItem.type).trim();
  }

  return "holiday";
}

function getCalendarDayType(date) {
  if (date.getDay() === 0) {
    return "holiday";
  }

  const dateKey = toDateKeyLocal(date);
  return getCalendarDayTypeByKey(dateKey);
}

function getCalendarDayLabel(type) {
  if (type === "holiday") return "休日";
  if (type === "no_leave") return "有給NG";
  return "営業日";
}

function isDateInSelectedRange(dateKey) {
  if (!selectedStartDateKey || !selectedEndDateKey) return false;
  return dateKey >= selectedStartDateKey && dateKey <= selectedEndDateKey;
}

function updateCalendarStatus() {
  const box = document.getElementById("calendarStatus");
  if (!box) return;

  box.classList.remove("ok", "error", "success");

  if (!currentRequestType) {
    box.textContent = "申請区分を選択してください。";
    return;
  }

  if (currentRequestType === "multi_day") {
    if (!selectedStartDateKey) {
      box.textContent = "複数日申請：開始日を選択してください。";
      return;
    }

    if (!selectedEndDateKey) {
      box.textContent = `開始日：${formatDateLabel(selectedStartDateKey)}\n終了日を選択してください。`;
      return;
    }

    const leaveDays = countSelectableLeaveDays(selectedStartDateKey, selectedEndDateKey);

    box.classList.add("ok");
    box.textContent =
     `${formatDateLabel(selectedStartDateKey)} 〜 ${formatDateLabel(selectedEndDateKey)}（${leaveDays}日間）選択中`;
    return;
  }

  if (!selectedStartDateKey) {
    box.textContent = "カレンダーから希望日を選択してください。";
    return;
  }

  const labelMap = {
    one_day: "1日有給",
    half_am: "午前半休",
    half_pm: "午後半休"
  };

  box.classList.add("ok");
  box.textContent = `${formatDateLabel(selectedStartDateKey)}：${labelMap[currentRequestType] || "有給"} を選択中です。`;
}

function renderRequestCalendar() {
  const grid = document.getElementById("requestCalendarGrid");
  const label = document.getElementById("calendarMonthLabel");

  if (!grid || !label) return;

  grid.innerHTML = "";

  const year = calendarDisplayDate.getFullYear();
  const month = calendarDisplayDate.getMonth();

  label.textContent = `${year}年 ${month + 1}月`;

  const firstDate = new Date(year, month, 1);
  const lastDate = new Date(year, month + 1, 0);
  const startDay = firstDate.getDay();
  const daysInMonth = lastDate.getDate();
  const todayKey = toDateKeyLocal(new Date());

  for (let i = 0; i < startDay; i++) {
    const empty = document.createElement("div");
    empty.className = "calendar-day empty";
    grid.appendChild(empty);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    const dateKey = toDateKeyLocal(date);
    const type = getCalendarDayType(date);

    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = `calendar-day ${type}`;

    if (dateKey === todayKey) {
      btn.classList.add("is-today");
    }

    if (dateKey === selectedStartDateKey) {
      btn.classList.add("selected", "range-start");
    }

    if (dateKey === selectedEndDateKey && selectedEndDateKey !== selectedStartDateKey) {
      btn.classList.add("selected", "range-end");
    }

    if (isDateInSelectedRange(dateKey)) {
      btn.classList.add("in-range");
    }

    const canSelect = type === "workday";
    btn.disabled = !canSelect;

    btn.innerHTML = `
      <span class="calendar-day-number">${day}</span>
      <span class="calendar-day-label">${getCalendarDayLabel(type)}</span>
    `;

    btn.onclick = () => selectCalendarDate(dateKey);
    grid.appendChild(btn);
  }
}

/* =========================
   申請
========================= */
function submitRequest() {
  if (!selectedEmployee) {
    alert("社員を選択してください");
    return;
  }

  if (!currentRequestType) {
    alert("申請区分を選択してください");
    return;
  }

  updateHiddenDateInputs();

  let startDate = "";
  let endDate = "";
  let halfDay = false;
  let halfType = "";

  if (currentRequestType === "multi_day") {
    startDate = selectedStartDateKey;
    endDate = selectedEndDateKey;
  } else {
    startDate = selectedStartDateKey;
    endDate = selectedStartDateKey;
  }

  if (!startDate || !endDate) {
    alert("日付を選択してください");
    return;
  }

  if (currentRequestType === "half_am") {
    halfDay = true;
    halfType = "am";
  } else if (currentRequestType === "half_pm") {
    halfDay = true;
    halfType = "pm";
  }

  const reason = document.getElementById("reasonType").value;
  const detail = document.getElementById("reasonDetail").value;

  if (!reason) {
    alert("理由を選択してください");
    return;
  }

  const payload = {
    employee_id: selectedEmployee.employee_id,
    start_date: startDate,
    end_date: endDate,
    type: "paid_leave",
    half_day: halfDay,
    half_type: halfType,
    reason: reason,
    reason_detail: detail
  };

  const submitBtn = document.getElementById("submitBtn");
  const statusBox = document.getElementById("calendarStatus");
  const isEditing = isEditingRequest();
  const targetRequestId = editingRequestId;
  const targetEmployeeId = selectedEmployee.employee_id;

  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.textContent = isEditing ? "保存中..." : "申請中...";
    submitBtn.classList.add("submitting");
    submitBtn.classList.remove("submitted");
  }

  if (statusBox) {
    statusBox.className = "calendar-selected-status ok";
    statusBox.textContent = isEditing ? "修正を保存しています..." : "申請を送信しています...";
  }

  const runner = google.script.run
    .withSuccessHandler(() => {
      if (statusBox) {
        statusBox.className = "calendar-selected-status success";
        statusBox.textContent = isEditing ? "修正を保存しました。" : "送信完了！申請を受け付けました。";
      }

      if (submitBtn) {
        submitBtn.textContent = isEditing ? "保存完了！" : "送信完了！";
        submitBtn.classList.remove("submitting");
        submitBtn.classList.add("submitted");
      }

      clearEditingRequestState();
      resetSelectedDates();
      renderRequestCalendar();
      loadedHistoryEmployeeId = "";
      loadEmployeeLeaveHistory(targetEmployeeId);

      google.script.run
        .withSuccessHandler(data => {
          employees = data || [];
          const updated = employees.find(emp => emp.employee_id === selectedEmployee.employee_id);

          if (updated) {
            selectedEmployee = updated;
          }

          render();
          updateGroupTabs();
        })
        .getEmployeesForRequest();

      setTimeout(() => {

  if (submitBtn) {
    submitBtn.disabled = false;
    submitBtn.textContent = "申請する";
    submitBtn.classList.remove("submitted");
  }

  // 個人スマホページの場合
  if (isPersonalPageMode()) {

    currentRequestType = "";

    // 区分ボタン解除
    document.querySelectorAll(".type-btn").forEach(btn => {
      btn.classList.remove("active");
    });

    // 複数日エリア閉じる
    const multiDayArea = document.getElementById("multiDayArea");
    if (multiDayArea) {
      multiDayArea.style.display = "none";
    }

    // 日付リセット
    resetSelectedDates();

    // 理由リセット
    const reasonType = document.getElementById("reasonType");
    if (reasonType) {
      reasonType.value = "";
    }

    // 詳細リセット
    const reasonDetail = document.getElementById("reasonDetail");
    if (reasonDetail) {
      reasonDetail.value = "";
    }

    // 詳細欄閉じる
    const reasonDetailWrap = document.getElementById("reasonDetailWrap");
    if (reasonDetailWrap) {
      reasonDetailWrap.style.display = "none";
    }

    updateHiddenDateInputs();
    updateCalendarStatus();
    renderRequestCalendar();

  } else {

    // 共用タブレット版
    backToEmployeeList();

  }

}, 2500);
    })
    .withFailureHandler(err => {
      console.error(isEditing ? "updatePendingLeaveRequestForEmployee error:" : "submitLeaveRequest error:", err);

      let message = "エラーが発生しました";

      if (err) {
        if (err.message) {
          message = err.message;
        } else if (typeof err === "string") {
          message = err;
        } else {
          message = String(err);
        }
      }

      if (statusBox) {
        statusBox.className = "calendar-selected-status error";
        statusBox.textContent = message;
      }

      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.textContent = isEditing ? "修正を保存" : "申請する";
        submitBtn.classList.remove("submitting", "submitted");
      }
    });

  if (isEditing) {
    runner.updatePendingLeaveRequestForEmployee(targetRequestId, targetEmployeeId, payload);
  } else {
    runner.submitLeaveRequest(payload);
  }
}

/* =========================
   履歴開閉
========================= */
function closeHistorySection() {
  const section = document.getElementById("historySection");
  const btn = document.getElementById("historyToggleBtn");

  if (section) {
    section.classList.add("history-collapsed");
  }

  if (btn) {
    btn.textContent = "申請履歴を見る";
  }
}

function toggleHistorySection() {
  const section = document.getElementById("historySection");
  const btn = document.getElementById("historyToggleBtn");

  if (!section || !btn) return;

  const isCollapsed = section.classList.contains("history-collapsed");

  section.classList.toggle("history-collapsed", !isCollapsed);

  btn.textContent = isCollapsed
    ? "申請履歴を閉じる"
    : "申請履歴を見る";

  if (isCollapsed && selectedEmployee) {
    loadEmployeeLeaveHistory(selectedEmployee.employee_id);
  }
}

/* =========================
   年度内の申請履歴表示
========================= */
function resetEmployeeLeaveHistory() {
  loadedHistoryEmployeeId = "";
  employeeLeaveHistoryRows = [];

  const list = document.getElementById("leaveHistoryList");
  if (!list) return;

  list.innerHTML = `<div class="history-empty">申請履歴を見るボタンを押すと履歴が表示されます。</div>`;
}

function loadEmployeeLeaveHistory(employeeId) {
  const list = document.getElementById("leaveHistoryList");
  if (!list) return;

  const targetEmployeeId = String(employeeId || "").trim();
  if (!targetEmployeeId) {
    list.innerHTML = `<div class="history-empty">申請履歴はまだありません。</div>`;
    return;
  }

  if (loadedHistoryEmployeeId === targetEmployeeId && list.dataset.loaded === "true") {
    return;
  }

  list.dataset.loaded = "false";
  list.innerHTML = `<div class="history-empty">申請履歴を読み込んでいます...</div>`;

  google.script.run
    .withSuccessHandler(data => {
      loadedHistoryEmployeeId = targetEmployeeId;
      list.dataset.loaded = "true";
      employeeLeaveHistoryRows = Array.isArray(data) ? data : [];
      renderEmployeeLeaveHistory(data);
    })
    .withFailureHandler(err => {
      console.error(err);
      list.dataset.loaded = "false";
      list.innerHTML = `<div class="history-empty history-error">申請履歴の取得に失敗しました。時間をおいて再度お試しください。</div>`;
    })
    .getEmployeeLeaveHistoryForRequest(targetEmployeeId);
}

function renderEmployeeLeaveHistory(data) {
  const list = document.getElementById("leaveHistoryList");
  if (!list) return;

  list.innerHTML = "";

  if (!Array.isArray(data) || data.length === 0) {
    list.innerHTML = `<div class="history-empty">申請履歴はまだありません。</div>`;
    return;
  }

  const displayRows = data
    .map((item, index) => ({ item, index }))
    .sort((a, b) => {
      const aPending = String(a.item.status || "") === "pending";
      const bPending = String(b.item.status || "") === "pending";

      if (aPending !== bPending) return aPending ? -1 : 1;

      if (aPending && bPending) {
        const aDate = String(a.item.start_date || "");
        const bDate = String(b.item.start_date || "");
        if (aDate !== bDate) return aDate < bDate ? 1 : -1;
      }

      return a.index - b.index;
    })
    .map(row => row.item);

  displayRows.forEach(item => {
    const row = document.createElement("div");
    const status = String(item.status || "");
    row.className = `history-row history-row-${status}`;
    row.dataset.requestId = item.request_id || "";

    if (editingRequestId && String(item.request_id || "") === String(editingRequestId)) {
      row.classList.add("editing");
    }

    const requestId = escapeHtml(item.request_id);
    const actions = item.can_edit
      ? `
        <div class="history-actions">
          <button type="button" class="history-action-btn" onclick="startEditLeaveRequest('${requestId}')">修正</button>
          <button type="button" class="history-action-btn cancel" onclick="cancelLeaveRequestFromHistory('${requestId}')">取消</button>
        </div>
      `
      : `<div class="history-actions history-actions-empty"></div>`;

    row.innerHTML = `
      <div class="history-date">${escapeHtml(item.date_label)}</div>
      <div class="history-type">${escapeHtml(item.leave_type_label)}</div>
      <div class="history-days">${escapeHtml(item.days)}日</div>
      <div class="history-status ${escapeHtml(item.status)}">${escapeHtml(item.status_label)}</div>
      ${actions}
    `;

    list.appendChild(row);
  });
}

function startEditLeaveRequest(requestId) {
  const targetId = String(requestId || "").trim();
  const item = employeeLeaveHistoryRows.find(row => String(row.request_id || "").trim() === targetId);

  if (!item || !item.can_edit) {
    alert("承認待ちの申請だけ修正できます");
    return;
  }

  editingRequestId = targetId;
  showEditingRequestBanner(item);
  setRequestFormEditingMode(true);

  if (item.half_day === "am") {
    selectRequestType("half_am");
  } else if (item.half_day === "pm") {
    selectRequestType("half_pm");
  } else if (item.start_date !== item.end_date) {
    selectRequestType("multi_day");
  } else {
    selectRequestType("one_day");
  }

  selectedStartDateKey = item.start_date;
  selectedEndDateKey = item.end_date;

  if (selectedStartDateKey) {
    calendarDisplayDate = new Date(selectedStartDateKey + "T00:00:00");
  }

  const reasonType = document.getElementById("reasonType");
  if (reasonType) {
    reasonType.value = item.reason || "";
  }

  const reasonDetail = document.getElementById("reasonDetail");
  if (reasonDetail) {
    reasonDetail.value = item.reason_detail || "";
  }

  handleReasonTypeChange();
  updateHiddenDateInputs();
  updateCalendarStatus();
  renderRequestCalendar();

  const submitBtn = document.getElementById("submitBtn");
  if (submitBtn) {
    submitBtn.textContent = "修正を保存";
  }

  setEditingHistoryRow(targetId);

  const requestScreen = document.getElementById("requestScreen");
  if (requestScreen) {
    requestScreen.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function refreshSelectedEmployeeLeaveHistory() {
  if (!selectedEmployee || !selectedEmployee.employee_id) return;

  loadedHistoryEmployeeId = "";
  loadEmployeeLeaveHistory(selectedEmployee.employee_id);
}

function cancelLeaveRequestFromHistory(requestId) {
  if (!selectedEmployee) {
    alert("社員を選択してください");
    return;
  }

  const targetId = String(requestId || "").trim();
  const item = employeeLeaveHistoryRows.find(row => String(row.request_id || "").trim() === targetId);

  if (!item || !item.can_edit) {
    alert("承認待ちの申請だけ取消できます");
    return;
  }

  if (!confirm("この申請を取消しますか？")) {
    return;
  }

  google.script.run
    .withSuccessHandler(() => {
      if (editingRequestId === targetId) {
        clearEditingRequestState();
        resetRequestFormForNewRequest();
      }

      refreshSelectedEmployeeLeaveHistory();

      const statusBox = document.getElementById("calendarStatus");
      if (statusBox) {
        statusBox.className = "calendar-selected-status success";
        statusBox.textContent = "申請を取消しました。";
      }
    })
    .withFailureHandler(err => {
      console.error("cancelPendingLeaveRequestForEmployee error:", err);

      let message = "取消でエラーが発生しました";
      if (err && err.message) {
        message = err.message;
      } else if (typeof err === "string") {
        message = err;
      }

      refreshSelectedEmployeeLeaveHistory();

      alert(message);
    })
    .cancelPendingLeaveRequestForEmployee(targetId, selectedEmployee.employee_id);
}

window.addEventListener("DOMContentLoaded", initPage);
</script>
