<script>
let employees = [];
let selectedEmployee = null;
let currentGroup = "a";
let currentRequestType = "";

let calendarDisplayDate = new Date();
let companyCalendarMap = {};

let selectedStartDateKey = "";
let selectedEndDateKey = "";

/* =========================
   初期化
========================= */
function initPage() {
  google.script.run
    .withSuccessHandler(data => {
      employees = data || [];
      currentGroup = getFirstAvailableGroup();
      render();
      updateGroupTabs();
      initReasonOptions();
      loadCompanyCalendarForRequest();
    })
    .withFailureHandler(err => {
      console.error(err);
      alert("社員一覧の取得でエラーが発生しました");
    })
    .getEmployeesForRequest();
}

window.addEventListener("DOMContentLoaded", initPage);

/* =========================
   会社カレンダー取得
========================= */
function loadCompanyCalendarForRequest() {
  google.script.run
    .withSuccessHandler(data => {
      console.log("companyCalendarMap:", data);
      companyCalendarMap = data || {};
      renderRequestCalendar();
    })
    .withFailureHandler(err => {
      console.error("company_calendar取得エラー:", err);
      companyCalendarMap = {};
      renderRequestCalendar();
    })
    .getCompanyCalendarMapForRequest();
}

/* =========================
   理由プルダウン初期化
========================= */
function initReasonOptions() {
  const reasonType = document.getElementById("reasonType");
  if (!reasonType) return;

  reasonType.innerHTML = `
    <option value="">選択してください</option>
    <option value="private">私用</option>
    <option value="sick">体調不良</option>
    <option value="other">その他</option>
  `;
}

/* =========================
   五十音グループ判定
========================= */
function getKanaGroup(emp) {
  const type = String(emp.employment_type || "").trim().toLowerCase();

  if (type === "trainee") return "trainee";

  const kana = String(emp.name_kana || "").trim();
  const k = kana.charAt(0);

  if (!k) return "w";

  if ("あいうえおぁぃぅぇぉ".includes(k)) return "a";
  if ("かきくけこがぎぐげご".includes(k)) return "k";
  if ("さしすせそざじずぜぞ".includes(k)) return "s";
  if ("たちつてとだぢづでど".includes(k)) return "t";
  if ("なにぬねの".includes(k)) return "n";
  if ("はひふへほばびぶべぼぱぴぷぺぽ".includes(k)) return "h";
  if ("まみむめも".includes(k)) return "m";
  if ("やゆよゃゅょ".includes(k)) return "y";
  if ("らりるれろ".includes(k)) return "r";
  if ("わをん".includes(k)) return "w";

  return "w";
}

function getGroupOrder() {
  return ["a", "k", "s", "t", "n", "h", "m", "y", "r", "w", "trainee"];
}

function getFirstAvailableGroup() {
  const order = getGroupOrder();
  const first = order.find(group => employees.some(emp => getKanaGroup(emp) === group));
  return first || "a";
}

function changeGroup(group) {
  currentGroup = group;
  render();
  updateGroupTabs();
}

function updateGroupTabs() {
  getGroupOrder().forEach(group => {
    const btn = document.querySelector(`[data-group="${group}"]`);
    if (!btn) return;

    btn.classList.toggle("active", group === currentGroup);

    const hasMember = employees.some(emp => getKanaGroup(emp) === group);
    btn.classList.toggle("no-member", !hasMember);
  });
}

/* =========================
   社員カード描画
========================= */
function render() {
  const grid = document.getElementById("employeeSwipeArea");
  const groupTitle = document.getElementById("groupTitle");
  if (!grid) return;

  grid.innerHTML = "";

  const filtered = employees.filter(emp => getKanaGroup(emp) === currentGroup);

  const groupNames = {
    a: "あ行",
    k: "か行",
    s: "さ行",
    t: "た行",
    n: "な行",
    h: "は行",
    m: "ま行",
    y: "や行",
    r: "ら行",
    w: "わ行",
    trainee: "研修生"
  };

  if (groupTitle) {
    groupTitle.textContent = groupNames[currentGroup] || "あ行";
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="status-box">この行に該当する社員はいません。</div>`;
    return;
  }

  filtered.forEach(emp => {
    const btn = document.createElement("button");
    btn.className = "employee-btn";
    btn.type = "button";

    const used = Number(emp.five_day_used || 0);
    const rate = Math.min((used / 5) * 100, 100);

    const fiscalYearText = emp.fiscal_year
      ? `${emp.fiscal_year}年度（${emp.fiscal_start_month || 4}月開始）`
      : "";

    btn.innerHTML = `
      <div class="employee-left">
        <div class="employee-name">${escapeHtml(emp.name)}</div>
        <div class="employee-kana">${escapeHtml(emp.name_kana || "")}</div>
        <div class="employee-fiscal-year">${escapeHtml(fiscalYearText)}</div>
      </div>

      <div class="employee-right">
        <div class="employee-days">残 ${escapeHtml(emp.current_remaining_days)}日</div>
        <div class="employee-days-sub">繰越 ${escapeHtml(emp.grant_days)}日</div>

        <div class="employee-five">
          <div class="five-mini-bar">
            <div class="five-mini-bar-fill" style="width:${rate}%"></div>
          </div>
          <div class="five-mini-text">${used}/5</div>
        </div>
      </div>
    `;

    btn.onclick = () => selectEmployee(emp);
    grid.appendChild(btn);
  });
}

/* =========================
   HTMLエスケープ
========================= */
function escapeHtml(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

/* =========================
   社員選択
========================= */
function selectEmployee(emp) {
  selectedEmployee = emp;

  document.getElementById("employeeScreen").classList.remove("active");
  document.getElementById("requestScreen").classList.add("active");

  document.getElementById("selectedEmployeeName").textContent = emp.name;

  const fiscalYearEl = document.getElementById("selectedFiscalYear");
  if (fiscalYearEl) {
    fiscalYearEl.textContent = emp.fiscal_year
      ? `${emp.fiscal_year}年度（${emp.fiscal_start_month || 4}月開始）`
      : "";
  }

  document.getElementById("selectedRemainingDays").textContent =
    `${emp.current_remaining_days}日`;

  const used = Number(emp.five_day_used || 0);
  const remain = Number(emp.five_day_remaining || 0);

  document.getElementById("fiveDayCount").textContent = `${used}/5`;
  document.getElementById("fiveDayBarFill").style.width =
    `${Math.min((used / 5) * 100, 100)}%`;

  document.getElementById("fiveDayMessage").textContent =
    emp.five_day_completed ? "達成済み" : `あと${remain}日`;

  resetSelectedDates();

  calendarDisplayDate = new Date();
  renderRequestCalendar();
  updateCalendarStatus();

  closeHistorySection();

  loadEmployeeLeaveHistory(emp.employee_id);
}

/* =========================
   戻る
========================= */
function backToEmployeeList() {
  document.getElementById("requestScreen").classList.remove("active");
  document.getElementById("employeeScreen").classList.add("active");
}

/* =========================
   理由切替
========================= */
function handleReasonTypeChange() {
  const type = document.getElementById("reasonType").value;
  const wrap = document.getElementById("reasonDetailWrap");

  if (!wrap) return;

  wrap.style.display = type === "other" ? "block" : "none";
}

/* =========================
   申請区分
========================= */
function selectRequestType(type) {
  const buttons = document.querySelectorAll(".type-btn");
  buttons.forEach(btn => btn.classList.remove("active"));

  currentRequestType = type;

  const map = {
    one_day: "typeOneDay",
    half_am: "typeHalfAm",
    half_pm: "typeHalfPm",
    multi_day: "typeMultiDay"
  };

  const activeBtn = document.getElementById(map[type]);
  if (activeBtn) activeBtn.classList.add("active");

  const multiDayArea = document.getElementById("multiDayArea");
  if (multiDayArea) {
    multiDayArea.style.display = type === "multi_day" ? "block" : "none";
  }

  resetSelectedDates();
  updateHiddenDateInputs();
  updateCalendarStatus();
  renderRequestCalendar();
}

/* =========================
   日付リセット
========================= */
function resetSelectedDates() {
  selectedStartDateKey = "";
  selectedEndDateKey = "";
  updateHiddenDateInputs();
}

/* =========================
   input連携
========================= */
function updateHiddenDateInputs() {
  const singleDate = document.getElementById("singleDate");
  const rangeStartDate = document.getElementById("rangeStartDate");
  const rangeEndDate = document.getElementById("rangeEndDate");

  if (singleDate) {
    singleDate.value = currentRequestType === "multi_day" ? "" : selectedStartDateKey;
  }

  if (rangeStartDate) {
    rangeStartDate.value = currentRequestType === "multi_day" ? selectedStartDateKey : "";
  }

  if (rangeEndDate) {
    rangeEndDate.value = currentRequestType === "multi_day" ? selectedEndDateKey : "";
  }
}

function handleRequestTypeChange() {
  const singleDate = document.getElementById("singleDate");
  const rangeStartDate = document.getElementById("rangeStartDate");
  const rangeEndDate = document.getElementById("rangeEndDate");

  if (currentRequestType === "multi_day") {
    selectedStartDateKey = rangeStartDate ? rangeStartDate.value : "";
    selectedEndDateKey = rangeEndDate ? rangeEndDate.value : "";
  } else {
    selectedStartDateKey = singleDate ? singleDate.value : "";
    selectedEndDateKey = selectedStartDateKey;
  }

  if (selectedStartDateKey) {
    calendarDisplayDate = new Date(selectedStartDateKey + "T00:00:00");
  }

  updateCalendarStatus();
  renderRequestCalendar();
}

function syncCalendarFromInput() {
  handleRequestTypeChange();
}

/* =========================
   カレンダー操作
========================= */
function toDateKeyLocal(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function formatDateLabel(dateKey) {
  if (!dateKey) return "";
  const [y, m, d] = dateKey.split("-");
  return `${y}/${m}/${d}`;
}

function moveCalendarMonth(diff) {
  calendarDisplayDate.setMonth(calendarDisplayDate.getMonth() + diff);
  renderRequestCalendar();
}

function selectCalendarDate(dateKey) {
  if (!currentRequestType) {
    alert("先に申請区分を選択してください");
    return;
  }

  const date = new Date(dateKey + "T00:00:00");

  if (date.getDay() === 0) {
    alert("日曜日は有給申請できません");
    return;
  }

  const type = getCalendarDayTypeByKey(dateKey);

  if (type !== "workday") {
    alert("この日は有給申請できません");
    return;
  }

  if (currentRequestType === "multi_day") {
    selectMultiDayDate(dateKey);
  } else {
    selectedStartDateKey = dateKey;
    selectedEndDateKey = dateKey;
  }

  updateHiddenDateInputs();
  updateCalendarStatus();
  renderRequestCalendar();
}

function selectMultiDayDate(dateKey) {
  if (!selectedStartDateKey || selectedEndDateKey) {
    selectedStartDateKey = dateKey;
    selectedEndDateKey = "";
    return;
  }

  if (dateKey < selectedStartDateKey) {
    selectedEndDateKey = selectedStartDateKey;
    selectedStartDateKey = dateKey;
    return;
  }

  selectedEndDateKey = dateKey;
}

function getCalendarDayTypeByKey(dateKey) {
  const calendarItem = companyCalendarMap[dateKey];

  if (calendarItem && calendarItem.type) {
    return String(calendarItem.type).trim();
  }

  return "holiday";
}

function getCalendarDayType(date) {
  if (date.getDay() === 0) {
    return "holiday";
  }

  const dateKey = toDateKeyLocal(date);
  return getCalendarDayTypeByKey(dateKey);
}

function getCalendarDayLabel(type) {
  if (type === "holiday") return "休日";
  if (type === "no_leave") return "有給NG";
  return "営業日";
}

function isDateInSelectedRange(dateKey) {
  if (!selectedStartDateKey || !selectedEndDateKey) return false;
  return dateKey >= selectedStartDateKey && dateKey <= selectedEndDateKey;
}

function updateCalendarStatus() {
  const box = document.getElementById("calendarStatus");
  if (!box) return;

  box.classList.remove("ok", "error", "success");

  if (!currentRequestType) {
    box.textContent = "申請区分を選択してください。";
    return;
  }

  if (currentRequestType === "multi_day") {
    if (!selectedStartDateKey) {
      box.textContent = "複数日申請：開始日を選択してください。";
      return;
    }

    if (!selectedEndDateKey) {
      box.textContent = `開始日：${formatDateLabel(selectedStartDateKey)}\n終了日を選択してください。`;
      return;
    }

    box.classList.add("ok");
    box.textContent = `複数日申請：${formatDateLabel(selectedStartDateKey)} 〜 ${formatDateLabel(selectedEndDateKey)} を選択中です。`;
    return;
  }

  if (!selectedStartDateKey) {
    box.textContent = "カレンダーから希望日を選択してください。";
    return;
  }

  const labelMap = {
    one_day: "1日有給",
    half_am: "午前半休",
    half_pm: "午後半休"
  };

  box.classList.add("ok");
  box.textContent = `${formatDateLabel(selectedStartDateKey)}：${labelMap[currentRequestType] || "有給"} を選択中です。`;
}

function renderRequestCalendar() {
  const grid = document.getElementById("requestCalendarGrid");
  const label = document.getElementById("calendarMonthLabel");

  if (!grid || !label) return;

  grid.innerHTML = "";

  const year = calendarDisplayDate.getFullYear();
  const month = calendarDisplayDate.getMonth();

  label.textContent = `${year}年 ${month + 1}月`;

  const firstDate = new Date(year, month, 1);
  const lastDate = new Date(year, month + 1, 0);
  const startDay = firstDate.getDay();
  const daysInMonth = lastDate.getDate();

  for (let i = 0; i < startDay; i++) {
    const empty = document.createElement("div");
    empty.className = "calendar-day empty";
    grid.appendChild(empty);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    const dateKey = toDateKeyLocal(date);
    const type = getCalendarDayType(date);

    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = `calendar-day ${type}`;

    if (dateKey === selectedStartDateKey) {
      btn.classList.add("selected", "range-start");
    }

    if (dateKey === selectedEndDateKey && selectedEndDateKey !== selectedStartDateKey) {
      btn.classList.add("selected", "range-end");
    }

    if (isDateInSelectedRange(dateKey)) {
      btn.classList.add("in-range");
    }

    const canSelect = type === "workday";
    btn.disabled = !canSelect;

    btn.innerHTML = `
      <span class="calendar-day-number">${day}</span>
      <span class="calendar-day-label">${getCalendarDayLabel(type)}</span>
    `;

    btn.onclick = () => selectCalendarDate(dateKey);
    grid.appendChild(btn);
  }
}

/* =========================
   申請
========================= */
function submitRequest() {
  if (!selectedEmployee) {
    alert("社員を選択してください");
    return;
  }

  if (!currentRequestType) {
    alert("申請区分を選択してください");
    return;
  }

  updateHiddenDateInputs();

  let startDate = "";
  let endDate = "";
  let halfDay = false;
  let halfType = "";

  if (currentRequestType === "multi_day") {
    startDate = selectedStartDateKey;
    endDate = selectedEndDateKey;
  } else {
    startDate = selectedStartDateKey;
    endDate = selectedStartDateKey;
  }

  if (!startDate || !endDate) {
    alert("日付を選択してください");
    return;
  }

  if (currentRequestType === "half_am") {
    halfDay = true;
    halfType = "am";
  } else if (currentRequestType === "half_pm") {
    halfDay = true;
    halfType = "pm";
  }

  const reason = document.getElementById("reasonType").value;
  const detail = document.getElementById("reasonDetail").value;

  if (!reason) {
    alert("理由を選択してください");
    return;
  }

  const payload = {
    employee_id: selectedEmployee.employee_id,
    start_date: startDate,
    end_date: endDate,
    type: "paid_leave",
    half_day: halfDay,
    half_type: halfType,
    reason: reason,
    reason_detail: detail
  };

  const submitBtn = document.getElementById("submitBtn");
  const statusBox = document.getElementById("calendarStatus");

  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.textContent = "申請中...";
    submitBtn.classList.add("submitting");
    submitBtn.classList.remove("submitted");
  }

  if (statusBox) {
    statusBox.className = "status-box ok";
    statusBox.textContent = "申請を送信しています...";
  }

  google.script.run
    .withSuccessHandler(() => {
      if (statusBox) {
        statusBox.className = "status-box success";
        statusBox.textContent = "送信完了！申請を受け付けました。";
      }

      if (submitBtn) {
        submitBtn.textContent = "送信完了！";
        submitBtn.classList.remove("submitting");
        submitBtn.classList.add("submitted");
      }

      resetSelectedDates();
      renderRequestCalendar();

      google.script.run
        .withSuccessHandler(data => {
          employees = data || [];
          const updated = employees.find(emp => emp.employee_id === selectedEmployee.employee_id);

          if (updated) {
            selectedEmployee = updated;
          }

          render();
          updateGroupTabs();
        })
        .getEmployeesForRequest();

      setTimeout(() => {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "申請する";
          submitBtn.classList.remove("submitted");
        }

        backToEmployeeList();
      }, 2500);
    })
    .withFailureHandler(err => {
      console.error("submitLeaveRequest error:", err);

      let message = "エラーが発生しました";

      if (err) {
        if (err.message) {
          message = err.message;
        } else if (typeof err === "string") {
          message = err;
        } else {
          message = String(err);
        }
      }

      if (statusBox) {
        statusBox.className = "status-box error";
        statusBox.textContent = message;
      }

      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.textContent = "申請する";
        submitBtn.classList.remove("submitting", "submitted");
      }
    })
    .submitLeaveRequest(payload);
}

/* =========================
   履歴開閉
========================= */
function closeHistorySection() {
  const section = document.getElementById("historySection");
  const btn = document.getElementById("historyToggleBtn");

  if (section) {
    section.classList.add("history-collapsed");
  }

  if (btn) {
    btn.textContent = "申請履歴を見る";
  }
}

function toggleHistorySection() {
  const section = document.getElementById("historySection");
  const btn = document.getElementById("historyToggleBtn");

  if (!section || !btn) return;

  const isCollapsed = section.classList.contains("history-collapsed");

  section.classList.toggle("history-collapsed", !isCollapsed);

  btn.textContent = isCollapsed
    ? "申請履歴を閉じる"
    : "申請履歴を見る";
}

/* =========================
   年度内の申請履歴表示
========================= */
function loadEmployeeLeaveHistory(employeeId) {
  const list = document.getElementById("leaveHistoryList");
  if (!list) return;

  list.innerHTML = `<div class="history-empty">履歴を読み込み中です...</div>`;

  google.script.run
    .withSuccessHandler(renderEmployeeLeaveHistory)
    .withFailureHandler(err => {
      console.error(err);
      list.innerHTML = `<div class="history-empty history-error">履歴の取得でエラーが発生しました。</div>`;
    })
    .getEmployeeLeaveHistoryForRequest(employeeId);
}

function renderEmployeeLeaveHistory(data) {
  const list = document.getElementById("leaveHistoryList");
  if (!list) return;

  list.innerHTML = "";

  if (!Array.isArray(data) || data.length === 0) {
    list.innerHTML = `<div class="history-empty">今年度の申請履歴はありません。</div>`;
    return;
  }

  data.forEach(item => {
    const row = document.createElement("div");
    row.className = "history-row";

    row.innerHTML = `
      <div class="history-date">${escapeHtml(item.date_label)}</div>
      <div class="history-type">${escapeHtml(item.leave_type_label)}</div>
      <div class="history-days">${escapeHtml(item.days)}日</div>
      <div class="history-status ${escapeHtml(item.status)}">${escapeHtml(item.status_label)}</div>
    `;

    list.appendChild(row);
  });
}
</script>
