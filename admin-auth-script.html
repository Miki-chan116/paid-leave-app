<script>
function showLoginScreen() {
  const loginScreen = document.getElementById("loginScreen");
  const adminApp = document.getElementById("adminApp");

  if (loginScreen) loginScreen.style.display = "flex";
  if (adminApp) adminApp.classList.add("admin-app-hidden");
}

function showAuthenticatedShell() {
  const loginScreen = document.getElementById("loginScreen");
  const adminApp = document.getElementById("adminApp");

  if (loginScreen) loginScreen.style.display = "none";
  if (adminApp) adminApp.classList.remove("admin-app-hidden");

  renderLoginUserBar();

  if (typeof onAdminAuthenticated === "function") {
    onAdminAuthenticated();
  }
}

function renderLoginUserBar() {
  const bar = document.getElementById("loginUserBar");
  if (!bar) return;

  const name = currentAdminUser ? currentAdminUser.admin_name : "";

  bar.innerHTML = `
    <span>ログイン中：${escapeHtml(name)}</span>
    <button class="logout-btn" type="button" onclick="logoutAdmin()">ログアウト</button>
  `;
}

function getAdminAuthConfig_() {
  const defaults = {
    validateLoginInput: false,
    clearMessageBeforeLoadUsers: true,
    clearMessageBeforeLogin: true,
    showEmptyAdminOption: true,
    emptyAdminMessage: "有効な管理者がいません",
    loginMissingInputMessage: "管理者とPINを入力してください。",
    loginFailureMessage: "ログインできませんでした。",
    normalizeLoginUser: true,
    clearPinOnLogout: true,
    reloadUsersOnLogout: true
  };

  if (typeof adminAuthConfig === "undefined" || !adminAuthConfig) {
    return defaults;
  }

  return Object.assign({}, defaults, adminAuthConfig);
}

function normalizeAdminUserForStorage_(user) {
  if (!user) return null;

  return {
    admin_id: user.admin_id,
    admin_name: user.admin_name
  };
}

function setLoginMessage_(text) {
  const message = document.getElementById("loginMessage");
  if (message) message.textContent = text || "";
}

function loadAdminUsersForLogin() {
  const config = getAdminAuthConfig_();
  const select = document.getElementById("adminUserSelect");

  if (config.clearMessageBeforeLoadUsers) {
    setLoginMessage_("");
  }

  google.script.run
    .withSuccessHandler(users => {
      if (!select) return;

      if (config.showEmptyAdminOption && (!Array.isArray(users) || users.length === 0)) {
        select.innerHTML = `<option value="">${escapeHtml(config.emptyAdminMessage)}</option>`;
        return;
      }

      select.innerHTML = `<option value="">選択してください</option>`;

      (users || []).forEach(user => {
        const option = document.createElement("option");
        option.value = user.admin_id;
        option.textContent = `${user.admin_name}（${user.admin_id}）`;
        select.appendChild(option);
      });
    })
    .withFailureHandler(err => {
      console.error("管理者一覧取得エラー:", err);
      setLoginMessage_("管理者一覧の取得でエラーが発生しました。");
    })
    .getAdminUsersForLogin();
}

function loginAdmin() {
  const config = getAdminAuthConfig_();
  const adminSelect = document.getElementById("adminUserSelect");
  const pinInput = document.getElementById("adminPinInput");
  const adminId = adminSelect ? adminSelect.value : "";
  const pin = pinInput ? pinInput.value : "";

  if (config.clearMessageBeforeLogin) {
    setLoginMessage_("");
  }

  if (config.validateLoginInput && (!adminId || !pin)) {
    setLoginMessage_(config.loginMissingInputMessage);
    return;
  }

  google.script.run
    .withSuccessHandler(user => {
      currentAdminUser = config.normalizeLoginUser
        ? normalizeAdminUserForStorage_(user)
        : user;

      localStorage.setItem(
        ADMIN_LOGIN_KEY,
        JSON.stringify(normalizeAdminUserForStorage_(user))
      );

      showAdminApp();
    })
    .withFailureHandler(err => {
      console.error("ログインエラー:", err);
      setLoginMessage_(err && err.message ? err.message : config.loginFailureMessage);
    })
    .verifyAdminLogin(adminId, pin);
}

function logoutAdmin() {
  const config = getAdminAuthConfig_();

  localStorage.removeItem(ADMIN_LOGIN_KEY);
  currentAdminUser = null;

  if (config.clearPinOnLogout) {
    const pin = document.getElementById("adminPinInput");
    if (pin) pin.value = "";
  }

  showLoginScreen();

  if (config.reloadUsersOnLogout) {
    loadAdminUsersForLogin();
  }
}
</script>
