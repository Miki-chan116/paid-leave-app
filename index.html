<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include('style'); ?>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="lang-switch">
        <button id="langJaBtn" class="lang-btn active" type="button" onclick="setLanguage('ja')">日本語</button>
        <button id="langEnBtn" class="lang-btn" type="button" onclick="setLanguage('en')">English</button>
      </div>

      <h1 id="appTitle" class="app-title">有給申請</h1>
      <p id="appSubtitle" class="app-subtitle">名前を選んで申請してください</p>
    </header>

    <!-- 社員選択画面 -->
    <section id="employeeScreen" class="screen active">
      <div class="sticky-tabs-wrap">
        <div class="kana-tabs" id="kanaTabs">
          <button type="button" data-group="a" onclick="changeGroup('a')">あ行</button>
          <button type="button" data-group="k" onclick="changeGroup('k')">か行</button>
          <button type="button" data-group="s" onclick="changeGroup('s')">さ行</button>
          <button type="button" data-group="t" onclick="changeGroup('t')">た行</button>
          <button type="button" data-group="n" onclick="changeGroup('n')">な行</button>
          <button type="button" data-group="h" onclick="changeGroup('h')">は行</button>
          <button type="button" data-group="m" onclick="changeGroup('m')">ま行</button>
          <button type="button" data-group="y" onclick="changeGroup('y')">や行</button>
          <button type="button" data-group="r" onclick="changeGroup('r')">ら行</button>
          <button type="button" data-group="w" onclick="changeGroup('w')">わ行</button>
          <button type="button" data-group="global" onclick="changeGroup('global')">外国人</button>
        </div>
      </div>

      <div class="screen-card">
        <div class="group-header">
          <div>
            <div class="section-title" id="groupTitle">あ行</div>
            <div id="employeeScreenSubtitle" class="section-subtitle">名前を押すと申請画面へ進みます</div>
          </div>
          <div class="page-indicator" id="pageIndicator">1 / 1</div>
        </div>

        <div id="employeeSwipeArea" class="employee-grid"></div>

        <div class="bottom-pager">
          <button id="prevPageBtn" class="pager-btn" type="button" onclick="prevPage()">◀</button>
          <div class="pager-center" id="pageIndicatorBottom">1 / 1</div>
          <button id="nextPageBtn" class="pager-btn" type="button" onclick="nextPage()">▶</button>
        </div>
      </div>
    </section>

    <!-- 申請画面 -->
    <section id="requestScreen" class="screen">
      <div class="screen-card">
        <div class="request-topbar">
          <button id="backBtn" class="back-btn" type="button" onclick="backToEmployeeList()">← 戻る</button>

          <div class="selected-employee-box">
            <div id="selectedEmployeeLabel" class="selected-employee-label">選択中の社員</div>
            <div id="selectedEmployeeName" class="selected-employee-name"></div>

            <div class="employee-summary-row">
              <div class="summary-chip summary-chip-blue">
                <span id="summaryRemainingLabel">残日数</span>
                <strong id="selectedRemainingDays">0日</strong>
              </div>

              <div class="summary-chip summary-chip-green">
                <span id="summaryGrantLabel">付与日数</span>
                <strong id="selectedGrantDays">0日</strong>
              </div>
            </div>

            <div class="five-day-card">
              <div class="five-day-top">
                <span id="fiveDayTitle">5日取得義務</span>
                <span id="fiveDayCount">0 / 5日</span>
              </div>

              <div class="five-day-bar">
                <div id="fiveDayBarFill" class="five-day-bar-fill"></div>
              </div>

              <div id="fiveDayMessage" class="five-day-message">あと5日</div>
            </div>
          </div>
        </div>

        <div class="request-section">
          <div id="requestSectionDate" class="request-section-title">1. 希望日を選択</div>

          <div class="field single-date-field">
            <label id="singleDateLabel" for="singleDate">希望日</label>
            <input type="date" id="singleDate" onchange="handleRequestTypeChange()">
          </div>
        </div>

        <div class="request-section">
          <div id="requestSectionType" class="request-section-title">2. 申請区分を選択</div>

          <div class="request-type-grid">
            <button class="type-btn" id="typeOneDay" type="button" onclick="selectRequestType('one_day')">1日</button>
            <button class="type-btn" id="typeHalfAm" type="button" onclick="selectRequestType('half_am')">半日 AM</button>
            <button class="type-btn" id="typeHalfPm" type="button" onclick="selectRequestType('half_pm')">半日 PM</button>
            <button class="type-btn" id="typeMultiDay" type="button" onclick="selectRequestType('multi_day')">複数日</button>
          </div>
        </div>

        <div id="multiDayArea" class="request-section" style="display:none;">
          <div id="multiDayTitle" class="request-section-title">複数日申請</div>

          <div class="multi-day-grid">
            <div class="field">
              <label id="rangeStartDateLabel" for="rangeStartDate">開始日</label>
              <input type="date" id="rangeStartDate" onchange="handleRequestTypeChange()">
            </div>

            <div class="field">
              <label id="rangeEndDateLabel" for="rangeEndDate">終了日</label>
              <input type="date" id="rangeEndDate" onchange="handleRequestTypeChange()">
            </div>
          </div>
        </div>

        <div class="request-section">
          <div id="requestSectionReason" class="request-section-title">3. 理由を選択</div>

          <div class="field">
            <label id="reasonTypeLabel" for="reasonType">申請理由</label>
            <select id="reasonType" onchange="handleReasonTypeChange()"></select>
          </div>

          <div class="field full-width" id="reasonDetailWrap" style="display:none;">
            <label id="reasonDetailLabel" for="reasonDetail">理由詳細</label>
            <textarea id="reasonDetail" rows="3" placeholder="特記事項がある場合のみ入力してください"></textarea>
          </div>
        </div>

        <div id="calendarStatus" class="status-box">
          日付と申請区分を選択してください。
        </div>

        <div class="submit-area">
          <button id="submitBtn" class="submit-btn" type="button" onclick="submitRequest()">申請する</button>
        </div>
      </div>
    </section>
  </div>

  <?!= include('script'); ?>
</body>
</html>
